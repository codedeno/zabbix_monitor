      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/objectGroup"
        links:
          type: object
        meta:
          type: object
    objectGroupResource:
      description: Defines the dynamic list of NetBackup objects for the access rule.
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/objectGroup"
    objectGroup:
      type: object
      required:
        - type
        - attributes
      properties:
        links:
          type: object
        meta:
          type: object
          properties:
            messages:
              description: The localized system-defined object group name and description.
              type: object
              items:
                $ref: "#/components/schemas/localizedObjectGroupData"
        id:
          type: string
        type:
          type: string
          enum:
            - object-group
        attributes:
          type: object
          required:
            - name
            - criteria
          properties:
            name:
              description: A user-defined name for the object group. Maximum 256 bytes.
              type: string
            description:
              description: A user-defined description for the object group. Maximum 256 bytes.
              type: string
            isSystemDefined:
              description: |
                Indicates if the object group is predefined in NetBackup. Predefined object groups cannot be modified.
              type: boolean
            criteria:
              description: The rules for filtering NetBackup objects, in OData format.
              type: array
              items:
                $ref: "#/components/schemas/collectionCriteria"
    collectionCriteria:
      description: |
        The filtering rules that create the dynamic list of objects in the object group. Use the API GET /object-types to get the valid objectType and valid attributes that you can use for objectCriterion.
      type: object
      required:
        - objectType
        - objectCriterion
      properties:
        criterionId:
          type: integer
        objectType:
          type: string
        objectCriterion:
          type: string
          description: |
            The filtering rules that create the dynamic list of objects in the object group. The rules should be based on OData standards. Maximum 4096 bytes.
        isSystemDefined:
          description: |
            Indicates if the collection criteria is predefined in NetBackup. Predefined collection criteria cannot be modified.
          type: boolean
    permissionCategoriesResource:
      description: The list of permission category resources.
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/permissionCategory"
        links:
          type: object
        meta:
          type: object
    permissionCategory:
      type: object
      required:
        - type
        - attributes
      properties:
        links:
          type: object
        meta:
