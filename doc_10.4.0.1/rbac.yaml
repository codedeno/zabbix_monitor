openapi: 3.0.0
info:
  title: NetBackup RBAC Administration API
  version: "11.0"
  description: |
    ## Deprecated ##
    These APIs are no longer used to control access to NetBackup.\
    This API set has been deprecated due to a redesign of NetBackup role based access control.

    Any RBAC configuration data created using the APIs defined in the `/rbac` sub-context is
    now read-only. This data remains available to help create similar access control using the new APIs found in the `/access-control` sub-context.\

    See the latest Release Notes as well as the security section of the Administrator's Guide located in the help content of the Web UI for documentation on
    how to configure NetBackup access control.
externalDocs:
  description: Getting Started Guide
  url: http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started/
servers:
  - url: '/netbackup'
    description: NetBackup Master
paths:
  /rbac/roles:
    get:
      deprecated: true
      description: |
        Returns a list of roles that were configured with the previous version of NetBackup RBAC.\

        This API returns RBAC configuration data that is no longer used to control access to NetBackup.\
        This data has been retained to aid in configuring access control using the updated interfaces.\
        Active RBAC configuration data is now managed using the `/access-control` API definitions.\

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|SECURITY|ACCESS-CONTROL|LEGACY|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Roles
      parameters:
        - $ref: ./common.yaml#/components/parameters/metaData
        - name: include
          description: |
            Appends the included section in the response payload with details about the relationships that are specified in the include query. The include query is the name of the relationship, which is "permissions".
          in: query
          required: false
          schema:
            type: string
            enum:
              - permissions
      responses:
        "200":
          headers:
            X-NetBackup-Warning:
              schema:
                type: string
              description: This API is no longer used to control access to NetBackup.
          description: Successful response.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/rolesResource"
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
        "503":
          $ref: ./common.yaml#/components/responses/errorServerBusy
    post:
      deprecated: true
      description: |
        **This API has been removed.**

        This API is no longer used to control access to NetBackup.\
        Active RBAC configuration data is now managed using the `/access-control` API definitions.
      tags:
        - Roles
      parameters:
        - $ref: ./common.yaml#/components/headers/auditReasonHeader
      requestBody:
        description: The role resource to create.
        content:
          application/vnd.netbackup+json;version=11.0:
