          type: string
        type:
          type: string
          enum:
            - object-type
        attributes:
          type: object
          required:
            - filterableAttributes
          properties:
            filterableAttributes:
              type: array
              items:
                $ref: "#/components/schemas/validAttributeObject"
    validAttributeObject:
      description: A resource identifier object that represents an individual attribute.
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          type: string
    objectGroupsResource:
