          properties:
            name:
              description: The NetBackup-defined name for the permission category.
              type: string
            description:
              description: The description of the permission category.
              type: string
            isSystemDefined:
              description: |
                Indicates if the permission category is predefined in NetBackup. Predefined permission category cannot be modified.
              type: boolean
        relationships:
          type: object
          required:
            - permissions
          properties:
            permissions:
              description: The permissions included in this permission category.
              type: object
              properties:
                data:
                  type: array
