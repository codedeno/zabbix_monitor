components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
    cookieAuth:
      type: apiKey
      in: cookie
      name: Authorization
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    localizedRoleData:
      description: The localized system-defined role data.
      type: object
      properties:
        name:
          type: string
          description: The localized role name.
        description:
          type: string
          description: The localized role description.
    localizedObjectGroupData:
      description: The localized system-defined object group data.
      type: object
      properties:
        name:
          type: string
          description: The localized object group name.
        description:
          type: string
          description: The localized object group description.
    localizedAccessRuleData:
      description: The localized system-defined access rule data.
      type: object
      properties:
        description:
          type: string
          description: The localized access rule description.
    localizedPermissionData:
      description: The localized system-defined permission data.
      type: object
      properties:
        name:
          type: string
          description: The localized permission name.
    localizedPermissionCategoryData:
      description: The localized system-defined permission category data.
      type: object
      properties:
        name:
          type: string
          description: The localized permission category name.
    rolesResource:
      description: The collection of role resources.
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/role"
        links:
          type: object
        meta:
          type: object
    roleResource:
      description: The role resource that defines the permissions.
      type: object
      properties:
        data:
          $ref: "#/components/schemas/role"
    role:
      type: object
      required:
        - type
        - attributes
      properties:
        links:
          type: object
        meta:
          type: object
          properties:
            messages:
              description: The localized system-defined role name and description.
              type: object
              items:
                $ref: "#/components/schemas/localizedRoleData"
        type:
          type: string
        id:
          type: string
          description: The unique role resource ID.
        attributes:
          type: object
          required:
            - name
          properties:
            name:
              description: The user-defined name for the role. Maximum 256 bytes.
              type: string
            description:
              description: The user-defined description for the role. Maximum 256 bytes.
              type: string
            isSystemDefined:
              description: Indicates if the role is predefined in NetBackup. Predefined roles cannot be modified.
              type: boolean
        relationships:
          type: object
          required:
            - permissions
          properties:
            permissions:
              description: The permissions allowed for this role. The type should be permission.
              type: object
              properties:
                data:
                  type: array
                  items:
                    $ref: "#/components/schemas/resourceIdentifierObject"
    permissionsResource:
      description: The collection of permissions.
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/permission"
        links:
          type: object
        meta:
          type: object
    permissionResource:
      description: A system-defined resource that groups the permissions that are needed to perform a NetBackup operation.
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/permission"
    permission:
      type: object
      required:
        - type
        - attributes
      properties:
        links:
          type: object
        meta:
          type: object
          properties:
            messages:
              description: The localized system-defined permission name
              type: object
              items:
                $ref: "#/components/schemas/localizedPermissionData"
        id:
          type: string
        type:
          type: string
          enum:
            - permission
        attributes:
          type: object
          required:
            - name
          properties:
            name:
              description: The name of the permission.
              type: string
            isSystemDefined:
              description: |
                Indicates if the permission is predefined in NetBackup. Predefined permissions cannot be modified.
              type: boolean
    accessRulesResource:
      description: The collection of configured access rules.
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/accessRule"
        links:
          type: object
        meta:
          type: object
    accessRuleResource:
      description: |
        Defines the users, roles, and object groups that make up an access rule. An access rule is only valid if it contains all three of these elements.
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/accessRule"
    accessRule:
      type: object
      required:
        - type
        - relationships
      properties:
        links:
          type: object
        meta:
          type: object
          properties:
            messages:
              description: The localized system-defined access rule description.
              type: object
              items:
                $ref: "#/components/schemas/localizedAccessRuleData"
        id:
          type: string
        type:
          type: string
          enum:
            - access-rule
        attributes:
          type: object
          properties:
            description:
              description: The description about the access rule being configured. Maximum 256 bytes.
              type: string
            isSystemDefined:
              description: |
                Indicates if the access rule is predefined in NetBackup. Predefined access rules cannot be modified.
              type: boolean
        relationships:
          type: object
          required:
            - objectGroup
            - role
          properties:
            userPrincipal:
              description: |
                The user that is configured for the access rule. Either userPrincipal or groupGrincipal is required. The format should be `<domain name>:<user name>:<domain type>:<user id>`. Use the /rbac/identities API to get the identity details of the user principal to pass with this API. The type should be user-principal.
              type: object
              required:
                - data
              properties:
                data:
                  $ref: "#/components/schemas/resourceIdentifierObject"
            groupPrincipal:
              description: |
                The user group that is configured for the access rule. Either userPrincipal or groupPrincipal is required. The format should be `<domain name>:<group name>:<domain type>:<group id>`. Use the /rbac/identities API to get the identity details of the group principal to pass with this API. The type should be group-principal.
              type: object
              required:
                - data
              properties:
                data:
                  $ref: "#/components/schemas/resourceIdentifierObject"
            objectGroup:
              description: |
                Defines the NetBackup objects that are configured for the access rule. The type should be object-group.
              type: object
              required:
                - data
              properties:
                data:
                  $ref: "#/components/schemas/resourceIdentifierObject"
            role:
              description: Defines the roles that are configured for the access rule.
              type: object
              required:
                - data
              properties:
                data:
                  $ref: "#/components/schemas/resourceIdentifierObject"
    rbacObjectTypesResource:
      description: The collection of valid RBAC object types.
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/objectType"
        links:
          type: object
        meta:
          type: object
    objectType:
      type: object
      required:
        - type
      properties:
        links:
          type: object
        meta:
          type: object
