  /storage/bulk-tape-volume-pools-requests:
    delete:
      description: |
        Asynchronously deletes one or more tape volume pools.

         **Access Control**\
         Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
         Namespace: `|STORAGE|TAPE-MEDIA|VOLUME-POOLS|`\
         Requires Operation: `|OPERATIONS|DELETE|`
      tags:
        - Tape Media Volume Pools
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/deleteTapeMediaPoolRequest"
            example:
              data:
                - id: 1
                  type: volumePoolDetails
                - id: 2
                  type: volumePoolDetails
        description: Tape volume pool IDs to be deleted.
        required: true
      responses:
        "202":
          description: Bulk request accepted.
          headers:
            Location:
              description: |
                A link to the status monitor of the request.

                After the request is submitted, the maximum period that the status monitor will be retrievable
                is 24 hours. Canceling the request or restarting the Web server will immediately
                make the status monitor invalid.
              schema:
                type: string
                format: url
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "413":
          description: The request to delete drives contains too many items (>1024). Break up the request into multiple batches and resubmit.
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "429":
          description: Too many drive-deletion requests are already running (>32). Wait for one to complete before resubmitting.
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/bulk-tape-volume-pools-requests/{requestId}":
    parameters:
      - name: requestId
        in: path
        required: true
        description: The request ID generated in the location header of delete bulk-tape-volume-pools-requests api.
        schema:
          type: string
    get:
      description: |
        Retrieves the status of a bulk volume pool request specified by `requestId`.

        If the bulk request has completed (200 or 207 response status codes), regardless of
        the outcome of the individual volume pool records, after this call, that request and all of its records
        will immediately be deleted and can no longer be retrieved.

         **Access Control**\
         Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
         Namespace: `|STORAGE|TAPE-MEDIA|VOLUME-POOLS|`\
         Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Tape Media Volume Pools
      responses:
        "200":
          description: Successfully deleted the specified volume pools. There were no errors found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatus
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 204
                      id: 1
                      type: volumePoolDetails
                    - httpStatus: 204
                      id: 2
                      type: volumePoolDetails
        "202":
          description: Bulk request is in progress.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatus
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 202
                      id: 1
                      type: volumePoolDetails
                    - httpStatus: 202
                      id: 2
                      type: volumePoolDetails
        "207":
          description: |
            The bulk request has completed, but one or more volume pools in the bulk request could not be deleted.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatusWithErrors
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 400
                      id: 1
                      type: volumePoolDetails
                      errors:
                        errorCode: 1
                        errorMessage: Cannot delete non-empty volume pool
                    - httpStatus: 204
                      id: 2
                      type: volumePoolDetails
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
    delete:
      description: |
        Cancels an ongoing bulk volume pool request, specified by `requestId`, and retrieves its status.

        Regardless of the outcome of the individual volume pool records, after this call, that request
        and all of its records will immediately be deleted and can no longer be retrieved.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|VOLUME-POOLS|`\
        Requires Operation: `|OPERATIONS|DELETE|`
      tags:
        - Tape Media Volume Pools
      responses:
        "207":
          description: Successfully cancelled the bulk request.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatus
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 204
                      id: "4"
                      type: volumePoolDetails
                    - httpStatus: 422
                      id: "5"
                      type: volumePoolDetails
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "409":
          description: The bulk request has already completed.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatus
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 204
                      id: 1
                      type: volumePoolDetails
                    - httpStatus: 204
                      id: 2
