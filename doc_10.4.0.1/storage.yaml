          type: string
          description: |
            The authentication location identifier of the cloud storage. This parameter is optional. Specify this field if you want to use predefined public authentication service URLs. Obtain this value with the `storage/cloud/providers` API.
        authenticationUrl:
          type: string
          description: |
            The valid authentication URL provided by the cloud vendor. This is an optional field only if the URL is available in NetBackup database.
    locationDetails:
      type: object
      description: The authentication location details for the cloud storage provider.
      properties:
        authenticationLocationName:
          type: string
          description: The authentication location name for the cloud storage provider.
        authenticationLocationId:
          type: string
          description: The authentication location identifier for the cloud storage provider.
        authenticationLocationUrl:
          type: string
          description: The authentication location URL provided by the cloud storage provider.
    userCredentialsDetails:
      type: object
