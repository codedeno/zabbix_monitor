    snapReplicationTargetAttributesPayload:
      type: object
      properties:
        name:
          type: string
          description: The name of snapshot replication target.
        provider:
          type: string
          description: The name of storage array provider.
          example: NetApp
        snapshotManagementServer:
          type: string
          description: The name of Snapshot Manager.
        replicationType:
          type: string
          description: The type of replication supported by the array vendor.
          example: SnapMirror
