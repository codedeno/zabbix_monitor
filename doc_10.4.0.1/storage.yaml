                format: int64
                description: |
                  The total size of the disk volume, in bytes.
                  This field is not applicable for Cloud and CloudCatalyst.
              freeSizeBytes:
                type: integer
                format: int64
                description: |
                  The free size of the disk volume, in bytes.
                  This field is not applicable for Cloud and CloudCatalyst.
              isReplicationSource:
                type: boolean
                description: If set to `true`, the disk volume is configured as a source for replication.
              isReplicationTarget:
                type: boolean
                description: If set to `true`, the disk volume is configured as a target for replication.
              wormIndelibleMinimumInterval:
                type: integer
                description: The minimum interval for which an image cannot be deleted on the disk volume.
              wormIndelibleMaximumInterval:
                type: integer
                description: The maximum interval for which an image cannot be deleted on the disk volume.
              diskVolumeCapabilities:
                type: array
                description: The capabilities of the disk volume.
                items:
                  type: string
                  description: |
                    WORM_INDELIBLE - Disk volume supports lock on the images. WORM_IMMUTABLE - Disk volume supports read-only images. WORM_IMAGEAUDIT - Storage provides checksums for images on the disk volume. WORMF_MUTABLE - Disk volume can contain unlocked images. WORMF_IMMUTABLE - Sets the read-only attribute on the images. WORMF_DELETABLE - Disk volume can contain deletable images. WORMF_INDELIBLE - NetBackup sets storage retention on images on the disk volume. WORMF_CREATE_IMMUTABLE_AND_DELETABLE - NetBackup can set immutable and indelible attributes independently.
                  enum:
                    - WORM_INDELIBLE
                    - WORM_IMMUTABLE
                    - WORM_IMAGEAUDIT
                    - WORMF_MUTABLE
                    - WORMF_IMMUTABLE
                    - WORMF_DELETABLE
                    - WORMF_INDELIBLE
                    - WORMF_CREATE_IMMUTABLE_AND_DELETABLE
            required:
              - name
              - id
              - diskMediaId
              - state
              - isReplicationSource
              - isReplicationTarget
              - wormIndelibleMinimumInterval
              - wormIndelibleMaximumInterval
        highWaterMark:
          type: integer
          description: |
            The threshold value (as a percentage) to indicate that the volume is full and no further operations are allowed.
          minimum: 1
          maximum: 100
        lowWaterMark:
          type: integer
          description: |
            The threshold value (as a percentage) that indicates when NetBackup stops any image cleanup operations. The low water mark setting cannot be greater than or equal to the high water mark setting.
          minimum: 0
          maximum: 99
        maximumIoStreams:
          type: object
          properties:
            limitIoStreams:
              type: boolean
              description: |
                If set to `false`, unlimited I/O streams are used. If set to `true`, limits the number of I/O streams. Specify the number of streams with the `streamsPerVolume` parameter.
            streamsPerVolume:
              type: integer
              description: The number of I/O streams when `limitIoStreams` parameter is set to `true`.
              minimum: 2
              maximum: 65535
          required:
            - limitIoStreams
        diskPoolState:
          type: string
          description: The state of the disk pool.
          enum:
            - UP
            - DOWN
            - TRANSIENT
        rawSizeBytes:
          type: integer
          format: int64
          description: Raw size (in bytes) of the storage in the disk pool.
        usableSizeBytes:
          type: integer
          format: int64
          description: The space (in bytes) in the disk pool that can be used.
        availableSpaceBytes:
          type: integer
          format: int64
          description: The available space (in bytes) of the storage in the disk pool.
        usedCapacityBytes:
          type: integer
          format: int64
          description: The used capacity (in bytes) of the storage in the disk pool.
        wormCapable:
          type: boolean
          description: |
            If set to `true`, Disk pool is WORM (write once read many) capable.
        readOnly:
          type: boolean
          default: false
          description: If set to `true`, the disk pool is in read only status for image sharing.
        comment:
          type: string
          description: The description of the disk pool.
        diskPoolCapabilities:
          type: array
          description: The capabilities of this disk pool.
          items:
            type: string
            description: |
              PATCH_WORK - Associated with enclosure. VISIBLE - Visible and managed through UI. OPEN_STORAGE - Managed as OpenStorage disk pool. ROVING_VOLUMES - Active mount/unmounts for disk volumes. SINGLE_STORAGE_SERVER - Limited to single storage server COPY_EXTENTS - Allow optimized duplication. ADMIN_UP - Administrative state is UP. INTERNAL_UP - Internal state is UP. SPAN_IMAGES - Allow images to span disk volumes. BASIC_STAGING - Allow basic image staging. LIFE_CYCLE - Allow image life cycle management. CAPACITY_MANAGEMENT - Allow capacity management. FRAGMENT_IMAGES - Allow image fragmentation. CATALOG_BACKUP - Allow catalog backups. CPR - Allow checkpoint / restart RANDOM_WRITES - Allow random write access. FT_TRANSFER - Allow access through FT channel. CAPACITY_MANAGED_RETENTION - Allow capacity managed retention. CAPACITY_MANAGED_JOB_QUEUING - Allow capacity managed job queuing. OPTIMIZED_IMAGE - Allow virtual image construction. METADATA - Describe client data during backup. SNAPSHOT - Disk pool holds snapshots. PRIMARY - Disk pool is capable of Snapshots from sources mounted on a client. REPLICATION_SOURCE - Disk pool can be a source for Image or Snapshot replication. REPLICATION_TARGET - Disk pool can be a target for Image or Snapshot replication. MIRROR - This replication target disk pool can use a mirrored replication method. INDEPENDENT - This replication target can use a non-mirrored replication method. TARGETED_REPLICATION - Disk pool can be used for targeted replication. WORM_CAPABLE - The WORM (write once read many) properties of the images written to the disk pool.
            enum:
              - PATCH_WORK
              - VISIBLE
              - OPEN_STORAGE
              - ROVING_VOLUMES
              - SINGLE_STORAGE_SERVER
              - COPY_EXTENTS
              - ADMIN_UP
              - INTERNAL_UP
              - SPAN_IMAGES
              - BASIC_STAGING
              - LIFE_CYCLE
              - CAPACITY_MANAGEMENT
              - FRAGMENT_IMAGES
              - CATALOG_BACKUP
              - CPR
              - RANDOM_WRITES
              - FT_TRANSFER
              - CAPACITY_MANAGED_RETENTION
              - CAPACITY_MANAGED_JOB_QUEUING
              - OPTIMIZED_IMAGE
              - METADATA
              - SNAPSHOT
              - PRIMARY
              - REPLICATION_SOURCE
              - REPLICATION_TARGET
              - MIRROR
              - INDEPENDENT
              - TARGETED_REPLICATION
        mediaServersCount:
          type: integer
          description: The number of media servers that are associated with the disk pool.
          minimum: 0
      required:
        - name
        - sType
        - diskVolumes
