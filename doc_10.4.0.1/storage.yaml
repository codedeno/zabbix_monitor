  /storage/bulk-volume-groups-requests:
    delete:
      description: |
        Asynchronously deletes one or more volume groups.

         **Access Control**\
         Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
         Namespace: `|STORAGE|TAPE-MEDIA|VOLUME-GROUPS|`\
         Requires Operation: `|OPERATIONS|DELETE|`
      tags:
        - Tape Media Volume Groups
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/deleteVolumeGroupsRequest"
            example:
              data:
                - id: 0:HCART:Group1
                  type: volumeGroupInfo
                - id: 0:HCART:Group2
                  type: volumeGroupInfo
        description: Volume group IDs to be deleted.
        required: true
      responses:
        "202":
          description: Bulk request accepted.
          headers:
            Location:
              description: |
                A link to the status monitor of the request.

                After the request is submitted, the maximum period that the status monitor will be retrievable
                is 24 hours. Canceling the request or restarting the Web server will immediately
                make the status monitor invalid.
              schema:
                type: string
                format: url
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "413":
          description: The request to delete volume groups contains too many items (>1024). Break up the request into multiple batches and resubmit.
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "429":
          description: Too many delete volume groups requests are already running (>32). Wait for one to complete before resubmitting.
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/bulk-volume-groups-requests/{requestId}":
    parameters:
      - name: requestId
        in: path
        required: true
        description: The request ID generated in the location header of delete bulk-volume-groups-requests api.
        schema:
          type: string
    get:
      description: |
        Retrieves the status of a bulk volume groups request specified by `requestId`.

        If the bulk request has completed (200 or 207 response status codes), regardless of
        the outcome of the individual volume group records, after this call, that request and all of its records
        will immediately be deleted and can no longer be retrieved.

         **Access Control**\
         Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
         Namespace: `|STORAGE|TAPE-MEDIA|VOLUME-GROUPS|`\
         Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Tape Media Volume Groups
      responses:
        "200":
          description: Successfully deleted the specified volume groups. There were no errors found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatus
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 204
                      id: 0:HCART:Group1
                      type: volumeGroupInfo
                    - httpStatus: 204
                      id: 0:HCART:Group2
                      type: volumeGroupInfo
        "202":
          description: Bulk request is in progress.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatus
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 202
                      id: 0:HCART:Group1
                      type: volumeGroupInfo
                    - httpStatus: 202
                      id: 0:HCART:Group2
                      type: volumeGroupInfo
        "207":
          description: |
            The bulk request has completed, but one or more volume groups in the bulk request could not be deleted.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatusWithErrors
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 404
                      id: 0:HCART:Group1
                      type: volumeGroupInfo
                      errors:
                        errorCode: 1
                        errorMessage: entity not found.
                    - httpStatus: 204
                      id: 0:HCART:Group2
                      type: volumeGroupInfo
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
    delete:
      description: |
        Cancels an ongoing bulk volume group request, specified by `requestId`, and retrieves its status.

        Regardless of the outcome of the individual volume group records, after this call, that request
        and all of its records will immediately be deleted and can no longer be retrieved.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|VOLUME-GROUPS|`\
        Requires Operation: `|OPERATIONS|DELETE|`
      tags:
        - Tape Media Volume Groups
      responses:
        "207":
          description: Successfully cancelled the bulk request.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatus
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 204
                      id: 0:HCART:Group1
                      type: volumeGroupInfo
                    - httpStatus: 422
                      id: 0:HCART:Group2
                      type: volumeGroupInfo
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "409":
          description: The bulk request has already completed.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatus
              example:
                meta:
                  bulkResourceStatus:
                    - httpStatus: 204
                      id: 0:HCART:Group1
                      type: volumeGroupInfo
                    - httpStatus: 204
                      id: 0:HCART:Group2
                      type: volumeGroupInfo
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
