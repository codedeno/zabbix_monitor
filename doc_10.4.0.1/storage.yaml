openapi: 3.0.0
info:
  version: "11.0"
  title: NetBackup Storage API
  description: |
    The NetBackup Storage API provides access to the storage of the NetBackup master server.
externalDocs:
  description: Getting Started Guide
  url: http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started/
servers:
  - url: '/netbackup'
    description: NetBackup Master
paths:
  "/storage/robots/{robotId}/async-contents":
    parameters:
      - $ref: "#/components/parameters/robotId"
    post:
      description: |
        Initiate the async process to get robot contents.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Robots
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/robotContentsRequest"
        required: true
      responses:
        "202":
          description: The robot contents request has been accepted.
          headers:
            Location:
              description: The status monitor URL for tracking the asynchronous request.
              schema:
                type: string
            Retry-After:
              description: The time in ISO-8601 format when the status may be checked.
              schema:
                type: string
                format: date-time
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/robots/{robotId}/async-contents-results/{robotRequestId}":
    get:
      parameters:
        - $ref: "#/components/parameters/robotId"
        - $ref: "#/components/parameters/robotRequestId"
      description: |
        Fetch the results of a robot contents request.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Robots
      responses:
        "200":
          description: Successfully returned the results of the robot contents request.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/robotContentsResponse"
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/media-id-prefixes/{mediaServer}":
    parameters:
      - name: mediaServer
        description: The FQDN host name of the media server.
        in: path
        required: true
        schema:
          type: string
    get:
      description: |
        Fetch the list of the media server's media ID prefixes.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Robots
      responses:
        "200":
          description: Successfully retrieved the media ID prefixes associated with the specified media server.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/getMediaIdPrefixes"
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: Media Server with the specified hostname is not found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
    put:
      description: |
        Set the list of the media server's media ID prefixes.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|UPDATE|`
      tags:
        - Robots
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/getMediaIdPrefixes"
        required: true
      responses:
        "204":
          description: Successfully set the media ID prefixes associated with the specified media server.
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: Media Server with the specified hostname is not found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/media-id-generation-rules/{mediaServer}":
    parameters:
      - name: mediaServer
        description: The FQDN host name of the media server.
        in: path
        required: true
        schema:
          type: string
    get:
      description: |
        Fetch the list of the media server's media ID generation rules.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Robots
      responses:
        "200":
          description: Successfully retrieved the media ID generation rules associated with the specified media server.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/mediaIdGenerationRules"
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: Media Server with the specified hostname is not found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
    put:
      description: |
        Set the list of the media server's media ID generation rules. A media ID generation rule converts a tape volume's barcode (up to 16 characters) to a media ID (6 characters). 

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|UPDATE|`
      tags:
        - Robots
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/mediaIdGenerationRules"
        required: true
      responses:
        "204":
          description: Successfully set the media ID generation rules associated with the specified media server.
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: Media Server with the specified hostname is not found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/media-type-mappings/{robotType}":
    get:
      parameters:
        - $ref: "#/components/parameters/mediaMappingRobotType"
      description: |
        Get the media type mappings for the specified robot type.
        Contains the list of vendor media types as well as the valid media types and default media type for each.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Robots
      responses:
        "200":
          description: The list of media type mappings.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/mediaMappings"
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  /storage/bulk-robot-requests:
    delete:
      description: |
        Asynchronously deletes robots specified in the request body.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-DEVICES|`\
        Requires Operation: `|OPERATIONS|DELETE|`
      tags:
        - Robots
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/bulkRobotRequest"
        required: true
      responses:
        "202":
          description: Bulk request accepted.
          headers:
            Location:
              description: A link to the status monitor of the request.
              schema:
                type: string
                format: url
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "413":
          description: The request to delete robots contains too many items (>1024). Break up the request into multiple batches and resubmit.
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "429":
          description: Too many robots deletion requests are already running (>32). Wait for one to complete before resubmitting.
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
    patch:
      description: |
        Asynchronously patches robots specified in the request body.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-DEVICES|`\
        Requires Operation: `|OPERATIONS|UPDATE|`
      tags:
        - Robots
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/patchBulkRobotRequest"
        required: true
      responses:
        "202":
          description: Bulk request accepted.
          headers:
            Location:
              description: A link to the status monitor of the request.
              schema:
                type: string
                format: url
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "413":
          description: The request to patch robots contains too many items (>1024). Break up the request into multiple batches and resubmit.
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "429":
          description: Too many robot patch requests are already running (>32). Wait for one to complete before resubmitting.
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/bulk-robot-requests/{requestId}":
    parameters:
      - name: requestId
        in: path
        required: true
        description: The ID of the bulk robot request.
        schema:
          type: string
    get:
      description: |
        Retrieves the status of a bulk robot request specified by `requestId`.

        If the bulk request has completed (200 or 207 response status codes), regardless of
        the outcome of the individual robot records, after this call, that request and all of its records
        will immediately be deleted and will no longer be retrievable.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-DEVICES|`\
        Requires Operation: `|OPERATIONS|DELETE|`\
        OR\
        Requires Operation: `|OPERATIONS|UPDATE|`
      tags:
        - Robots
      responses:
        "200":
          description: Successfully deleted the specified robots. There were no errors found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatus
        "202":
          description: Bulk request is in progress.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatus
        "207":
          description: |
            The bulk request has completed, but one or more robots in the bulk request could not be deleted.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatus
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
    delete:
      description: |
        Cancels an ongoing bulk robot request and retrieves its status, specified by `requestId`.

        Regardless of the outcome of the individual robot records, after this call, that request
        and all of its records will immediately be deleted and can no longer be retrieved.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-DEVICES|`\
        Requires Operation: `|OPERATIONS|DELETE|`
      tags:
        - Robots
      responses:
        "200":
          description: Successfully cancelled the bulk request.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatus
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "409":
          description: The bulk request has already completed.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/bulkResponseStatus
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/robots/{robotId}":
    parameters:
      - $ref: "#/components/parameters/robotId"
    get:
      description: |
        Get robot details by robot name.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-DEVICES|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Robots
      parameters:
        - name: include
          description: |
            Includes the device hosts associated with this robot.
          in: query
          required: false
          schema:
            type: string
            enum:
              - deviceHosts
      responses:
        "200":
          description: Successfully returned the robot details.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/getRobotInfoResponse"
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/robots/{robotId}/async-volume-configuration":
    parameters:
      - $ref: "#/components/parameters/robotId"
    post:
      description: |
        Manage robot volume configuration.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|UPDATE|`
      tags:
        - Robots
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/robotVolumeConfigurationRequest"
        required: true
      responses:
        "202":
          description: The volume configuration request has been accepted.
          headers:
            Location:
              description: The status monitor URL for tracking the initiated request.
              schema:
                type: string
            Retry-After:
              description: The time in ISO-8601 format when the status may be checked next.
              schema:
                type: string
                format: date-time
        "400":
          description: The server could not process the request. Possible causes include malformed JSON document structure or invalid attribute values.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: The specified robot was not found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/robots/{robotId}/async-volume-configuration-results/{robotRequestId}":
    parameters:
      - $ref: "#/components/parameters/robotId"
      - $ref: "#/components/parameters/robotRequestId"
    get:
      description: |
        Retrieves the results of the robot volume configuration request.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Robots
      responses:
        "200":
          description: |
            Successfully returned the results of the robot volume configuration request.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/robotVolumeConfigurationResponse"
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  /storage/robots-device-hosts:
    get:
      description: |
        Returns the list of unique device hosts for configured robots.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-DEVICES|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Robots
      responses:
        "200":
          description: Successfully returned the list of device hosts.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/deviceHostsResponse"
              example:
                data:
                  - id: hostname1.com
                    type: deviceHost
                  - id: hostname2.com
                    type: deviceHost
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/robot-inventory-file-download/{fileName}":
    get:
      description: |
        Downloads the file containing responses generated by `/storage/robots/{robotId}/async-contents-results/{robotRequestId}` or `/storage/robots/{robotId}/async-volume-configuration-results/{robotRequestId}` APIs. 

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Robots
      parameters:
        - name: fileName
          in: path
          required: true
          description: The filename of the API results file without its path.
          schema:
            type: string
      responses:
        "200":
          description: Successfully downloaded the file.
          content:
            application/vnd.netbackup+octet-stream;version=11.0:
              schema:
                type: string
                format: binary
              examples:
                robot contents:
                  value:
                    - Robot Contents                 Volume Configuration
                    - ""
                    - Slot   Tape  Barcode           Media ID Barcode        Mismatch Detected
                    - ====   ====  =============     ======== =============  =================
                    - "    1    Yes  000000S           00000S   000000S"
                    - "    2    Yes  000001S           00001S   000001S"
                    - "    3    Yes  000002S           00002S   000002S"
                    - "    4    Yes  000003S           00003S   000003S"
                    - "    5     No                    DJS456   123456         Yes"
                    - "    6    Yes  656565                                    Yes"
                    - "    7    Yes  888888            DJS888   888888"
                    - "    8     No"
                robot volume configuration:
                  value:
                    - Generating list of recommended changes ...
                    - ""
                    - Proposed Change(s) to Update the Volume Configuration
                    - =====================================================
                    - Logically add new media 12345 (barcode 12345) to robot slot 8.
                    - ""
                    - --------------------------------------------------------------------
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/robots/{robotId}/eject-precheck":
    parameters:
      - $ref: "#/components/parameters/robotId"
    post:
      description: |
        Performs eject pre checks for multiple volumes

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|STORAGE|MANAGE-TAPE-MEDIA|`
      tags:
        - Eject Volumes
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/ejectPrecheckRequest"
        required: true
      responses:
        "200":
          description: Successfully performed eject pre checks for multiple volumes.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/ejectPrecheckResponse"
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/robots/{robotId}/eject-volumes":
    parameters:
      - $ref: "#/components/parameters/robotId"
    post:
      description: |
        Triggers eject on one or more tape media volumes in a robot

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|STORAGE|MANAGE-TAPE-MEDIA|`
      tags:
        - Eject Volumes
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/ejectVolumesRequest"
        required: true
      responses:
        "204":
          description: Successfully triggered eject on one or more tape media volumes in a robot. You can monitor the status of this eject by calling the POST /storage/robots/{robotId}/verify-eject API
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          $ref: ./common.yaml#/components/responses/errorNotFound
