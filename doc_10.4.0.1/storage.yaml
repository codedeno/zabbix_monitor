    accessKeyDetails:
      type: object
      description: The credentials configuration details for an Amazon S3 or an Azure cloud storage server.
      properties:
        userName:
          type: string
          description: The user name for the cloud storage server. Required if useCms flag is not set `true` in cloud provider attributes.
        password:
          type: string
          description: The password for the cloud storage server. Required if useCms flag not set `true` in cloud provider attributes.
        cmsCredName:
          type: string
          description: |
            The CMS credential name that points to the credentials for the cloud storage server. Required if useCms flag is `true` in cloud provider attributes.
    credentialBrokerDetails:
      type: object
      description: Credential broker options for Amazon Government cloud storage.
      required:
        - serviceUrl
        - agency
        - missionName
        - role
        - certificateFileName
        - privateKeyFileName
      properties:
        serviceUrl:
          type: string
          description: The service URL.
        agency:
          type: string
          description: The agency.
        missionName:
          type: string
          description: The mission name.
        role:
          type: string
          description: The role.
        certificateFileName:
          type: string
          description: |
            The certificate file name. The file must reside at the following location - On Windows - install_dir\db\cloud On Unix - install_dir/db/cloud
        privateKeyFileName:
          type: string
          description: The private key file name.
        privateKeyPassPhrase:
          type: string
          description: The private key passphrase. This parameter is optional and must not exceed 100 characters.
    awsIdentityRoleDetails:
      type: object
      description: The AWS IAM role details for the cloud storage provider.
      required:
        - awsIdentityRoleType
      properties:
        awsIdentityRoleType:
          type: string
          description: |
            The type of AWS IAM roles used for authentication. EC2_ROLE - Use the role that is assigned to the Amazon EC2 instance.
          enum:
            - EC2_ROLE
    servicePrincipalDetails:
      type: object
      description: The service principal authentication details for an Azure cloud storage server.
      required:
        - cmsCredName
      properties:
        cmsCredName:
          type: string
          description: |
            The CMS credential name that points to the service principal details for the cloud storage server.
    iamRoleAnywhereDetails:
      type: object
      description: The IAM role anywhere authentication details for an Amazon cloud storage server.
      required:
        - cmsCredName
      properties:
        cmsCredName:
          type: string
          description: |
            The CMS credential name that points to the IAM role anywhere details for the cloud storage server.
    v2Identity:
      type: object
      description: For Swift cloud storage server, if authentication type is `IDENTITY_V2`, provide credentials of V2 version.
      required:
        - authenticationDetails
        - tenantDetails
        - userCredentialsDetails
      properties:
        authenticationDetails:
          $ref: "#/components/schemas/authenticationDetails"
        tenantDetails:
          $ref: "#/components/schemas/tenantDetails"
        userCredentialsDetails:
          $ref: "#/components/schemas/userCredentialsDetails"
    tenantDetails:
      type: object
      description: The tenant details required for V2 version.
      properties:
        tenantId:
          type: string
          description: |
            The user tenant ID that is associated with cloud storage credentials. The tenant ID not required if tenant name is provided.
        tenantName:
          type: string
          description: |
            The user tenant name that is associated with cloud storage credentials. The tenant name not required if tenant ID is provided.
    v3Identity:
      type: object
      description: For Swift cloud storage server, if authentication type is IDENTITY_V3, provide credentials of V3 version.
      required:
        - authenticationDetails
        - userDetails
        - projectDetails
      properties:
        authenticationDetails:
          $ref: "#/components/schemas/authenticationDetails"
        userDetails:
          $ref: "#/components/schemas/userDetails"
        projectDetails:
          $ref: "#/components/schemas/projectDetails"
    userDetails:
      type: object
      description: The user details for cloud storage.
      required:
        - password
      properties:
        userId:
          type: string
          description: |
            The user ID associated with cloud storage credentials. User name and domain information is not required if the user ID is specified.
        userName:
          type: string
          description: The user name to access the cloud storage.
        password:
          type: string
          description: The password to access the cloud storage. Password must not exceed 100 characters.
        domainId:
          type: string
          description: |
            The domain ID of the user that is associated with cloud storage credentials. The domain ID is not required if the domain name is specified.
        domainName:
          type: string
          description: |
            The domain name of the user that is associated with cloud storage credentials. The domain name is not required if the domain ID is specified.
    projectDetails:
      type: object
      description: The project details for the cloud storage.
      properties:
        projectId:
          type: string
          description: |
            The project ID associated with cloud storage credentials. The project name and domain information is not required if project ID provided.
        projectName:
          type: string
          description: The project name associated with cloud storage credentials.
        domainId:
          type: string
          description: |
            The project domain ID associated with cloud storage credentials. The domain ID is not required if the domain name is specified.
        domainName:
          type: string
          description: |
            The project domain name associated with cloud storage credentials. The domain name is not required if the domain ID is specified.
    noneIdentity:
      type: object
