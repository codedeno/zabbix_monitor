              type: string
              enum:
                - DEFAULT
                - HCART
                - HCART2
                - HCART3
                - HC_CLN
                - HC2_CLN
                - HC3_CLN
                - DLT
                - DLT2
                - DLT3
                - DLT_CLN
                - DLT2_CLN
                - DLT3_CLN
              description: The media type of the barcode rule
            volumePool:
              type: string
              description: Volume pool of the barcode code.
              maxLength: 128
            maxMounts:
              type: integer
              minimum: 0
              description: The maximum number of mounts (or cleanings) that are allowed for the volume.
            description:
              type: string
              description: User defined description for the barcode rule.
              maxLength: 256
