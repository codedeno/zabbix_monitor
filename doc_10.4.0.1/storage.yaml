  /storage/tape-media:
    get:
      description: |
        Retrieve tape media volumes.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Tape Media
      parameters:
        - name: filter
          description: |
            Filter criteria syntax is based on OData standards. Filtering is supported on the following attributes:
            |Name|Supported Operators|Description|Schema|
            |---|---|---|---|
            |barcode|eq ne and or not () contains endswith startswith tolower toupper|The full barcode as read by the physical robot and is used by NetBackup to ensure that the robot loads the correct volume.|string|
            |mediaType|eq ne and or not ()|NetBackup media type. Possible values: HCART, DLT, DLT_CLN, HC_CLN, HCART2, HC2_CLN, DLT2, DLT2_CLN, HCART3, HC3_CLN, DLT3, DLT3_CLN|string|
            |robotType|eq ne and or not ()|The robot type. Possible values: NOT_ROBOTIC, ACS, TLD, NA|string|
            |robotNumber|eq ne gt ge lt le and or|The robot number.|integer|
            |robotHost|eq ne and or not () contains endswith startswith tolower toupper|The robot control host.|string|
            |slot|eq ne gt ge lt le and or|Slot number of the media.|integer|
            |volumeGroup|eq ne and or not () contains endswith startswith tolower toupper|The volume group name.|string|
            |volumePool|eq ne and or not () contains endswith startswith tolower toupper|The volume pool name.|string|
            |mounts|eq ne gt ge lt le and or|The number of mounts for the volume.|integer|
            |timeAssigned|eq ne lt gt le ge|The ISO 8601 timestamp that indicates the date and time when a piece of media was first allocated or had its first backup written to it.|date-time|
            |application|eq ne and or not ()|Type of application. Possible values: NETBACKUP, OLD_CATEGORY, ADDON, CATALOG|string|
            |maxMounts|eq ne gt ge lt le and or|The maximum number of mounts that are allowed for this volume.|integer|
            |firstMount|eq ne lt gt le ge|The ISO 8601 timestamp that indicates when the media was first mounted.|date-time|
            |lastMount|eq ne lt gt le ge|The ISO 8601 timestamp that indicates when the media was last mounted.|date-time|
            |volumeExpiration|eq ne lt gt le ge|The ISO 8601 timestamp that indicates volume expiration.|date-time|
            |cleaningsRemaining|eq ne gt ge lt le and or|The number of how many times more the cleaning media can be used.|integer|
            |created|eq ne lt gt le ge|The ISO 8601 timestamp that indicates when the media is created.|date-time|
            |description|eq ne and or not () contains endswith startswith tolower toupper|The media description for the volume.|string|
            |vaultName|eq ne and or not () contains endswith startswith tolower toupper|The name of the vault.|string|
            |dateVaulted|eq ne lt gt le ge|The ISO 8601 timestamp that indicates when the media was sent to offsite storage.|date-time|
            |returnDate|eq ne lt gt le ge|The ISO 8601 timestamp that indicates time the media was returned from offsite.|date-time|
            |vaultSlot|eq ne gt ge lt le and or|The physical slot number where the given piece of media resides.|integer|
            |sessionId|eq ne gt ge lt le and or|The ID of a vault session.|integer|
            |vaultContainerId|eq ne and or not () contains endswith startswith tolower toupper|The ID for the vault container that stores the volumes.|string|
            |dateExpiration|eq ne lt gt le ge|The ISO 8601 timestamp that indicates the expiration date.|date-time|
            |lastWritten|eq ne lt gt le ge|The ISO 8601 timestamp that indicates the date and time that this media was last written.|date-time|
            |lastRead|eq ne lt gt le ge|The ISO 8601 timestamp that indicates the date and time that this media was last read.|date-time|
            |kiloBytes|eq ne gt ge lt le and or|The total kilobytes used on this media.|long|
            |images|eq ne gt ge lt le and or|The number of images on this media.|integer|
            |validImages|eq ne gt ge lt le and or|The number of valid images on this media.|integer|
            |retentionPeriod|eq ne gt ge lt le and or|The retention level for the copy.|integer|
            |numberOfRestores|eq ne gt ge lt le and or|The number of restores for the copy.|integer|
            |mediaStatus|eq ne and or not () contains endswith startswith tolower toupper|The media status of the volumes. The status could be one of the possible values or a combination of values. Possible values: FROZEN, SUSPENDED, FULL, MULTIPLE_RETENTION_LEVELS, IMPORTED, ACTIVE, MULTIPLEXED, WORM, BE.|string|
            |conflicts|eq ne gt ge lt le and or|The conflicts found during database merge.|integer|
            |originHost|eq ne and or not () contains endswith startswith tolower toupper|The origin host name.|string|
            |mediaOwner|eq ne and or not () contains endswith startswith tolower toupper|The media server or group that owns the media.|string|
            |serverGroup|eq ne and or not () contains endswith startswith tolower toupper|The server group.|string|
            |lastWriteHost|eq ne and or not () contains endswith startswith tolower toupper|The last host that wrote to the media.|string|
          in: query
          required: false
          schema:
            type: string
        - $ref: ./common.yaml#/components/parameters/pageLimit
        - $ref: ./common.yaml#/components/parameters/pageAfter
        - $ref: ./common.yaml#/components/parameters/pageBefore
        - name: sort
          description: |
            The value of this parameter must be a comma-separated list of sort fields in the order they are to be sorted.
            Sorting is supported on the following attributes:
            |Name|
            |---|
            |mediaId|
            |barcode|
            |mediaType|
            |robotType|
            |robotNumber|
            |robotHost|
            |slot|
            |volumeGroup|
            |volumePool|
            |mounts|
            |timeAssigned|
            |application|
            |maxMounts|
            |firstMount|
            |lastMount|
            |volumeExpiration|
            |cleaningsRemaining|
            |created|
            |description|
            |vaultName|
            |dateVaulted|
            |returnDate|
            |vaultSlot|
            |sessionId|
            |vaultContainerId|
            |dateExpiration|
            |lastWritten|
            |lastRead|
            |kiloBytes|
            |images|
            |validImages|
            |retentionPeriod|
            |numberOfRestores|
            |mediaStatus|
            |conflicts|
            |originHost|
            |mediaOwner|
            |serverGroup|
            |lastWritten|
          in: query
          required: false
          schema:
            type: string
