                  OPEN_STORAGE - Managed as OpenStorage storage server. DISK_GROUPS - Aware of disk pools/enclosures. ACTIVE_DISK_GROUPS - Allow active management of disk groups. ACTIVE_SERVERS - Allow active management of storage servers. ROVING_VOLUMES - Active mount/unmounts for disk volumes. COPY_EXTENTS - Allow optimized duplication. ADMIN_UP - Administrative state is UP. INTERNAL_UP - Internal state is UP. SPAN_IMAGES - Allow images to span disk volumes. BASIC_STAGING - Allow basic image staging. LIFE_CYCLE - Allow image life cycle management. CAPACITY_MANAGEMENT - Allow capacity management. FRAGMENT_IMAGES - Allow image fragmentation. CATALOG_BACKUP - Allow catalog backups. CPR - Allow checkpoint / restart. RANDOM_WRITES - Allow random write access. FT_TRANSFER - Allow access through FT channel. PREF_RESTORE - Preferred use for restores. REQ_RESTORE - Required use for restores. REQ_DUPLICATE - Required use for duplications. CAPACITY_MANAGED_RETENTION - Allow capacity managed retention. CAPACITY_MANAGED_JOB_QUEUING - Allow capacity managed job queuing. OPTIMIZED_IMAGE - Allow virtual image construction. METADATA - Describe client data during backup. QUEUE_ON_DOWN - Queue jobs when server status is down. INSTANT_ACCESS - Allow instant access to backup image. DEDUPE_TO_CLD - Allow deduplication to cloud. PRIMARY - Allow snapshots from sources mounted on a client. SNAPSHOT - Allow to store snapshots. MIRROR - Allow mirrored replication method. OST_DIRECT_COPY_TO_TAPE - Allow OST direct copy to tape. SRV_EVASYNC - Allow push event model and named async APIs. SRV_EVSYNC - Allow pull event model and named async APIs. SUPPORTS_REPLICATION - Allow Auto image replication. WORM_SUPPORTED - Specifies if WORM (write once read many) is supported on the storage server.
                enum:
                  - OPEN_STORAGE
                  - DISK_GROUPS
                  - ACTIVE_DISK_GROUPS
                  - ACTIVE_SERVERS
                  - ROVING_VOLUMES
                  - COPY_EXTENTS
                  - ADMIN_UP
                  - INTERNAL_UP
                  - SPAN_IMAGES
                  - BASIC_STAGING
                  - LIFE_CYCLE
                  - CAPACITY_MANAGEMENT
                  - FRAGMENT_IMAGES
                  - CATALOG_BACKUP
                  - CPR
                  - RANDOM_WRITES
                  - FT_TRANSFER
                  - PREF_RESTORE
                  - REQ_RESTORE
                  - REQ_DUPLICATE
                  - CAPACITY_MANAGED_RETENTION
                  - CAPACITY_MANAGED_JOB_QUEUING
                  - OPTIMIZED_IMAGE
                  - METADATA
                  - QUEUE_ON_DOWN
                  - INSTANT_ACCESS
                  - DEDUPE_TO_CLD
                  - PRIMARY
                  - SNAPSHOT
                  - MIRROR
                  - OST_DIRECT_COPY_TO_TAPE
                  - SRV_EVASYNC
                  - SRV_EVSYNC
                  - SUPPORTS_REPLICATION
                  - WORM_SUPPORTED
            storageUnits:
              type: array
              description: The storage units configured on the storage server.
              items:
                type: string
            isWormSupported:
              type: boolean
              description: |
                If set to `true`, WORM (write once read many) feature is configured on the storage server.
            isUshareSupported:
              type: boolean
              description: |
                If set to `true`, Universal share feature is configured on the storage server.
            sambaSecurityMode:
              type: string
              enum:
                - ADS
                - USER
                - UNKNOWN
              description: |
                The SMB authentication mode configured on the storage server
                ADS - Active Directory authentication is configured
                USER - Local User Authentication is configured
                UNKNOWN - Indicates an error in determining the configured SMB authentication method
            isKerberosSupported:
              type: boolean
              default: false
              description: The Kerberos authentication service configured on the storage server
            msdpAttributes:
              $ref: "#/components/schemas/msdpStorageServerDetails"
            cloudAttributes:
              $ref: "#/components/schemas/cloudStorageServerDetails"
            cloudCatalystAttributes:
              $ref: "#/components/schemas/cloudCatalystDetails"
            openStorageAttributes:
              $ref: "#/components/schemas/openStorageDetails"
            advancedDiskAttributes:
              $ref: "#/components/schemas/advancedDiskConfiguration"
            extendedCapabilities:
              description: The list of MSDP storage server extended capabilities.
              type: array
              items:
                type: string
                description: The name of the MSDP storage server capability.
          required:
            - name
            - storageCategory
            - sType
            - additionalMediaServersDetails
            - encryptionEnabled
            - kmsEnabled
