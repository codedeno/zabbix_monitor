                  description: |
                    The name fo the universal share accelerator to create. Only used for ACCL-BYO mode.
                asset:
                  type: string
                  description: |
                    The asset being backed up by the universal share accelerator. Only used for ACCL-BAAS mode.
                policyName:
                  type: string
                  description: |
                    The name of the policy involved in the backup using this universal share accelerator. Only used for ACCL-BAAS mode.
                diskVolume:
                  type: string
                  description: The name of the disk volume selected for this universal share accelerator.
                mode:
                  type: string
                  description: The accelerator mode selected for this universal share accelerator
                  enum:
                    - ACCL_BAAS
                    - ACCL_BYO
                backupId:
                  type: string
                  description: The backupId of the backup that this universal share accelerator will be assigned to. Only used for ACCL-BAAS mode.
                clients:
                  type: array
                  items:
                    $ref: "#/components/schemas/universalShareClient"
                quotaSizeInBytes:
                  type: integer
                  format: int64
                  description: The maximum amount of data that can be stored on the universal share before deduplication.
    patchUniversalShareAccelerator:
      description: The payload that updates the universal share accelerator.
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
          properties:
            id:
              type: string
              description: The unique identifier for the universal share accelerator.
            type:
              description: The resource type.
              type: string
              enum:
                - universalShareAccelerator
            attributes:
              type: object
              properties:
                backupId:
                  type: string
                  description: The backupId of the backup that this universal share accelerator is assigned to.
                quotaSizeInBytes:
                  type: integer
                  format: int64
                  description: The maximum amount of data that can be stored on the universal share before deduplication.
    universalShareConfigs:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - id
            - attributes
          properties:
            type:
              type: string
              enum:
                - universalShareConfigs
            id:
              type: string
              description: The unique identifier of the storage server.
            attributes:
              $ref: "#/components/schemas/universalShareConfigAttributes"
    universalShareConfigAttributes:
      description: The universal share configurations.
      type: object
      required:
        - freeSpace
        - defaultCacheCapacity
        - requestCacheCapacity
        - maxRequestCacheCapacity
        - minRequestCacheCapacity
        - isMinRequiredDiskSpaceAvail
      properties:
        freeSpace:
          type: string
          description: |
            Data store free disk space.
            Default in Gigabytes unit if only numeric and unit string is absent.
          example: 122400
        defaultCacheCapacity:
          type: string
          description: |
            The default configuration cloud cache capacity.
            Default in Gigabytes unit if only numeric and unit string is absent.
          example: 500
        maxRequestCacheCapacity:
          type: string
          description: |
            The upper range value which request cache capacity can be set.
            Default in Gigabytes unit if only numeric and unit string is absent.
          example: 1TB
        minRequestCacheCapacity:
          type: string
          description: |
            The minimum value which the request cache capacity can be set.
            Default in Gigabytes unit if only numeric and unit string is absent.
          example: 128GiB
        requestCacheCapacity:
          type: string
          description: |
            The new calculated global universal share cloud cache configuration value based on the data store free disk space.
            Default in Gigabytes unit if only numeric and unit string is absent.
          example: 500
        isMinRequiredDiskSpaceAvail:
          type: boolean
          description: |
            flag to indicate if current available data store free disk space meet the minimum cloud cache size.
    patchUniversalShareConfigs:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
          properties:
            id:
              type: string
              description: The unique identifier of the storage server.
            type:
              type: string
              enum:
                - universalShareConfigs
            attributes:
              $ref: "#/components/schemas/patchUniversalShareConfigAttributes"
    patchUniversalShareConfigAttributes:
      description: The payload that updates the universal share configurations.
      type: object
      required:
        - requestCacheCapacity
      properties:
        requestCacheCapacity:
          type: string
          description: |
            The new global request universal share cloud cache configuration value.
            Default in Gigabytes unit if only numeric and unit string is absent.
          example: 256GiB
    storageServerRelationships:
      type: object
      required:
        - universalShares
      properties:
        universalShares:
          description: Universal shares that are associated with this storage server.
          type: object
          properties:
            links:
              type: object
              properties:
                related:
                  $ref: "#/components/schemas/linkObject"
            data:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  id:
                    type: string
    linkObject:
      type: object
      properties:
        href:
          type: string
    driveFieldCleaningFrequency:
      type: integer
      minimum: 0
      maximum: 10000
