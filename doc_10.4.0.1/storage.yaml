    storageUnitDefinition:
      type: object
      properties:
        links:
          type: object
          properties:
            self:
              $ref: "#/components/schemas/linkObject"
        type:
          type: string
          description: Type of the object.
          enum:
            - storageUnit
        id:
          type: string
          description: The name of the storage unit.
        attributes:
          $ref: "#/components/schemas/storageUnitAttributes"
        relationships:
          type: object
          properties:
            diskPool:
              $ref: "#/components/schemas/associatedDiskPool"
      required:
        - links
        - type
        - id
        - attributes
        - relationships
    storageUnitAttributes:
      type: object
      description: The attributes of the storage unit.
      oneOf:
        - $ref: "#/components/schemas/tapeExclusiveStorageUnitAttributes"
        - $ref: "#/components/schemas/nonTapeStorageUnitAttributes"
      properties:
        name:
          type: string
          description: The name of the storage unit.
        storageType:
          type: string
          description: The type of the storage unit.
        storageSubType:
          type: string
          description: The subtype of the storage unit.
        storageServerType:
          type: string
          description: The type of the storage server associated with this storage unit.
        storageCategory:
          type: string
          description: The category of the storage unit.
          enum:
            - ADVANCED_DISK
            - BASIC_DISK
            - CLOUD
            - CLOUD_CATALYST
            - MSDP
            - OPEN_STORAGE
            - TAPE
        absolutePath:
          type: string
          description: |
            The pathname to directory or volume available for any storage unit that is not based on disk pools.
            This field is applicable only for basic disk.
        okOnRoot:
          type: boolean
          description: |
            If this option is set to `true`, this directory can exist on a root file system or system disk.
            This field is applicable only for basic disk.
        stageData:
          type: boolean
          description: |
            If this option is set to `true`, the temporary staging area is enabled.
            This field is applicable only for basic disk.
        useAnyAvailableMediaServer:
          description: If set to `true`, any available media server is used.
          type: boolean
          default: true
        accelerator:
          type: boolean
          description: If set to `true`, the storage unit supports NetBackup Accelerator.
        replicationCapable:
          type: boolean
          description: If set to `true`, the storage unit supports replication. The storage unit can be used as a source, target, or both.
        replicationSourceCapable:
          type: boolean
          description: If set to `true`, the storage unit can be used as a source for replicating backup images.
        replicationTargetCapable:
          type: boolean
          description: If set to `true`, the storage unit can be used as a source for replicating backup images.
        snapshot:
          type: boolean
          description: If set to `true`, the storage unit can be used to hold snapshots.
        mirror:
          type: boolean
          description: If set to `true`, the storage unit can use a mirrored replication method.
        independent:
          type: boolean
          description: If set to `true`, the storage unit can use a non-mirrored replication method.
        primary:
          type: boolean
          description: If set to `true`, the storage unit is capable of Snapshots from sources mounted on a client.
        instantAccessEnabled:
          type: boolean
          description: If set to `true`, the storage unit supports instant access.
        scaleOutEnabled:
          type: boolean
          description: If set to `true`, the storage unit supports scale-out storage.
        isCloudSTU:
          type: boolean
          description: If set to `true`, the storage unit is a cloud storage unit.
        freeCapacityBytes:
          type: integer
          format: int64
          description: |
            The space that is available for the storage unit, in bytes.
            This field is not applicable for Cloud and CloudCatalyst.
        totalCapacityBytes:
          type: integer
          format: int64
          description: |
            The total capacity of the storage unit, in bytes.
            This field is not applicable for Cloud and CloudCatalyst.
        usedCapacityBytes:
          type: integer
          format: int64
          description: |
            The space in the storage unit that is used, in bytes.
            This field is not applicable for Cloud and CloudCatalyst.
        mediaServerDetails:
          type: array
          description: The list of media servers associated with the storage server.
          items:
            $ref: "#/components/schemas/mediaServerResponse"
        maxFragmentSizeMegabytes:
          description: |
            The maximum fragment size in MB. The default and maximum value for MSDP storage is 51200 MB. The default and maximum value for Tape storage is 1048576 MB. The minimum value for Tape storage is 50 MB. The default and maximum value for other storage type is 524288 MB.
          type: integer
          minimum: 20
        onDemandOnly:
          description: If set to `true`, the storage unit is available on-demand.
          type: boolean
          default: false
        wormCapable:
          type: boolean
          description: |
            If set to `true`, the WORM (write once read many) feature is available for use for the storage unit.
        useWorm:
          type: boolean
          description: |
            If set to `true`, the WORM (write once read many) feature is configured for the storage unit.
          default: false
        capabilities:
          description: The list of storage unit capabilities.
          type: array
          items:
            type: string
            description: The name of the storage unit capability.
        robotType:
          type: string
          description: The type of robot that contains this drive. For example, TL4 or ACS.
          enum:
            - NA
            - NOT_ROBOTIC
            - ACS
            - TLD
        robotNumber:
          type: integer
          description: A unique, logical number that identifies the robot.
        density:
          type: string
          description: The media density.
          enum:
            - DQSCSI
            - DHC8MM
            - D800
            - D1600
            - D3200
            - D6250
            - DHCART
            - DDD8MM
            - DT120
            - DODISKWM
            - DODISKWO
            - DCDD8MM
            - D4MM
            - DDLT
            - DHCART2
            - DDLT2
            - D8MM
            - D8MM2
            - DD2
            - DDTF
            - DHCART3
            - DDLT3
            - D8MM3
            - NA
        multiplexing:
          type: integer
          description: |
            The maximum multiplexing factor. Multiplexing sends concurrent, multiple backups from one or more clients to a single drive. Only applies when the storageCategory is set to TAPE. The default value is 1, meaning no multiplexing.
          default: 1
          minimum: 1
          maximum: 32
        path:
          type: string
          description: The full path to the disk file system where the data is stored.
        ndmpHost:
          type: string
          description: |
            The NDMP host name. Only applies when the storageCategory is set to TAPE.
        enableBlockSharing:
          type: boolean
          description: Indicates if block sharing is enabled.
        transferThrottle:
          type: integer
          description: |
            The maximum data transfer bandwidth for SnapVault. A setting of 0 is unlimited bandwidth.
          default: 0
          minimum: 0
          maximum: 9999999
        fileSystemExport:
          type: boolean
          description: Indicates if file system export is enabled.
        diskStagingSchedule:
          $ref: "#/components/schemas/diskStagingScheduleDetails"
      required:
        - name
        - storageType
        - storageSubType
        - storageServerType
        - storageCategory
        - accelerator
        - replicationCapable
        - replicationSourceCapable
        - replicationTargetCapable
        - instantAccessEnabled
        - scaleOutEnabled
        - isCloudSTU
        - maxFragmentSizeMegabytes
        - onDemandOnly
        - wormCapable
        - useWorm
    tapeExclusiveStorageUnitAttributes:
      type: object
      properties:
        maxConcurrentDrives:
          description: The maximum number of concurrent drives. This is only valid for tape storage units.
          type: integer
          default: 1
          maximum: 256
          minimum: 0
    nonTapeStorageUnitAttributes:
      type: object
      properties:
        maxConcurrentJobs:
          description: The maximum number of concurrent jobs. This is not valid for tape storage units. Tape storage units will use maxConcurrentDrives instead.
          type: integer
          default: 1
          maximum: 4096
          minimum: 0
    diskStagingScheduleDetails:
      type: object
      description: The attributes of the storage unit.
      properties:
        scheduleName:
          type: string
          description: The name of the schedule.
        scheduleType:
          type: string
          description: The type of the schedule.
          enum:
            - CALENDAR
            - FREQUENCY
        frequencySeconds:
          type: integer
          description: For frequency schedule types the frequency at which to perform the backup in seconds.
          minimum: 1
          maximum: 2147040000
        acceleratorForcedRescan:
          type: boolean
          description: Indicates if file checksums are stored to aid in change detection. This parameter applies only to to NetBackup Accelerator backups.
          default: false
        retriesAllowedAfterRunDay:
          type: boolean
          description: Indicates if backups can retry on any day that has an open backup window. This parameter only applies to calendar-based schedules.
        relocationJobPriority:
          type: integer
          description: Priority of jobs started from this schedule (higher number is greater priority).
          minimum: 0
          maximum: 99999
        finalDestinationStorageUnit:
          type: string
          description: The final destination storage unit name. The value can be the name of an existing storage unit, or a value of "*ANY*" enables any available storage unit.
        finalDestinationVolumePool:
          type: string
          description: The final destination volume pool name.
        finalDestinationMediaOwner:
          type: string
          description: The final destination media owner name. The value can be the name of a server group, or a value of "*ANY*" causes NetBackup to choose the media owner. A value of "*NONE*" causes the media server that writes the image to be the media owner.
        useAlternateReadServer:
          type: boolean
          description: Enables use of an alternate read server.
          default: false
        alternateReaderServer:
          type: string
          description: The name of the alternate read server. The alternate read server is only used if the useAlternateReadServer attribute is true.
        includeDates:
          type: object
          description: Recurring days of the week recurring days of the month and exact dates on which this policy does run. This parameter only applies to calendar-based schedules
          properties:
            lastDayOfMonth:
              type: boolean
              description: Indicates if the last day of the month is included.
            recurringDaysOfMonth:
              type: array
              description: Recurring days of the month.
              items:
                type: integer
                description: The number of a specific day of the month starting with 1.
              minItems: 1
              maxItems: 31
            recurringDaysOfWeek:
              type: array
              description: Recurring days of a week.
              items:
                type: string
                description: A specific day of a specific week.  The format is \WEEK:DAY\. WEEK is the number of the week within the month.  Possible values for WEEK are 1 2 3 4 and 5 (LAST). DAY is the day of the week.  Possible values for DAY are 1 (Sunday) through 7 (Saturday).
              maxItems: 35
            specificDates:
              type: array
              description: A list of specific dates.
              items:
                type: string
                format: date
                description: |
                  The specific dates to include, in ISO 8601 format. Note: This date represents the time zone for the primary server. For example, "2022-10-25T00:00:00.000Z" is equivalent to "10/25/2022 12:00:00 AM" in the primary server's time zone.
                example: 2023-08-24T13:13:00.000Z
        excludeDates:
          type: object
          description: Recurring days of the week recurring days of the month and exact dates on which this policy does not run. This parameter only applies to calendar-based schedules
          properties:
            lastDayOfMonth:
              type: boolean
              description: Indicates if the last day of the month is excluded.
            recurringDaysOfMonth:
              type: array
              description: Recurring days of the month.
              items:
                type: integer
                description: The number of a specific day of the month starting with 1.
              maxItems: 31
            recurringDaysOfWeek:
              type: array
              description: Recurring days of a week.
              items:
                type: string
                description: A specific day of a specific week.  The format is \WEEK:DAY\. WEEK is the number of the week within the month.  Possible values for WEEK are 1 2 3 and 4. DAY is the day of the week.  Possible values for DAY are 1 (Sunday) through 7 (Saturday).
              maxItems: 35
            specificDates:
              type: array
              description: A list of specific dates.
              items:
                type: string
                format: date
                description: |
                  The specific dates to exclude, in ISO 8601 format. Note: This date represents the time zone for the primary server. For example, "2022-10-25T00:00:00.000Z" is equivalent to "10/25/2022 12:00:00 AM" in the primary server's time zone.
                example: 2023-08-24T13:13:00.000Z
        startWindow:
          type: array
          description: |
            The window during which the backup is allowed to start.  Each day of the week is defined independently.  Entry 1 is Sunday, entry 2 is Monday, and so on.
          maxItems: 7
          items:
            type: object
            properties:
              dayOfWeek:
                type: integer
                description: |
                  The day of the week the backup window starts.  Possible values for DAY are 1 (Sunday) through 7 (Saturday).
                minimum: 1
                maximum: 7
              durationSeconds:
                type: integer
                description: |
                  The start time of the backup window, expressed in seconds elapsed since the beginning of the day.
                minimum: 0
                maximum: 86399
              startSeconds:
                type: integer
                description: The duration of the backup window expressed in seconds.
                minimum: 1
                maximum: 86400
            required:
              - dayOfWeek
              - durationSeconds
              - startSeconds
        backupCopies:
          type: object
          description: Specifies the number of backup copies. The maximum number of copies allowed is 4. Entry 1 reflects the primary schedule copy which is always enabled. Entries 2 3 or 4 reflect additional copies which are optional.
          properties:
            copies:
              type: array
              description: The list of copy information.
              items:
                type: object
                properties:
                  failStrategy:
                    type: string
                    description: The approach taken if a particular image fails to copy.
                    enum:
                      - CONTINUE
                      - FAIL_ALL_COPIES
                  mediaOwner:
                    type: string
                    description: The media server or group that owns this copy. The value can be the name of a server group, or a value of "*ANY*" causes NetBackup to choose the media owner. A value of "*NONE*" causes the media server that writes the image to be the media owner.
                  retentionLevel:
                    type: integer
                    description: The retention level for the copy.
                    minimum: 0
                    maximum: 100
                  retentionPeriod:
                    type: object
                    description: The retention period for the copy to be specified in quantity and units.
                    properties:
                      value:
                        type: integer
                        description: The value of the retention period in terms of unit defined.
                      unit:
                        type: string
                        description: The unit of the retention period in terms of timefor exampleweeksmonthsyears and so on.
                        enum:
                          - SECONDS
                          - MINUTES
                          - HOURS
                          - DAYS
                          - WEEKS
                          - MONTHS
                          - YEARS
                          - INFINITE
                  storage:
                    type: string
                    description: The name of the storage unit that is associated with the copy. The value can be the name of an existing storage unit, or a value of "*NULL*" enables any available storage unit.
                  volumePool:
                    type: string
                    description: The name of the volume pool that is associated with the copy.
            priority:
              type: integer
              description: The priority of jobs that are associated with any additional copies that are specified. The higher the number the higher the priority (relative to other NetBackup jobs).  Note this has no impact on the primary copy.
              minimum: 0
              maximum: 99999
      required:
        - scheduleName
        - scheduleType
