        description: The properties to update a barcode rule.
        required: true
      responses:
        "204":
          description: Successfully updated the barcode rule.
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: Specified barcode rule not found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "409":
          description: Barcode rule already exists. This can occur if the id/tag of a barcode rule is updated to be the same as an existing barcode tag.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
    delete:
      description: |
        Delete the specified barcode rule.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|DELETE|`
      tags:
        - Robots
      responses:
        "204":
          description: Successfully deleted the barcode rule.
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: Specified barcode rule not found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
    cookieAuth:
      type: apiKey
      in: cookie
      name: Authorization
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    mediaMappingRobotTypeEnum:
      description: Specifies the robot types that support media type mappings.
      enum:
        - ACS
    controlModeEnum:
      description: |
        Specifies the required control mode for the up drive operation.
        The following values correspond to the control mode integers.
        DRIVE_CONTROL_OPR = 2
        DRIVE_CONTROL_AVR = 3
      enum:
        - DRIVE_CONTROL_OPR
        - DRIVE_CONTROL_AVR
    driveControlEnum:
      enum:
        - DRIVE_CONTROL_DOWN
        - DRIVE_CONTROL_OPR
        - DRIVE_CONTROL_AVR
        - DRIVE_CONTROL_MIXED
        - LTID_DOWN
        - DRIVE_CONTROL_ACTIVE
        - DRIVE_CONTROL_SCAN
        - DRIVE_CONTROL_PEND
        - DRIVE_CONTROL_RESTART
        - DRIVE_CONTROL_DOWN_ROBOT_STRING
        - DRIVE_CONTROL_PEND_ROBOT_STRING
        - DRIVE_CONTROL_SCAN_ROBOT_STRING
        - DRIVE_CONTROL_ROBOT_STRING
    driveTypeEnum:
      enum:
        - DT_HCART
        - DT_DLT
        - DT_HCART2
        - DT_DLT2
        - DT_HCART3
        - DT_DLT3
    robotTypeEnum:
      enum:
        - NA
        - NOT_ROBOTIC
        - ACS
        - TLD
    tapeMediaTypeEnum:
      enum:
        - HCART
        - HC_CLN
        - DLT
        - DLT_CLN
        - HCART2
        - HC2_CLN
        - DLT2
        - DLT2_CLN
        - HCART3
        - HC3_CLN
        - DLT3
        - DLT3_CLN
    tapeMediaEraseTypeEnum:
      enum:
        - QUICK_ERASE
        - LONG_ERASE
    tapeMediaStatusChangeEnum:
      enum:
        - FREEZE
        - UNFREEZE
        - SUSPEND
        - UNSUSPEND
    tapeAlertEnum:
      enum:
        - READ_WARNING
        - WRITE,
        - HARD_ERROR,
        - MEDIA,
        - READ_FAILURE,
        - WRITE_FAILURE,
        - MEDIA_LIFE,
        - NOT_DATA_GRADE,
        - WRITE_PROTECT,
        - NO_REMOVAL,
        - CLEANING_MEDIA,
        - UNSUPPORTED_FORMAT,
        - RECOVERABLE_SNAPPED_TAPE,
        - UNRECOVERABLE_SNAPPED_TAPE,
        - MEMORY_CHIP_IN_CARTRIDGE_FAILURE,
        - FORCED_EJECT,
        - READ_ONLY_FORMAT,
        - TAPE_DIRECTORY_CORRUPTED,
        - NEARING_MEDIA_LIFE,
        - CLEAN_NOW,
        - CLEAN_PERIODIC,
        - EXPIRED_CLEANING_MEDIA,
        - INVALID_CLEANING_MEDIA
    driveStatusEnum:
      enum:
        - DRIVE_STATUS_UP
        - DRIVE_STATUS_DOWN
        - DRIVE_STATUS_MIXED
        - DRIVE_STATUS_DISABLED
    namingStyleEnum:
      enum:
        - NONE
        - CHAR0DIG6
        - CHAR1DIG5
        - CHAR2DIG4
        - CHAR3DIG3
        - CHAR4DIG2
    barcodeRuleMediaTypeEnum:
      enum:
        - DEFAULT
        - HCART
        - HCART2
        - HCART3
        - HC_CLN
        - HC2_CLN
        - HC3_CLN
        - DLT
        - DLT2
        - DLT3
        - DLT_CLN
        - DLT2_CLN
        - DLT3_CLN
    createRobotRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              type: string
              enum:
                - robot
            attributes:
              type: object
              required:
                - number
                - robotType
                - deviceHost
              properties:
                number:
                  type: integer
                  description: The unique, logical identification number for the robotic library.
                  minimum: 0
                  maximum: 32767
                  default: 0
                deviceHost:
                  type: string
                  description: The host to which the device is attached.
                robotType:
                  type: string
                  description: The type of robot.
                  enum:
                    - NA
                    - NOT_ROBOTIC
                    - ACS
                    - TLD
                roboticPath:
                  type: string
                  description: |
                    For the robots that are attached to UNIX hosts: Specifies the path for the robot if one exists. For example, /dev/sg/c2t5l0.
                    This property does not apply to Windows hosts.
                ndmpHost:
                  type: string
                  description: The name of the NDMP host to which the robot is attached.
                port:
                  type: integer
                  nullable: true
                  minimum: 0
                  description: |
                    For the robots that are attached to UNIX hosts: Specifies the SCSI port number of the robot.
                    This property applies to NetBackup Windows servers only.
                bus:
                  type: integer
                  nullable: true
                  minimum: 0
                  description: |
                    For the robots that are attached to UNIX hosts: Specifies the SCSI bus number of the robot.
                    This property applies to NetBackup Windows servers only.
                target:
                  type: integer
                  nullable: true
                  minimum: 0
                  description: |
                    For the robots that are attached to UNIX hosts: Specifies the SCSI target number (or SCSI ID) of the robot.
                    This property applies to NetBackup Windows servers only.
                lun:
                  type: integer
                  nullable: true
                  minimum: 0
                  description: |
                    For the robots that are attached to UNIX hosts: Specifies the SCSI logical unit number of the robot.
                    This property applies to NetBackup Windows servers only.
                robotControlHost:
                  type: string
                  description: The name of the control host, if a remote host controls the robot.
    patchBulkRobotRequest:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/patchBulkRobotElement"
    patchBulkRobotElement:
      type: object
      properties:
        type:
          type: string
          enum:
            - bulkRobotPatch
        id:
          type: string
          description: The robot name, which consists of the robot type and its number. For example, TLD(4).
        attributes:
          type: object
          properties:
            robotType:
              type: string
              description: The type of robot.
            roboticPath:
              type: string
              description: |
                For the robots that are attached to UNIX hosts: Specifies the path for the robot if one exists. For example, /dev/sg/c2t5l0.
                This property does not apply to Windows hosts.
            ndmpHost:
              type: string
              description: The name of the NDMP host to which the robot is attached.
            port:
              type: integer
              nullable: true
              minimum: 0
              description: |
                Specifies the SCSI port number of the robot.
                This property applies to NetBackup Windows servers only.
            bus:
              type: integer
              nullable: true
              minimum: 0
              description: |
                Specifies the SCSI bus number of the robot.
                This property applies to NetBackup Windows servers only.
            target:
              type: integer
              nullable: true
              minimum: 0
              description: |
                Specifies the SCSI target number (or SCSI ID) of the robot.
                This property applies to NetBackup Windows servers only.
            lun:
              type: integer
              nullable: true
              minimum: 0
              description: |
                Specifies the SCSI logical unit number of the robot.
                This property applies to NetBackup Windows servers only.
            robotControlHost:
              type: string
              description: The name of the control host, if a remote host controls the robot.
    robotContentsRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              type: string
              enum:
                - robotContentsRequest
            attributes:
              type: object
              required:
                - compare
                - deviceHost
              properties:
                compare:
                  type: boolean
                  description: |
                    If true, it compares the media in a robot with the EMM database.
                  default: false
                deviceHost:
                  type: string
                  description: |
                    Specifies the name of the device host where the robot is defined.
    robotList:
      type: object
      required:
        - links
        - data
      properties:
        links:
          $ref: ./common.yaml#/components/schemas/paginationLinks
        meta:
          type: object
          properties:
            pagination:
              $ref: ./common.yaml#/components/schemas/paginationAttributes
        data:
          type: array
          items:
            $ref: "#/components/schemas/robotResource"
    getRobotResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/robotResource"
    robotResource:
      type: object
      required:
        - id
        - type
        - attributes
      properties:
        id:
