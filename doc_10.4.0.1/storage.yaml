    moveVolumesAttributes:
      type: object
      properties:
        mediaIds:
          type: array
          items:
            type: string
            description: Media Id to move.
            example: TEST01
        volumeGroup:
          type: string
          maxLength: 25
          description: The volume group of the tape volume.
          default: ---
          example: myVolumeGroup
        robot:
          type: object
          description: Specifies robot for this volume group.
          properties:
            robotType:
              type: string
              description: Type of the robot
              enum:
                - NA
                - NOT_ROBOTIC
                - ACS
                - TLD
            robotNumber:
              type: integer
              description: |
                Specifies ID of the library where the media resides.<br>
                Note: Only required for ACS and TLD robot type.
              minimum: 0
              example: 1
            robotHost:
              type: string
              description: |
                Specifies the name of the host that controls the robot, where the volume is located.<br>
                Note: Only required for ACS and TLD robot type.
              example: myhost.veritas.com
          required:
            - robotType
        firstSlotNumber:
          type: integer
          description: |
            The number of the first slot in the robot in which the range of volumes resides. If you add or move more than one media, NetBackup assigns the remainder of the slot numbers sequentially.<br> Note: Only required for TLD robot type.
          minimum: 1
          maximum: 32767
          example: 1
      required:
        - mediaIds
        - robot
