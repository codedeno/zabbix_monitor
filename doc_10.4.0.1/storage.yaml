            The identifier of the replication mapping information. The format should be \<source asset id\>:\<target asset id\>:\<associated replication type\>. Use the GET /config/snapshot-mgmt-servers/{{snapshotMgmtServer}}/configuredPlugins/{{pluginType}}/replication-topology API to get the source asset id, target asset id and replication type to pass to this API.
