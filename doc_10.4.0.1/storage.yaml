        - attributes
    encryptionDetails:
      type: object
      description: The encryption details for cloud storage.
      properties:
        version:
          type: integer
          description: The encryption version used.
        verboseEnabled:
          type: boolean
          description: If set to `true`, verbose logging is enabled.
      required:
        - version
        - verboseEnabled
    kmsAttributes:
      type: object
      description: NetBackup Key Management Service (KMS) configuration details.
      properties:
        kmsServerName:
          type: string
          description: The server name of Key Management Service (KMS).
        keyVersion:
          type: integer
          description: The version of Key Management Service (KMS).
      required:
        - kmsServerName
        - keyVersion
    diskVolumeDefinition:
      type: object
      required:
        - links
        - type
        - id
        - attributes
      properties:
        links:
          type: object
          properties:
            self:
              $ref: "#/components/schemas/linkObject"
        type:
          type: string
          enum:
            - diskVolume
        id:
          type: string
          description: The unique identifier of the disk volume.
        attributes:
          type: object
          required:
            - diskVolumeName
            - storageServerType
            - rawSizeBytes
            - freeSizeBytes
            - state
            - encryptionEnabled
            - isSnapshotEnabled
            - isReplicationSource
            - isReplicationTarget
            - isPrimary
            - isMirror
            - isIndependentMirror
            - numOfReadMounts
            - numOfWriteMounts
            - currentReadStreams
            - currentWriteStreams
            - wormCapable
            - indelibleImageSupported
            - immutableImageSupported
            - wormImageAudit
            - unlockedImageSupported
            - nbControlledImmutablility
            - deletableImageSupported
            - nbControlledIndeliblity
            - createImmutableAndDeletableImage
            - wormIndelibleMinimumInterval
            - wormIndelibleMaximumInterval
          properties:
            diskVolumeName:
              type: string
              description: The name of the disk volume.
            storageServerType:
              type: string
              description: The type of the storage server corresponding to the disk volume.
            diskMediaId:
              type: string
              description: The media identifier associated with the disk volume.
            rawSizeBytes:
              type: integer
              format: int64
              description: The total size of the disk volume, in bytes.
            freeSizeBytes:
              type: integer
              format: int64
              description: The free size of the disk volume, in bytes.
            state:
              type: string
              description: The state of the disk volume.
              enum:
                - UP
                - DOWN
                - UNKNOWN
            region:
              type: string
              description: The region identifier associated with the disk volume
            isSnapshotEnabled:
              type: boolean
              description: If set to `true`, the disk volume is enabled for snapshots.
            isReplicationSource:
              type: boolean
              description: If set to `true`, the disk volume is configured as a source for replication.
            isReplicationTarget:
              type: boolean
              description: If set to `true`, the disk volume is configured as a target for replication.
            isPrimary:
              type: boolean
              description: Set to `true` if the disk volume is capable of storing snapshots from sources mounted on a client.
            isMirror:
              type: boolean
              description: If set to `true`, the disk volume is enabled for mirrored replication method.
            isIndependentMirror:
              type: boolean
              description: If set to `true`, the disk volume is enabled for non-mirrored replication method.
            replicationSources:
              type: array
              description: The list of replication sources for the disk volume.
              items:
                type: string
            replicationTargets:
              type: array
              description: The list of replication targets for the disk volume.
              items:
                type: string
            numOfReadMounts:
              type: integer
              description: The number of read mounts for the disk volume.
            numOfWriteMounts:
              type: integer
              description: The number of write mounts for the disk volume.
            currentReadStreams:
              type: integer
              description: The number of current read streams for the disk volume.
            currentWriteStreams:
              type: integer
              description: The number of current write streams for the disk volume.
            wormCapable:
              type: integer
              description: If this attribute is set, the disk volume is WORM capable.
              minimum: 0
              maximum: 1
              default: 0
            indelibleImageSupported:
              type: boolean
              description: If set to `true`, the disk volume supports lock on the images.
            immutableImageSupported:
              type: boolean
              description: If set to `true`, the disk volume supports read-only images.
            wormImageAudit:
              type: boolean
              description: If set to true, the storage provides checksums for images that are on the disk volume.
            unlockedImageSupported:
              type: boolean
              description: If set to `true`, the disk volume can contain unlocked images.
            nbControlledImmutablility:
              type: boolean
              description: |
                If set to `true`, NetBackup sets the read only attribute on the images.
                If set to `false`, immutable policies occur under storage server control.
            deletableImageSupported:
              type: boolean
              description: |
                If set to `true`, the disk volume can contain deletable images.
            nbControlledIndeliblity:
              type: boolean
              description: |
                If set to `true`, NetBackup sets storage retention period (indelibilty) on images that are on the disk volume.
                if set to `false`, the storage server governs the storage retention period (indelibilty) on images that are on the disk volume.
            createImmutableAndDeletableImage:
              type: boolean
              description: |
                If set to `true`, NetBackup provides the ability to optionally set the read-only and storage retention period (indelibilty) attributes. With this setting, you can set the attributes independently.
                If set to `false`, NetBackup makes it mandatory to set the read-only and storage retention period (indelibilty) attributes. With this setting, the attributes are set in a single operation.
            wormIndelibleMinimumInterval:
              type: integer
              description: The minimum interval for which an image cannot be deleted on the disk volume.
            wormIndelibleMaximumInterval:
              type: integer
              description: The maximum interval for which an image cannot be deleted on the disk volume.
            wormModeType:
              type: string
              description: Mode type of a Flex WORM volume or a Cloud WORM volume.
              enum:
                - NONE
                - COMPLIANCE
                - ENTERPRISE
            encryptionEnabled:
              type: boolean
              default: false
              description: If set to `true`, the disk volume is enabled for encryption.
            kmsEnabled:
              type: boolean
              default: false
              description: Key Management Service (KMS) is enabled when set to `true`. Key Management Service (KMS) cannot be set to 'false' if it had been initially set to 'true'.
            kmsKeyGroupName:
              type: string
              description: |
                The Key Management Service (KMS) key group name. This attribute can be provided only if the `encryptionEnabled` and `kmsEnabled` setting is set to true and needs to be encrypted using the Key Management service (KMS).
            kmsServerName:
              type: string
              description: |
                The server name of Key Management Service (KMS). This attribute can be provided only if the `encryptionEnabled` setting is set to true and needs to be encrypted using the Key Management service (KMS).
            readOnly:
              type: boolean
              default: false
              description: If set to `true`, the disk volume is in read only status for image sharing.
            diskVolumeCapabilities:
              type: array
              description: The capabilities of the disk volume.
              items:
                type: string
                description: |
                  WORM_INDELIBLE - Disk volume supports lock on the images. WORM_IMMUTABLE - Disk volume supports read only images. WORM_IMAGEAUDIT - Storage provides checksums for images on the disk volume. WORMF_MUTABLE - Disk volume can contain unlocked images. WORMF_IMMUTABLE - Sets the read only attribute on the images. WORMF_DELETABLE - Disk volume can contain deletable images. WORMF_INDELIBLE - NetBackup sets storage retention on images on the disk volume. WORMF_CREATE_IMMUTABLE_AND_DELETABLE - NetBackup can set immutable and indelible attributes independently.
                enum:
                  - WORM_INDELIBLE
                  - WORM_IMMUTABLE
                  - WORM_IMAGEAUDIT
                  - WORMF_MUTABLE
                  - WORMF_IMMUTABLE
                  - WORMF_DELETABLE
                  - WORMF_INDELIBLE
                  - WORMF_CREATE_IMMUTABLE_AND_DELETABLE
            availDiskSpace:
              type: integer
              format: int64
              description: Available MSDP storage disk space, in bytes.
            defaultCloudCacheCapacity:
              type: integer
              format: int64
              description: The default cloud cache capacity, in bytes.
            maxRequestCloudCacheCapacity:
              type: integer
              format: int64
              description: The max range of request cloud cache capacity, in bytes.
            requestCloudCacheCapacity:
              type: integer
              format: int64
              description: The current cloud cache capacity, in bytes.
            cloudAttributes:
              $ref: "#/components/schemas/cloudLsuDetails"
