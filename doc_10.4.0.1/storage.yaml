        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
    post:
      description: |
        Create a new barcode rule on the media manager server.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|ADD|`
      tags:
        - Robots
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/saveBarcodeRule"
        description: The required properties to configure a new barcode rule.
        required: true
      responses:
        "204":
          description: Successfully created the barcode rule.
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "409":
          description: Barcode rule already exists.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/storage/barcode-rules/{barcodeTag}":
    parameters:
      - name: barcodeTag
        description: The ID of the barcode rule
        in: path
        required: true
        schema:
          type: string
    put:
      description: |
        Update the specified barcode rule.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
