        links:
          type: object
          properties:
            self:
              $ref: "#/components/schemas/linkObject"
        type:
          type: string
          enum:
            - importSlp
        id:
          type: string
          description: The unique identifier associated with the import storage lifecycle policy (SLP).
        attributes:
          type: object
          properties:
            nbuStatusCode:
              type: integer
              description: NetBackup status code.
            targetMasterServerName:
              type: string
              description: The name of the target master server.
            targetMasterImportSlpName:
              type: string
              description: The name of the target import storage lifecycle policy (SLP).
            dataClassificationName:
              type: string
              description: The data classification associated with the storage lifecycle policy (SLP).
          required:
            - nbuStatusCode
            - targetMasterImportSlpName
            - targetMasterServerName
            - dataClassificationName
    createDiskVolume:
      type: object
      properties:
        data:
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              type: string
              description: The type of entity to create.
              enum:
                - diskVolume
            attributes:
              type: object
              description: Attributes of the disk volume.
              required:
                - diskVolumeName
              properties:
                diskVolumeName:
                  type: string
                  description: Name of the disk volume.
                region:
                  type: string
                  description: The region identifier associated with the disk volume.
                encryptionEnabled:
                  type: boolean
                  default: false
                  description: If set to `true`, encryption is enabled.
                kmsEnabled:
                  type: boolean
                  default: false
                  description: |
                    Key Management Service (KMS) is enabled when set to `true`. Key Management Service (KMS) cannot be set to 'false' if it had been initially set to 'true'.
                kmsKeyGroupName:
                  type: string
                  description: |
                    The Key Management Service (KMS) key group name. This attribute can be provided only if the `encryptionEnabled` setting is set to true and needs to be encrypted using the KMS.
                kmsServerName:
                  type: string
                  description: |
                    The server name of the Key Management Service (KMS).
                readOnly:
                  type: boolean
                  default: false
                  description: If set to `true`, the disk volume is in read only status for image sharing.
                requestCloudCacheCapacity:
                  type: integer
                  format: int64
                  description: |
                    Cloud cache disk space for the new cloud disk volume, in gigabytes. These cloud (upload/download/meta/map) size attributes are derived from this number.
                cloudAttributes:
                  $ref: "#/components/schemas/msdpCloudConfiguration"
      required:
        - data
    createStorageUnitRequest:
      type: object
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              description: The type of entity to create.
              enum:
                - storageUnit
            attributes:
              $ref: "#/components/schemas/createStorageUnitAttributes"
            relationships:
              type: object
              properties:
                diskPool:
                  type: object
                  properties:
                    data:
                      $ref: "#/components/schemas/diskPoolIdentifierObject"
          required:
            - type
            - attributes
      required:
        - data
    createDiskPoolRequest:
      type: object
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              description: The type of entity to create.
              enum:
                - diskPool
            attributes:
              $ref: "#/components/schemas/createDiskPoolAttributes"
            relationships:
              type: object
              properties:
                storageServers:
                  type: object
                  properties:
                    data:
                      $ref: "#/components/schemas/storageServersIdentifierObject"
          required:
            - type
            - attributes
            - relationships
      required:
        - data
    storageDevicePage:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/storageDevice"
        meta:
          type: object
          properties:
            pagination:
              $ref: ./common.yaml#/components/schemas/cursorPaginationAttributes
        links:
          type: object
          properties:
            pagination:
              $ref: ./common.yaml#/components/schemas/cursorPaginationLinks
    storageDevice:
      type: object
      required:
        - type
        - id
        - attributes
      properties:
        id:
          type: string
          description: |
            The storage device name.\
            For robotic type, the name is concatenation of RobotType(RobotNumber) - Density.\
            For standalone drive, the name is concatenation of Standalone - Density.
          example: TLD(1) - DLT2
        type:
          type: string
          enum:
            - storageDevice
        attributes:
          $ref: "#/components/schemas/storageDeviceAttributes"
    storageDeviceAttributes:
      type: object
      required:
        - deviceType
        - robotType
        - robotNumber
        - density
      properties:
        deviceType:
          type: string
          description: The type of storage device.
          enum:
            - STANDALONE
            - ROBOT
          example: ROBOT
        robotType:
          type: string
          description: The NetBackup robot type.
          enum:
            - NONE
            - TLD
            - ACS
            - NA
          example: TLD
        robotNumber:
          type: integer
          description: The robot number.
          example: 1
        density:
          type: string
          description: The density type of the storage device.
          enum:
            - HCART
            - DLT
            - HCART2
            - DLT2
            - HCART3
            - DLT3
            - NA
          example: DLT2
    createTapeMediaPoolRequest:
      type: object
      properties:
        data:
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              type: string
              description: The type of entity to create.
              enum:
                - volumePoolDetails
            attributes:
              type: object
              description: Attributes of the tape volume pool.
              required:
                - volumePoolName
              properties:
                volumePoolName:
                  type: string
                  description: Name of the tape volume pool.
                description:
                  type: string
                  description: Description of the tape volume pool.
                  default: ---
                partiallyFullMediaLimit:
                  type: integer
                  default: 0
                  minimum: 0
                  maximum: 32767
                  description: Limit for the number of partially full media to be used in this pool. | The default value is zero (0), which indicates that the number of partially full media is unlimited.
                poolType:
                  $ref: "#/components/schemas/tapePoolType"
      required:
        - data
    updateTapeMediaPoolRequest:
      type: object
      properties:
        data:
          type: object
          required:
            - type
            - id
            - attributes
          properties:
            type:
              type: string
              description: The type of entity to create.
              enum:
                - volumePoolDetails
            id:
              type: string
              description: |
                The volume pool number.
            attributes:
              type: object
              description: Attributes of the tape volume pool.
              properties:
                description:
                  type: string
                  description: Description of the tape volume pool.
                  default: ---
                partiallyFullMedia:
                  type: integer
                  default: 0
                  minimum: 0
                  maximum: 32767
                  description: Limit for the number of partially full media to be used in this pool. | The default value is zero (0), which indicates that the number of partially full media is unlimited.
                poolType:
                  $ref: "#/components/schemas/tapePoolType"
      required:
        - data
    deleteTapeMediaPoolRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          minItems: 1
          maxItems: 1024
          items:
            $ref: "#/components/schemas/bulkVolumePoolResourceIdentifierObject"
    bulkVolumePoolResourceIdentifierObject:
      type: object
      required:
        - id
        - type
      properties:
        type:
          type: string
          enum:
            - volumePoolDetails
        id:
          type: string
          description: The volume pool number.
    volumePoolDetails:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/volumePoolInfos"
        meta:
          type: object
          properties:
            pagination:
              $ref: ./common.yaml#/components/schemas/cursorPaginationAttributes
        links:
          type: object
          properties:
            pagination:
              $ref: ./common.yaml#/components/schemas/cursorPaginationLinks
    tapeMediaPoolResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/volumePoolInfos"
    volumePoolInfos:
      type: object
      required:
        - type
        - id
        - attributes
      properties:
        id:
          type: string
          description: |
            The volume pool number.
        type:
          type: string
          enum:
            - volumePoolDetails
        attributes:
          $ref: "#/components/schemas/volumePoolAttributes"
        links:
          type: object
          properties:
            self:
              type: object
              properties:
                href:
                  type: string
                  example: /storage/tape-volume-pools/123
    volumePoolAttributes:
      type: object
      required:
        - volumePoolName
        - description
        - partiallyFullMedia
        - poolType
      properties:
        volumePoolName:
          type: string
          description: Name of the volume pool.
        description:
          type: string
        partiallyFullMedia:
          type: integer
          description: Specifies the number of partially full tapes for this pool.
        poolType:
          $ref: "#/components/schemas/tapePoolType"
    tapePoolType:
      type: string
      enum:
        - REGULAR_MEDIA_POOL
        - SCRATCH_MEDIA_POOL
        - CATALOG_MEDIA_POOL
        - AVAILABLE_MEDIA_POOL
      default: REGULAR_MEDIA_POOL
      description: |
        Type of media pool, controlling the use of media in the pool. Default is REGULAR_MEDIA_POOL.
    updateVolumeGroupRequest:
      type: object
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
          properties:
            id:
              type: string
              description: The id of the volume group.
              example: 0:HCART:Group1
            type:
              type: string
              description: The type of entity to update.
              enum:
                - volumeGroupInfo
            attributes:
              type: object
              description: Attributes of the volume group.
              oneOf:
                - $ref: "#/components/schemas/volumeGroupRobotInfoRobotic"
                - $ref: "#/components/schemas/volumeGroupRobotInfoStandalone"
      required:
        - data
    volumeGroupRobotInfoRobotic:
      description: robot information for a robotic volume group
      required:
        - robot
      properties:
        robot:
          type: object
          required:
            - robotType
            - robotNumber
            - robotHost
          properties:
            robotType:
              type: string
              description: The NetBackup robot type.
              enum:
                - TLD
                - ACS
              example: TLD
            robotNumber:
              type: integer
              description: The robot number.
              minimum: 0
              example: 1
            robotHost:
              type: string
              description: The robot control host.
              example: mycontrolhost.abc.com
    volumeGroupRobotInfoStandalone:
      description: robot information for a standalone volume group
      required:
        - robot
      properties:
        robot:
          type: object
          required:
            - robotType
          properties:
            robotType:
              description: The NetBackup robot type.
              type: string
              enum:
                - NOT_ROBOTIC
              example: NOT_ROBOTIC
    deleteVolumeGroupsRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          minItems: 1
          maxItems: 1024
          items:
            $ref: "#/components/schemas/bulkVolumeGroupResourceIdentifierObject"
    bulkVolumeGroupResourceIdentifierObject:
      type: object
      required:
        - id
        - type
      properties:
        type:
          type: string
          enum:
            - volumeGroupInfo
        id:
          type: string
          description: The id of the volume group.
    updateStorageUnitRequest:
      type: object
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              description: The type of entity to update.
              enum:
                - storageUnit
            attributes:
              $ref: "#/components/schemas/updateStorageUnitAttributes"
            relationships:
              type: object
              properties:
                diskPool:
                  type: object
                  properties:
                    data:
                      $ref: "#/components/schemas/diskPoolIdentifierObject"
          required:
            - type
      required:
        - data
    updateDiskPoolRequest:
      type: object
      properties:
        data:
          type: object
          properties:
            type:
              type: string
              description: The type of entity to update.
              enum:
                - diskPool
            attributes:
              $ref: "#/components/schemas/updateDiskPoolAttributes"
            relationships:
              type: object
              properties:
                storageServers:
                  type: object
                  properties:
                    data:
                      $ref: "#/components/schemas/storageServersIdentifierObject"
          required:
            - type
            - attributes
      required:
        - data
    updateDiskPoolAttributes:
      type: object
      properties:
        highWaterMark:
          type: integer
          description: |
            The threshold value (as a percentage) to indicate that the volume is full, and no further operations are allowed.
          minimum: 1
          maximum: 100
        lowWaterMark:
          type: integer
          description: |
            The threshold value (as a percentage) that indicates when NetBackup stops any image cleanup operations. The low water mark setting cannot be greater than or equal to the high water mark setting.
          minimum: 0
          maximum: 99
        maximumIoStreams:
          type: object
          properties:
            limitIoStreams:
              type: boolean
              description: |
                If set to `false`, unlimited I/O streams are used. If set to `true`, limits the number of I/O streams. Specify the number of streams with the `streamsPerVolume` parameter.
            streamsPerVolume:
              type: integer
              description: The number of I/O streams when `limitIoStreams` parameter is set to `true`.
              minimum: 2
              maximum: 65535
        diskPoolState:
          type: string
          description: The state of the disk pool.
          enum:
            - UP
            - DOWN
        comment:
          type: string
          description: Any comments for the disk pool to be updated.
    storageUnitResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            links:
              type: object
              properties:
                self:
                  $ref: "#/components/schemas/linkObject"
            type:
              type: string
              description: The type of entity to create.
              enum:
                - storageUnit
            id:
              type: string
              description: The unique identifier associated with the storage unit.
            attributes:
              $ref: "#/components/schemas/storageUnitAttributes"
            relationships:
              type: object
              properties:
                diskPool:
                  $ref: "#/components/schemas/associatedDiskPool"
          required:
            - links
            - type
            - id
            - attributes
            - relationships
      required:
        - data
    createStorageUnitAttributes:
      type: object
      properties:
        name:
          type: string
          description: The name of the storage unit.
        useAnyAvailableMediaServer:
          description: If set to `true`, any available media server can be used. By default, the parameter is set to true.
          type: boolean
          default: true
        mediaServerDetails:
          type: array
          description: The list of media servers associated with the storage server.
          items:
            $ref: "#/components/schemas/mediaServer"
        maxFragmentSizeMegabytes:
          description: |
            The maximum fragment size in MB. The default and maximum value for MSDP storage is 51200 MB. The default and maximum value for Tape storage is 1048576 MB. The minimum value for Tape storage is 50 MB. The default and maximum value for other storage types is 524288 MB.
          type: integer
          format: int64
          minimum: 20
        maxConcurrentJobs:
          description: The maximum number of concurrent jobs. This is not valid for tape storage units. Tape storage units use maxConcurrentDrives instead.
          type: integer
          default: 1
          maximum: 4096
          minimum: 0
        maxConcurrentDrives:
          description: The maximum number of concurrent drives. This is only valid for tape storage units.
          type: integer
          default: 1
          maximum: 256
          minimum: 0
        onDemandOnly:
          description: If set to `true`, the storage unit is available on-demand.
          type: boolean
          default: false
        useWorm:
          type: boolean
          default: false
          description: |
            If set to `true`, the WORM (write once read many) feature is configured for the storage unit.
            This feature cannot be reset to false once it is set to true.
        storageCategory:
          type: string
          description: Used to provide the storage unit storage category when not providing a disk pool relationship. BASIC_DISK and TAPE are the only storage categories that do not require a disk pool relationship. If NONE is specified then the storage unit storage category will be derived from the required disk pool relationship.
          enum:
            - BASIC_DISK
            - TAPE
            - NONE
        highWaterMark:
          description: Applies only to BASIC_DISK storage units. This threshold triggers the storage unit out of space actions. The high water mark must be greater than the low water mark setting.
          type: integer
          default: 98
          maximum: 100
          minimum: 2
        lowWaterMark:
          description: Applies only to BASIC_DISK storage units. Once the high water mark is reached space is created on the storage unit until the low water mark is reached.
          type: integer
          default: 80
          maximum: 99
          minimum: 1
        robotType:
          type: string
          description: The type of robot that contains this drive. For example, TL4 or ACS.
          enum:
            - NA
            - NOT_ROBOTIC
            - ACS
            - TLD
        robotNumber:
          type: integer
          description: A unique, logical number that identifies the robot.
        density:
          type: string
          description: The media density.
          enum:
            - DQSCSI
            - DHC8MM
            - D800
            - D1600
            - D3200
            - D6250
            - DHCART
            - DDD8MM
            - DT120
