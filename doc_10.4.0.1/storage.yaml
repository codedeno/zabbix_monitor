            $ref: "#/components/schemas/snapReplicationMappingData"
    drivePathOperationInstruction:
      type: object
      description: Instructions that specify and modify the drive path for a drive or drive path status change operation.
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
          properties:
            type:
              type: string
              enum:
                - drivePathOperationInstruction
            id:
              type: string
            attributes:
              type: object
              required:
                - pathIndexes
              properties:
                pathIndexes:
                  type: array
                  items:
                    type: integer
                    description: The index numbers of paths in a drive's list of paths, to be used for this operation.
                    minimum: 0
                useOperatorControl:
                  type: boolean
                  description: Perform operation in operator control mode. Only used for UP path operations.
    mediaTypes:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            type: object
            required:
              - id
              - type
              - attributes
            properties:
              id:
                type: string
                description: The string which should be passed to the admin commands as the argument to an option specifying a density type, e.g., "dtf", "8mm".
              type:
                type: string
                enum:
                  - mediaType
              attributes:
                type: object
                properties:
                  ordinal:
                    type: integer
                    description: Used as the media type when creating new volumes with vmoprcmd.
                  shortName:
                    type: string
                    description: A shortened version of the media type's name.
                  validDrives:
                    type: integer
                    description: The bitmap for the valid drives for this media type.
                  fullName:
                    type: string
                    description: The long name of the media type.
                required:
                  - ordinal
                  - shortName
                  - validDrives
                  - fullName
          example:
            - id: qcart
              type: mediaType
              attributes:
                ordinal: 8
                shortName: QCART
                validDrives: 1
                fullName: 1/4" cartridge tape
    rescanBarcodeTapeMediaRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - rescanBarcodesRequest
            attributes:
              $ref: "#/components/schemas/rescanBarcodeAttributes"
    rescanBarcodeAttributes:
      type: object
      properties:
        mediaIds:
          type: array
          items:
            type: string
            description: Media Id to rescan.
            example: TEST01
        mediaServer:
          type: string
          description: Media server to handle the request.
          example: mediaserver.com
      required:
        - mediaIds
        - mediaServer
    rescanBarcodeTapeMediaResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
          properties:
            id:
              type: string
              description: The id of the rescan barcode request.
            type:
              type: string
              enum:
                - rescanBarcodeResponse
            attributes:
              type: object
              required:
                - responseOutputStrings
              properties:
                responseOutputStrings:
                  type: array
                  items:
                    type: string
                  example:
                    - ================================================================================
                    - "media ID:              ABC001"
                    - "media type:            DLT cartridge tape 2 (16)"
                    - "barcode:               00ABC001"
                    - "media description:     Added by Media Manager"
                    - "volume pool:           NetBackup (1)"
                    - "robot type:            TLD - Tape Library DLT (8)"
                    - "robot number:          1"
                    - "robot slot:            1"
                    - "robot control host:    myrobotcontrolhost.com"
                    - "volume group:          000_00001_TLD"
                    - "vault name:            ---"
                    - "vault sent date:       ---"
                    - "vault return date:     ---"
                    - "vault slot:            ---"
                    - "vault session id:      ---"
                    - "vault container id:    -"
                    - "created:               Mon 22 Aug 2022 02:11:41 PM CDT"
                    - "assigned:              ---"
                    - "last mounted:          ---"
                    - "first mount:           ---"
                    - "expiration date:       ---"
                    - "number of mounts:      0"
                    - "max mounts allowed:    ---"
                    - ================================================================================
    deleteTapeMediaRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          minItems: 1
          maxItems: 1024
          items:
            $ref: "#/components/schemas/bulkVolumeResourceIdentifierObject"
    bulkVolumeResourceIdentifierObject:
      type: object
      required:
        - id
        - type
      properties:
        type:
          type: string
          enum:
            - volumeInfo
        id:
          type: string
          maxLength: 6
          description: The media ID of the tape media volume.
          example: ABC001
    updateTapeMediaRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/bulkUpdateVolumeResourceIdentifierObject"
    bulkUpdateVolumeResourceIdentifierObject:
      type: object
      required:
        - id
        - type
        - attributes
      properties:
        id:
          type: string
          example: AAAA00
        type:
          type: string
          enum:
            - updateVolumeInfosRequest
        attributes:
          $ref: "#/components/schemas/volumeInfoPatchAttributes"
    volumeInfoPatchAttributes:
      type: object
      properties:
        description:
          type: string
          description: Specifies the media description for the volumes.
          maxLength: 25
          example: test description for volume
        volumePool:
          type: string
          description: The name of the volume pool that is associated with the copy.
          example: myVolumePool
        maxMounts:
          type: integer
          description: |
            Specifies maximum number of mounts that are allowed for the volumes. Zero is the same as unlimited.<br>
            Note: This attribute is only used for volumes of non-cleaning media type.
          minimum: 0
        volumeExpiration:
          type: string
          format: date-time
          description: |
            The ISO 8601 timestamp that indicates the expiration date of the volume. Empty string ("") indicates the volume is set to never expire.
        cleaningsRemaining:
          type: integer
          description: |
            Specifies as to how many times more the cleaning media can be used. Zero is the same as unlimited.<br>
            Note: This attribute is only used for volumes of cleaning media type.
          minimum: 0
        mediaOwner:
          type: string
          description: Specifies the media server or group that owns the media.
          example: mediaserver.com
        volumeGroup:
          type: string
          description: Volume group that volume belongs to.
          example: myVolumeGroup
          maxLength: 25
          pattern: ^[A-Za-z0-9.\\-+_]*$
        statusChange:
          type: string
          description: Update media status.
          enum:
            - FREEZE
            - UNFREEZE
            - SUSPEND
            - UNSUSPEND
          example: SUSPEND
    volumeInfosResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/volumeInfo"
        meta:
          type: object
          properties:
            pagination:
              $ref: ./common.yaml#/components/schemas/cursorPaginationAttributes
        links:
          type: object
          properties:
            pagination:
              $ref: ./common.yaml#/components/schemas/cursorPaginationLinks
    mediaOwnerResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - id
            - attributes
          properties:
            id:
              type: string
              enum:
                - 1
            type:
              type: string
              enum:
                - mediaOwnerResponse
            attributes:
              type: object
              required:
                - mediaOwnerNames
              properties:
                mediaOwnerNames:
                  type: array
                  items:
                    type: string
                  example:
                    - myServerGroup
                    - myMediaServer
                    - myNdmpHost
    volumeInfoResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/volumeInfo"
    volumeInfo:
      type: object
      required:
        - type
        - id
        - attributes
      properties:
        id:
          type: string
          maxLength: 6
          description: |
            NetBackup assigned media ID
          example: ABC001
        type:
          type: string
          enum:
            - volumeInfo
        attributes:
          $ref: "#/components/schemas/volumeInfoAttributes"
        links:
          type: object
          properties:
            self:
              type: object
              properties:
                href:
                  type: string
                  example: /storage/tape-media/ABC001
    volumeInfoAttributes:
      type: object
      required:
        - mediaType
        - robot
        - volumeGroup
        - volumePool
        - mounts
        - application
        - maxMounts
        - created
        - kiloBytes
        - images
        - validImages
        - numberOfRestores
        - originHost
        - mediaStatus
        - mediaOwner
        - lastWriteHost
      properties:
        barcode:
          type: string
          description: Specifies the full barcode as read by the physical robot and is used by NetBackup to ensure that the robot loads the correct volume.
          example: 000000S
        mediaType:
          type: string
          description: NetBackup media type.
          enum:
            - HCART
            - HC_CLN
            - DLT
            - DLT_CLN
            - HCART2
            - HC2_CLN
            - DLT2
            - DLT2_CLN
            - HCART3
            - HC3_CLN
            - DLT3
            - DLT3_CLN
          example: HCART
        robot:
          type: object
          description: Specifies robot for this volume group.
          properties:
            robotType:
              type: string
              description: Type of the robot
              enum:
                - NA
                - NOT_ROBOTIC
                - ACS
                - TLD
            robotNumber:
              type: integer
              description: Specifies ID of the library where the media resides.
            robotHost:
              type: string
              description: Specifies the name of the host that controls the robot, where the volume is located.
              example: myhost.veritas.com
          required:
            - robotType
        slot:
          type: integer
          description: Slot number of the media.
        volumeGroup:
          type: string
          description: Volume group that volume belongs to.
          example: myVolumeGroup
        volumePool:
          type: string
          description: The name of the volume pool that is associated with the copy.
          example: myVolumePool
        mounts:
          type: integer
          description: The number of mounts for the disk volume
        timeAssigned:
          type: string
          format: date-time
          description: The ISO 8601 timestamp that indicates the date and time when a piece of media was first allocated or had its first backup written to it.
        application:
          $ref: "#/components/schemas/applicationType"
        maxMounts:
          type: integer
          description: Specifies maximum number of mounts that are allowed for this volume. Zero (default) is the same as unlimited.
          default: 0
        firstMount:
          type: string
          format: date-time
          description: The ISO 8601 timestamp that indicates when the media was first mounted.
        lastMount:
          type: string
          format: date-time
          description: The ISO 8601 timestamp that indicates when the media was last mounted.
        volumeExpiration:
          type: string
          format: date-time
          description: The ISO 8601 timestamp that indicates volume expiration.
        cleaningsRemaining:
          type: integer
          description: Specifies as to how many times more the cleaning media can be used.
        created:
          type: string
          format: date-time
          description: The ISO 8601 timestamp that indicates when the media is created.
        description:
          type: string
          description: Specifies the media description for the volume.
          example: test description for volume
        vaultName:
          type: string
          description: Specifies the name of the vault.
          example: MyVault
        dateVaulted:
          type: string
          format: date-time
          description: The ISO 8601 timestamp that indicates when the media was sent to offsite storage.
        returnDate:
          type: string
          format: date-time
          description: The ISO 8601 timestamp that indicates time the media was returned from offsite.
        vaultSlot:
          type: integer
          description: This attribute specifies the physical slot number where the given piece of media resides.
        sessionId:
          type: integer
          description: Specifies the ID of a vault session.
        vaultContainerId:
          type: string
          description: This attribute represents a vaultContainerId for the vault container that stores the volumes, a string of upto 29 alphanumeric characters.
          maxLength: 29
        dateExpiration:
          type: string
          format: date-time
          description: The ISO 8601 timestamp that indicates the expiration date.
        lastWritten:
          type: string
          format: date-time
          description: The ISO 8601 timestamp that indicates the date and time that this media server was last Written onto.
        lastRead:
          type: string
          format: date-time
          description: The ISO 8601 timestamp that indicates the date and time that this media server was last read.
        kiloBytes:
          type: number
          format: long
          description: Specifies the total space used on this tape .
        images:
          type: number
          format: int
          description: This attribute specifies the number of images on this media.
        validImages:
          type: number
          format: int
          description: This attribute specifies the number of images valid on this media.
        retentionPeriod:
          type: number
          format: int
          description: The retention period level for the copy.
        numberOfRestores:
          type: number
          format: int
          description: Specifies the number of restores for the copy.
        conflicts:
          type: integer
          description: conflicts found during database merge
        originHost:
          type: string
          description: This attribute indicates the origin host name in the EMM media record.
          default: NONE
        mediaStatus:
          type: string
          description: Specifies the media status for the volume.
          example: ACTIVE MULTIPLEXED
        mediaOwner:
          type: string
          description: Specifies the media server or group that owns the media.
          default: NONE
        serverGroup:
          type: string
          description: Specifies the server group
        lastWriteHost:
          type: string
          description: Specifies the last host that was written onto.
          default: NONE
    mediaStatusType:
      type: string
      enum:
        - FROZEN
        - SUSPENDED
        - FULL
        - MULTIPLE_RETENTION_LEVELS
        - IMPORTED
        - ACTIVE
        - MULTIPLEXED
        - WORM
        - BE
      description: |
        Status of tape media volume.
      example: ACTIVE MULTIPLEXED
    applicationType:
      type: string
      enum:
        - NETBACKUP
        - OLD_CATALOG
        - ADDON
        - CATALOG
      description: |
        Type of the application.
    tapeMediaRequests:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/tapeMediaRequestsAttributes"
    tapeMediaRequestsAttributes:
      type: object
      required:
        - type
        - attributes
      properties:
        type:
          type: string
          enum:
            - createVolumeInfosRequest
        attributes:
          type: object
          required:
            - volumeCounts
            - namingStyle
            - volume
            - robot
          properties:
            volumeCounts:
              description: Number of volumes to be created.
              type: integer
              minimum: 1
              maximum: 100
            namingStyle:
              type: string
              description: |
                The style to use to name the range of volumes. Using the pattern, NetBackup names the remaining volumes by incrementing the digits.<br>
                Note: Should be NONE when volumeCounts is 1. Cannot be NONE when volumeCounts is greater than 1.
              enum:
                - NONE
                - CHAR0DIG6
                - CHAR1DIG5
                - CHAR2DIG4
                - CHAR3DIG3
                - CHAR4DIG2
              example: CHAR3DIG3
            volume:
              $ref: "#/components/schemas/volumesSchema"
            robot:
              type: object
              required:
                - robotType
              properties:
                robotType:
                  type: string
                  description: the robot type associated with this volume group
                  enum:
                    - NA
                    - NOT_ROBOTIC
                    - ACS
                    - TLD
                robotHost:
                  type: string
                  description: |
                    Specifies the name of the host that controls the robot, where the volume is located.<br>
                    Note: Only required for ACS and TLD robot type.
                  example: myhost.veritas.com
                robotNumber:
                  type: integer
                  description: |
                    A unique, logical number that identifies the robot.<br>
                    Note: Only required for ACS and TLD robot type.
                  minimum: 0
    volumesSchema:
      type: object
      required:
        - firstMediaId
        - mediaType
        - volumePoolNumber
      properties:
        firstMediaId:
          type: string
          maxLength: 6
          description: the media id associated with this volume group
          example: ABC001
        mediaType:
          type: string
          description: NetBackup media type.
          enum:
            - HCART
            - HC_CLN
            - DLT
            - DLT_CLN
            - HCART2
            - HC2_CLN
            - DLT2
            - DLT2_CLN
            - HCART3
            - HC3_CLN
            - DLT3
            - DLT3_CLN
          example: HCART
        maxMounts:
          type: integer
          description: |
            Specifies maximum number of mounts that are allowed for this volume. Zero (default) is the same as unlimited.<br>
            Note: This attribute is only used for volumes of non-cleaning media type.
          default: 0
          minimum: 0
        cleaningsRemaining:
          type: integer
          description: |
            Specifies as to how many times more the cleaning media can be used. Zero (default) is the same as unlimited.<br>
            Note: This attribute is only used for volumes of cleaning media type.
          default: 0
          minimum: 0
        volumeGroupName:
          type: string
          maxLength: 25
          description: Volume group that volume belongs to.
          example: myVolumeGroup
          default: ---
        volumePoolNumber:
          type: integer
          description: Volume pool number that volume belongs to.
          minimum: 0
        description:
          type: string
          maxLength: 25
          description: Specifies the media description for the volume.
          default: ------
          example: test description for volume
        firstSlotNumber:
          type: integer
          description: |
            The number of the first slot in the robot in which the range of volumes resides. If you add or move more than one media, NetBackup assigns the remainder of the slot numbers sequentially.<br> Note: Only required for TLD robot type.
          minimum: 1
          maximum: 32767
          example: 1
    eraseTapeMediaRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - volumeEraseRequest
            attributes:
              $ref: "#/components/schemas/volumeInfoEraseAttributes"
    volumeInfoEraseAttributes:
      type: object
      properties:
        eraseMode:
          type: string
          description: Specifies the erase operation for the volumes.
          enum:
            - QUICK_ERASE
            - LONG_ERASE
          example: QUICK_ERASE
        mediaServer:
          type: string
          description: Media server to handle the request.
          example: mediaserver.com
        verifyLabel:
          type: boolean
          description: Verify the media label before performing the operation.
          example: false
      required:
        - eraseMode
        - mediaServer
        - verifyLabel
    labelTapeMediaRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
          properties:
            type:
              type: string
              enum:
                - volumeLabelRequest
            attributes:
              $ref: "#/components/schemas/volumeInfoLabelAttributes"
