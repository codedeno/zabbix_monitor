        writeBufferSizeBytes:
          type: integer
          description: |
            The buffer size to use for write operations. To obtain this value, use the `storage/cloud/providers` API.
        objectSizeMegabytes:
          type: integer
          description: |
            The object size to configure. To obtain this value, use the `storage/cloud/providers` API.
        swiftStorageRegionName:
