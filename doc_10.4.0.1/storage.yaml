  /storage/barcode-rules:
    get:
      description: |
        Fetch the list of the barcode rules.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|STORAGE|TAPE-MEDIA|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Robots
      parameters:
        - name: filter
          description: |
            Filter criteria syntax is based on OData standards. Filtering is supported on the following attributes:
            |Name|Supported Operators|Description|Schema|
            |---|---|---|---|
            |tag|eq ne and or not () contains endswith startswith tolower toupper|The barcode tag.|string|
            |mediaType|eq ne and or not () contains endswith startswith tolower toupper|The media type.|string|
            |volumePool|eq ne and or not () contains endswith startswith tolower toupper|The volume pool name.|string|
            |description|eq ne and or not () contains endswith startswith tolower toupper|The barcode rule description.|string|
          in: query
          required: false
          schema:
            type: string
        - name: sort
          description: |
            Sort the response data in ascending or descending order on the specified attribute. Prefix with `-` for descending order.
            The value of this parameter must be a comma-separated list of sort fields in the order they are to be sorted.
            Sorting is supported on the following attributes:
            |Name|
            |---|
            |tag|
            |mediaType|
            |volumePool|
            |description|
          in: query
          required: false
          schema:
            type: string
        - $ref: ./common.yaml#/components/parameters/pageOffset
        - $ref: ./common.yaml#/components/parameters/pageLimit
