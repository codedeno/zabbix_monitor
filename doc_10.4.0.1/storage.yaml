        mediaIds:
          type: array
          items:
            type: string
            description: The media ID of the tape media volumes being ejected.
            example: ABC001
    verifyEjectResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
          properties:
            type:
              type: string
              enum:
                - verifyEjectResponse
            id:
              type: string
              example: 1
            attributes:
              type: object
              required:
                - ejectStatus
                - volumeEjectInfo
              properties:
                ejectStatus:
                  type: string
                  description: |
                    This is the status of the overall tape media volume eject job on this robot.

                    Possible values:\
                    EJECT_PHASE_IN_PROGRESS - One or more volumes are in the process of being ejected.\
                    EJECT_PHASE_COMPLETE - All volumes have completed the eject phase that was initiated by the POST /storage/robots/{robotId}/eject-volumes API.\
                    For ACS robot types, this means all volumes ejected successfully or completed in error.\
                    For TLD robot types, this means all volumes are logically ejected and need to be physically removed from the Media Access Port or have completed in error.\
                    EJECT_ABORTED - The eject job has been aborted.\
                    EJECT_COMPLETE - The eject job has been completed by the POST /storage/robots/{robotId}/eject-complete API.
                  enum:
                    - EJECT_PHASE_IN_PROGRESS
                    - EJECT_PHASE_COMPLETE
                    - EJECT_ABORTED
                    - EJECT_COMPLETE
                  example: EJECT_PHASE_IN_PROGRESS
                volumeEjectInfo:
                  type: array
                  items:
                    type: object
                    required:
                      - mediaId
                      - locations
                      - status
                    properties:
                      mediaId:
                        type: string
                        description: The media ID of the tape media volume.
                        example: ABC001
                      location:
                        type: string
                        description: Specifies the eject location for the tape media volume.
                        example: 0,0,30,26,1
                      status:
                        type: object
                        required:
                          - statusCode
                          - statusMessage
                        properties:
                          statusCode:
                            type: integer
                            description: Eject status code for the tape media volume.
                            example: 72
                          statusMessage:
                            type: string
                            description: Eject status message for the tape media volume.
                            example: Media eject in progress
