    robotContentsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
          properties:
            id:
              type: string
              description: |
                The robot name, which consists of the robot type and its number. For example, TLD(4).
            type:
              type: string
              enum:
                - robotContentsResponse
            attributes:
              type: object
              required:
                - responseStrings
                - fileName
                - totalRecords
              properties:
                fileName:
                  type: string
                  description: |
                    Name of the file containing the full response data. This can be used as input to  
                    the `GET /storage/robot-inventory-file-download/{fileName}` API to download the file.
                totalRecords:
                  type: integer
                  description: Total number of records returned by the server.
                responseStrings:
                  type: array
                  description: Output of the robot contents request.
                  items:
                    type: string
                  example:
                    - Robot Contents                 Volume Configuration
                    - ""
                    - Slot   Tape  Barcode           Media ID Barcode        Mismatch Detected
                    - ====   ====  =============     ======== =============  =================
                    - "    1    Yes  000000S           00000S   000000S"
                    - "    2    Yes  000001S           00001S   000001S"
                    - "    3    Yes  000002S           00002S   000002S"
                    - "    4    Yes  000003S           00003S   000003S"
                    - "    5     No                    DJS456   123456         Yes"
                    - "    6    Yes  656565                                    Yes"
                    - "    7    Yes  888888            DJS888   888888"
                    - "    8     No"
    getMediaIdPrefixes:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          description: The media ID prefixes from a media server.
          required:
            - type
            - id
            - attributes
          properties:
            id:
              type: string
              description: The media server host name.
            type:
              type: string
              enum:
                - mediaIdPrefixes
            attributes:
              type: object
              required:
                - prefixes
              properties:
                prefixes:
                  type: array
                  description: The media ID prefixes.
                  items:
                    type: string
                    description: |
                      The media ID prefix. The following characters are supported:
                      ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_
                    maximum: 5
    mediaIdGenerationRules:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          description: The media ID generation rules from a media server.
          required:
            - type
            - id
            - attributes
          properties:
            id:
              type: string
              description: The media server host name.
            type:
              type: string
              enum:
                - mediaIdGenerationRules
            attributes:
              type: object
              required:
                - mediaIdGenerationRules
              properties:
                mediaIdGenerationRules:
                  type: array
                  description: The media ID generation rules.
                  items:
                    type: object
                    description: The individual media ID generation rule.
                    required:
                      - robotNumber
                      - barcodeLength
                      - rule
                    properties:
                      robotNumber:
                        type: integer
                        description: A unique, logical number that identifies the robot.
                        minimum: 0
                      barcodeLength:
                        type: integer
                        description: The number of characters in the barcode of the volume.
                        minimum: 1
                        maximum: 16
                      rule:
                        type: string
                        description: |
                          The media ID generation rule string. 
                          The rule string should consist of up to 6 fields separated by ':'. 
                          Each field can be either a literal character preceded by '#', 
                          or an index of a character in the volume's barcode, starting at 1.
                        example:
                          - "#A:4:5:6"
    mediaMappings:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            type: object
            required:
              - id
              - type
              - attributes
            properties:
              id:
                type: string
                description: The ID of the vendor media type.
              type:
                type: string
                enum:
                  - mediaTypeMapping
              attributes:
                type: object
                required:
                  - defaultMediaTypeId
                  - mediaTypes
                  - vendorMediaType
                properties:
                  defaultMediaTypeId:
                    type: string
                    description: The ID of the default media type for this mapping.
                  mediaTypes:
                    type: array
                    items:
                      type: object
                      required:
                        - mediaTypeId
                        - name
                        - fullName
                      properties:
                        mediaTypeId:
                          type: string
                          example: hcart
                        name:
                          type: string
                          example: HCART
                        fullName:
                          type: string
                          description: Full name or description of the media type.
                          example: 1/2" cartridge tape
                  vendorMediaType:
                    type: object
                    required:
                      - id
                      - displayName
                    properties:
                      id:
                        type: string
                        example: 3490E
                      displayName:
                        type: string
                        example: 3490E
    robotAttributes:
      type: object
      description: The properties of the robot.
      required:
        - number
        - deviceHost
        - robotType
      properties:
        number:
          type: integer
          description: The unique, logical identification number for the robotic library.
        deviceHost:
          type: string
          description: The host to which the device is attached.
        displayHostName:
          type: string
          description: |
            The host name of the robot to display.
            If the robot is in cluster, the display name would be like: ClusterName (DeviceHostName).
        volumeDatabaseHost:
          type: string
          description: The database host which stores volume information associated with this robot.
        robotType:
          type: string
          description: The type of robot.
          enum:
            - NA
            - NOT_ROBOTIC
            - ACS
            - TLD
        roboticPath:
          type: string
          description: |
            For the robots that are attached to UNIX hosts: Specifies the path for the robot if one exists. For example, /dev/sg/c2t5l0.
            This property does not apply to Windows hosts.
        ndmpHost:
          type: string
          description: The name of the NDMP host to which the robot is attached.
        enabled:
          type: boolean
          description: Indicates if the path to the robot is enabled.
        port:
          type: integer
          nullable: true
          description: |
            For the robots that are attached to UNIX hosts: Specifies the SCSI port number of the robot.
            This property applies to NetBackup Windows servers only.
        bus:
          type: integer
          nullable: true
          description: |
            For the robots that are attached to UNIX hosts: Specifies the SCSI bus number of the robot.
            This property applies to NetBackup Windows servers only.
        target:
          type: integer
          nullable: true
          description: |
            For the robots that are attached to UNIX hosts: Specifies the SCSI target number (or SCSI ID) of the robot.
            This property applies to NetBackup Windows servers only.
        lun:
          type: integer
          nullable: true
          description: |
            For the robots that are attached to UNIX hosts: Specifies the SCSI logical unit number of the robot.
            This property applies to NetBackup Windows servers only.
        serialNumber:
          type: string
          description: Specifies the robot serial number, if the robot reports this information.
        robotControlHost:
          type: string
          description: The name of the control host, if a remote host controls the robot.
        inquiryInfo:
          type: string
          description: |
            The device information that is returned from the device.
            For example, vendor ID, product ID, and product revision.
    robotVolumeConfigurationRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              type: string
              enum:
                - robotVolumeConfigurationRequest
            attributes:
              type: object
              required:
                - previewOnly
                - deviceHost
              properties:
                previewOnly:
                  type: boolean
                  description: Indicates whether this request is a preview or an actual update.
                deviceHost:
                  type: string
                  description: The media server to which the robot is connected to.
                emptyMediaPort:
                  type: boolean
                  description: Whether to empty media access port prior to update.
                  default: false
                useBarcodeRules:
                  type: boolean
                  description: Whether to use barcode rules or not.
                  default: false
                incomingVolumeGroup:
                  type: string
                  description: |
                    Specifies which volume group incoming media will be assigned to.
                    Possible values are `DEFAULT`, `AUTO-GENERATE`, or any named volume group like `001_00001_TLD`.
                  default: DEFAULT
                outgoingVolumeGroup:
                  type: string
                  description: |
                    Specifies which volume group outgoing media will be assigned to.
                    Possible values are `DEFAULT`, `AUTO-GENERATE`, `NO_VOLUME_GROUP`, or any named volume group like `001_00001_TLD`.
                  default: DEFAULT
                mediaTypeBarcodeRuleOverride:
                  type: string
                  description: Media type selected here will override any other media type specified in the barcode rules.
                volumePoolBarcodeRuleOverride:
                  type: string
                  description: Volume pool selected here will override any other volume pool specified in the barcode rules.
                useNewMediaPrefix:
                  type: boolean
                  description: Whether to use a new media prefix.
                  default: true
                oneTimeMediaPrefix:
                  type: string
                  description: One time media prefix to be used.
                mediaTypeMappings:
                  type: array
                  description: List of media type mappings that are changed. Valid for ACS robot type only.
                  items:
                    type: object
                    properties:
                      vendorMediaType:
                        type: object
                        properties:
                          id:
                            type: string
                            description: The ID of the acs vendor media type.
                            example: ACS_DLTIII
                      selectedMediaTypeId:
                        type: string
                        description: The ID of the modified media type for this mapping.
                        example: dlt3
    robotVolumeConfigurationResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
          properties:
            id:
              type: string
              description: The robot name, which consists of the robot type and its number. For example, TLD(4).
            type:
              type: string
              enum:
                - robotVolumeConfigurationResponse
            attributes:
              type: object
              properties:
                requestStatus:
                  type: string
                  description: The status of the volume configuration operation.
                fileName:
                  type: string
                  description: |
                    Name of the file containing the full response data. This can be used as input to 
                    the `GET /storage/robot-inventory-file-download/{fileName}` API to download the file.
                totalRecords:
                  type: integer
                  description: Total number of records returned by the server.
                responseStrings:
                  type: array
                  description: Output of the volume configuration request.
                  items:
                    type: string
                  example:
                    - Generating list of recommended changes ...
                    - ""
                    - Proposed Change(s) to Update the Volume Configuration
                    - =====================================================
                    - Logically add new media 12345 (barcode 12345) to robot slot 8.
                    - ""
                    - --------------------------------------------------------------------
