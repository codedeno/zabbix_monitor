        attributes:
          type: object
          required:
            - cloudBucketName
          properties:
            cloudBucketName:
              type: string
              description: The cloud bucket name.
            objectLockConfiguration:
              $ref: "#/components/schemas/objectLockConfiguration"
    patchDiskVolumeProperties:
      type: object
      required:
        - type
        - attributes
      properties:
        type:
          type: string
          description: The type of entity to update.
          enum:
            - diskVolume
        attributes:
          type: object
          description: Attributes of the disk volume.
          properties:
            encryptionEnabled:
              type: boolean
              default: false
              description: Encryption is enabled when set to `true`.
            kmsEnabled:
              type: boolean
              default: false
              description: Key Management Service (KMS) is enabled when set to `true`. Key Management Service (KMS) cannot be set to 'false' if it had been initially set to 'true'.
            kmsKeyGroupName:
              type: string
              description: |
                The Key Management Service (KMS) key group name. This attribute can be provided only if the `encryptionEnabled` setting is set to true and needs to be encrypted using the Key Management service (KMS).
            kmsServerName:
              type: string
              description: |
                The server name of Key Management Service (KMS). This attribute can be provided only if the `encryptionEnabled` setting is set to true and needs to be encrypted using the Key Management service (KMS).
            cloudAttributes:
              type: object
              description: The configuration details to modify for the cloud storage server.
              properties:
                serverSideEncryptionEnabled:
                  type: boolean
                  default: false
                  description: The server-side encryption is enabled when set to `true`.
                sseKmsEnabled:
                  type: boolean
                  default: false
                  description: The server-side encryption uses a KMS-generated CMK when set to `true`.
                sseKmsKeyID:
                  type: string
                  description: The key ID of the customer-managed KMS-generated CMK (used as opposed to a KMS-managed CMK).
                sslDetails:
                  $ref: "#/components/schemas/patchSslDetails"
                proxyServerEnabled:
                  type: boolean
                  default: false
                  description: |
                    The proxy server is enabled when set to `true`. Provide the proxy server details if this flag is set to true.
                proxyServerDetails:
                  $ref: "#/components/schemas/proxyServerDetails"
                postRehydrateRetentionPeriod:
                  type: integer
                  default: 3
                  minimum: 3
                  maximum: 30
                  description: |
                    The retention period (in days) of the rehydrated blobs in the HOT `storageTier` after the restore process. This parameter is applicable only for the ARCHIVE `storageTier`.
                cloudCredentials:
                  $ref: "#/components/schemas/cloudLsuCredentials"
                objectLockVolumeParameters:
                  $ref: "#/components/schemas/objectLockVolumeParameters"
            requestCloudCacheCapacity:
              type: integer
              format: int64
              description: The new request cloud cache capacity, in bytes.
    objectLockMode:
      type: object
      description: |
        Object lock mode of a WORM volume.
      required:
        - modeType
      properties:
        modeType:
          type: string
          description: |
            Object lock mode of the volume, can only go from Enterprise to Compliance when updating.
          enum:
            - Compliance
            - Enterprise
    patchStorageServerProperties:
      type: object
      properties:
        type:
          type: string
          description: The type of entity to modify.
          enum:
            - storageServer
        attributes:
          type: object
          properties:
            encryptionEnabled:
              type: boolean
              description: |
                If set to `true`, encryption is enabled.
            kmsEnabled:
              type: boolean
              description: |
                If this attribute is set to `true`, Key Management Service (KMS) is enabled.
            kmsKeyGroupName:
              type: string
              description: |
                The Key Management Service (KMS) key group name to be set for MSDP storage server.
            reloadStsConfig:
              type: boolean
              description: |
                When set to true, storage server configuration in database will be updated with information from the underlying storage. No changes are made to the underlying storage. When not set or set to false, this attribute will be ignored. When true but other attributes are also set, this attribute will be ignored.
            additionalMediaServersDetails:
              $ref: "#/components/schemas/additionalMediaServersDetails"
            msdpAttributes:
              $ref: "#/components/schemas/patchMsdpConfiguration"
            cloudAttributes:
              $ref: "#/components/schemas/patchCloudConfiguration"
            openStorageAttributes:
              $ref: "#/components/schemas/patchOpenStorageConfiguration"
            advancedDiskAttributes:
              $ref: "#/components/schemas/advancedDiskConfiguration"
    patchMsdpConfiguration:
      type: object
      description: The configuration details to modify for the MSDP storage server.
      properties:
        spaLogRetention:
          type: integer
          description: The log retention value (in days) for the storage pool.
        verboseLevel:
          type: integer
          minimum: 0
          maximum: 5
          description: The logging verbose level for the storage pool.
        credentials:
          $ref: "#/components/schemas/storageServerCredentials"
    patchCloudConfiguration:
      type: object
      description: The configuration details to modify for the cloud storage server.
      properties:
        proxyServerEnabled:
          type: boolean
          description: |
            If set to `true`, the proxy server is enabled. Provide proxy server details if this flag is set to `true`.
        serverSideEncryptionEnabled:
          type: boolean
          description: If set to `true`, the server-side encryption is enabled.
        readBufferSizeBytes:
          type: integer
          format: int64
          description: |
            The buffer size to use for read operations. Obtain this value with the `storage/cloud/providers` API.
        writeBufferSizeBytes:
          type: integer
          format: int64
          description: |
            The buffer size to use for write operations. Obtain this value with the `storage/cloud/providers` API.
        offlineTransferDetails:
          $ref: "#/components/schemas/offlineTransferDetails"
        longTermRetentionDetails:
          $ref: "#/components/schemas/patchLongTermRetentionDetails"
        curlDetails:
          $ref: "#/components/schemas/patchCurlDetails"
        sslDetails:
          $ref: "#/components/schemas/patchSslDetails"
        proxyServerDetails:
          $ref: "#/components/schemas/proxyServerDetails"
        cloudCredentials:
          $ref: "#/components/schemas/patchCloudCredentials"
    patchOpenStorageConfiguration:
      type: object
      description: The configuration details to modify for the OpenStorage server.
      properties:
        credentials:
          $ref: "#/components/schemas/storageServerCredentials"
    patchCurlDetails:
      type: object
      description: The cURL details for the cloud storage server.
      properties:
        curlLoggingEnabled:
          type: boolean
          description: If set to `true`, cURL logging is enabled or not.
        curlTimeOutSeconds:
          type: integer
          description: The maximum time for the completion of data operation.
        curlConnectionTimeOutSeconds:
          type: integer
          description: The amount of time that is allocated for the media server to connect to the cloud storage server.
    patchLongTermRetentionDetails:
      type: object
      description: |
        The long-term retention storage server configuration properties for GLACIER and LIFECYCLE storage class.
      properties:
        uploadClass:
          type: string
          description: |
            The storage class where the images are uploaded. Obtain this value with the `storage/cloud/providers` API.
          enum:
            - STANDARD
            - STANDARD_IA
        retrievalRetentionDays:
          type: integer
          description: The retrieval retention period (in days).
        transitionToStandardIA:
          type: object
          properties:
            transitionRequired:
              type: boolean
            afterDays:
              type: integer
              description: The transition to STANDARD-IA storage class period (in days).
        transitionToGlacier:
          type: object
          properties:
            transitionRequired:
              type: boolean
            afterDays:
              type: integer
              description: The transition to GLACIER storage class period (in days).
    patchCloudCredentials:
      type: object
      description: The cloud credentials as per configured cloud storage server.
      properties:
        authType:
          type: string
          description: |
            The authentication type for cloud service provider. Provide cloud credentials accordingly. Obtain this value with the `storage/cloud/providers` API.
          enum:
            - ACCESS_KEY
            - CREDENTIAL_ROLE
            - SERVICE_PRINCIPAL
            - IAM_ROLE_ANYWHERE
        accessKeyDetails:
          $ref: "#/components/schemas/accessKeyDetails"
        credentialBroker:
          $ref: "#/components/schemas/credentialBrokerDetails"
        awsIdentityRole:
          $ref: "#/components/schemas/awsIdentityRoleDetails"
        servicePrincipalDetails:
          $ref: "#/components/schemas/servicePrincipalDetails"
        iamRoleAnywhereDetails:
          $ref: "#/components/schemas/iamRoleAnywhereDetails"
        v2Identity:
          $ref: "#/components/schemas/patchV2Identity"
        v3Identity:
          $ref: "#/components/schemas/patchV3Identity"
        noneIdentity:
          $ref: "#/components/schemas/patchNoneIdentity"
    patchV2Identity:
      type: object
      description: |
        For Swift cloud storage server, if authentication type is IDENTITY_V2, provide credentials of V2 version.
      required:
        - userCredentialsDetails
      properties:
        userCredentialsDetails:
          $ref: "#/components/schemas/userCredentialsDetails"
    patchV3Identity:
      type: object
      description: |
        For Swift cloud storage server, if authentication type is IDENTITY_V3, provide credentials of V3 version.
      required:
        - userDetails
      properties:
        userDetails:
          $ref: "#/components/schemas/patchUserDetails"
    patchNoneIdentity:
      type: object
      description: |
        Swift cloud storage server credentials configuration for identity version `none` and authentication type is IDENTITY_NONE.
      required:
        - userCredentialsDetails
      properties:
        userCredentialsDetails:
          $ref: "#/components/schemas/userCredentialsDetails"
    patchUserDetails:
      type: object
      description: The required user details for cloud storage.
      required:
        - password
      properties:
        userId:
          type: string
          description: |
            The user ID associated with cloud storage credentials. User name is not required if the user ID is specified.
        userName:
          type: string
          description: The user name that is required to access the cloud storage.
        password:
          type: string
          description: The password that is required to access cloud storage. Password must not exceed 100 characters.
    patchSslDetails:
      type: object
      description: The SSL details to set SSL and non-SSL configuration parameters.
      properties:
        useSSLMode:
          type: string
          description: |
            The SSL mode to use the SSL protocol for user authentication or data transfer between NetBackup and cloud storage provider.
          enum:
            - DATA
            - AUTH
            - NONE
        checkCertificateRevocation:
          type: boolean
          description: |
            If set to `true`, certificate revocation check is performed. This option can be enabled only if the `useSSLMode` value is set to `DATA` or `AUTH`.
    postUniversalShareStorage:
      description: The payload to create the universal share.
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              description: The resource type.
              type: string
              enum:
                - universalShareStorage
            attributes:
              type: object
              required:
                - displayName
                - protocol
                - clients
              properties:
                displayName:
                  type: string
                  maximum: 36
                  description: |
                    The display name of the universal share. Must not contain any of these special characters "~`!@#$%^&*()=+{}[]:;'<>,?/"" Maximum allowed length is 36 characters.
                protocol:
                  description: Export protocol for the universal share.
                  default: NFS
                  type: string
                  enum:
                    - NFS
                    - SMB
                isDirectNFS:
                  type: boolean
                  default: false
                  description: If set to `false`, the NFS option is in secure status.
                kerberosEncryptionTypes:
                  type: array
                  items:
                    $ref: "#/components/schemas/kerberosEncryptionType"
                clients:
                  type: array
                  items:
                    $ref: "#/components/schemas/universalShareClient"
                activeDirectoryGroupNames:
                  description: The array of Active Directory groups. Applies when the protocol is SMB and sambaSecurityMode is ADS.
                  type: array
                  items:
                    type: string
                    description: The name of the Active Directory group.
                activeDirectoryUserNames:
                  description: The array of Active Directory users. Applies when the protocol is SMB and sambaSecurityMode is ADS.
                  type: array
                  items:
                    type: string
                    description: The Active Directory user name.
                localUserNames:
                  description: The array of local users. Applies when the protocol is SMB and sambaSecurityMode is USER.
                  type: array
                  items:
                    type: string
                    description: The local user name.
                diskVolume:
                  type: string
                  description: The name of the disk volume selected for this universal share.
                baasPskeys:
                  type: string
                  description: a string including stunnel PSK key list for BAAS.
    patchUniversalShareStorage:
      description: The payload that updates the universal share.
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - id
            - type
            - attributes
          properties:
            id:
              type: string
              description: The unique identifier for the universal share.
            type:
              description: The resource type.
              type: string
              enum:
                - universalShareStorage
            attributes:
              type: object
              properties:
                quotaSizeInBytes:
                  type: integer
                  format: int64
                  description: The maximum amount of data that can be stored on the universal share before deduplication.
                clients:
                  type: array
                  items:
                    $ref: "#/components/schemas/universalShareClient"
                baasPskeys:
                  type: string
                  description: a string including stunnel PSK key list for BAAS.
                activeDirectoryGroupNames:
                  description: The array of Active Directory groups. Applies when the protocol is SMB and sambaSecurityMode is ADS.
                  type: array
                  items:
                    type: string
                    description: The name of the Active Directory group.
                activeDirectoryUserNames:
                  description: The array of Active Directory users. Applies when the protocol is SMB and sambaSecurityMode is ADS.
                  type: array
                  items:
                    type: string
                    description: The Active Directory user name.
                localUserNames:
                  description: The array of local users. Applies when the protocol is SMB and sambaSecurityMode is USER.
                  type: array
                  items:
                    type: string
                    description: The local user name.
                kerberosEncryptionTypes:
                  type: array
                  items:
                    $ref: "#/components/schemas/kerberosEncryptionType"
                segmentationConfigs:
                  type: object
                  properties:
                    segmentationType:
                      type: string
                      enum:
                        - ALIGNMENT
                        - VLD
                        - VLDV2
                        - VLDV3
                      description: |
                        The segmentation type applies to universal shares. Specify `alignment` to use fixed length segmentation. Specify `vld` to use the version 1 of the variable length deduplication (VLD) algorithm. This type will be phased out in the future. Specify `vldv2` to use the version 2 of the variable length deduplication (VLD) algorithm. It is recommended to use this type as the default. Specify `vldv3` to use the version 3 of the variable length deduplication (VLD) algorithm. If set to `alignment`, minSize and maxSize are not required.
                    minSize:
                      type: integer
                      minimum: 16
                      maximum: 64
                      default: 16
                      description: |
                        The minimum segment size (KB) of the segmentation range. Suggested values are 16, 32, and 64.
                    maxSize:
                      type: integer
                      minimum: 32
                      maximum: 128
                      default: 32
                      description: |
                        The maximum segment size (KB) of the segmentation range. Suggested values are 32, 64, and 128.
    getUniversalShareStorageResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/universalShareStorageDefinition"
    getSingleUniversalShareStorageResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/universalShareStorageDefinition"
    kerberosEncryptionType:
      type: string
      description: The type of Kerberos encryption.
      enum:
        - krb5
        - krb5i
        - krb5p
    universalShareStorageDefinition:
      type: object
      required:
        - links
        - id
        - type
        - attributes
      properties:
        links:
          type: object
          properties:
            self:
              type: object
              properties:
                href:
                  type: string
        id:
          type: string
          description: A unique identifier for the universal share.
        type:
          type: string
          description: The resource type.
          enum:
            - universalShareStorage
        attributes:
          required:
            - displayName
            - protocol
            - vpfsMountState
            - shareCreationTime
            - clients
          type: object
          properties:
            displayName:
              type: string
              description: The display name of the universal share.
            protocol:
              type: string
              enum:
                - NFS
                - SMB
            kerberosEncryptionTypes:
              type: array
              items:
                $ref: "#/components/schemas/kerberosEncryptionType"
            clients:
              type: array
              items:
                $ref: "#/components/schemas/universalShareClient"
            exportPath:
              description: The path of the NFS/SMB export. This path is used in backup selection to protect universal share data.
              type: string
            mountPath:
              description: Protocol specific path along with server that can be used to mount the universal share.
              type: string
            shareCreationTime:
              description: The time the share was created, in ISO 8601 format.
              type: string
              format: date-time
            activeDirectoryGroupNames:
              type: array
              items:
                type: string
                description: The name of the Active Directory group.
            activeDirectoryUserNames:
              type: array
              items:
                type: string
                description: The Active Directory user name.
            localUserNames:
              description: The array of local users. Applies when the protocol is SMB and sambaSecurityMode is "user".
              type: array
              items:
                type: string
                description: The local user name.
            sambaSecurityMode:
              type: string
              enum:
                - ADS
                - USER
                - UNKNOWN
              description: |
                The SMB authentication mode configured on the storage server
                ADS - Active Directory authentication is configured
                USER - Local User Authentication is configured
                UNKNOWN - Indicates an error in determining the configured SMB authentication method
            errorMessage:
              type: string
              description: The error message to display if the status is 'INACTIVE'.
            vpfsServerName:
              type: string
              description: The name of the server hosting universal share.
            vpfsMountStatus:
              type: string
              enum:
                - ACTIVE
                - INACTIVE
              description: |
                The status indicates the health of the universal share.
                ACTIVE - In good health.
                INACTIVE - An issue exists with the universal share. It may be corrupted.
            vpfsMountState:
              type: string
              enum:
                - CREATED
                - EXPORTED
                - INPROGRESS
              description: |
                The state of the activity on the universal share.
                CREATED - The universal share is available.
                EXPORTED -  The universal share was exported to a client.
                INPROGRESS - The creation of the universal share is in progress.
            quotaSizeInBytes:
              type: integer
              format: int64
              description: The maximum amount of data that can be stored on the universal share before deduplication.
            currentUsageInBytes:
              type: integer
              format: int64
              description: The current size of the universal share in bytes, before deduplication.
            diskVolume:
              type: string
              description: The name of the disk volume selected for this universal share
            baasMappingPorts:
              type: string
              description: a string including LB port mapping list about stunnel for BAAS.
    universalShareClient:
      type: object
      required:
        - client
      properties:
        client:
          type: string
          description: The fully-qualified domain name, host name, or IP address of the remote host that is allowed to mount the universal share.
    universalShareAcceleratorDefinition:
      type: object
      required:
        - id
        - type
        - attributes
      properties:
        id:
          type: string
          description: A unique identifier for the universal share accelerator.
        type:
          type: string
          description: The resource type.
          enum:
            - universalShareAccelerator
        attributes:
          required:
            - displayName
          type: object
          properties:
            displayName:
              type: string
              description: The display name of the universal share accelerator.
            storageServerName:
              type: string
              description: The storage server name that the universal share accelerator is available on.
            engineFqdn:
              type: string
              description: The fully qualified domain name of the engine that the accelerator is available on.
            asset:
              type: string
              description: |
                The asset being backed up by the universal share accelerator.
            policyName:
              type: string
              description: |
                The name of the policy involved in the backup using this universal share accelerator.
            diskVolume:
              type: string
              description: The name of the disk volume selected for this universal share accelerator.
            mode:
              type: string
              description: The accelerator mode selected for this universal share accelerator
              enum:
                - ACCL_BAAS
                - ACCL_BYO
            backupId:
              type: string
              description: The backupId of the backup that this universal share accelerator is assigned to.
            clients:
              type: array
              items:
                $ref: "#/components/schemas/universalShareClient"
            quotaSizeInBytes:
              type: integer
              format: int64
              description: The maximum amount of data that can be stored on the universal share before deduplication.
    getSingleUniversalShareAcceleratorResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/universalShareAcceleratorDefinition"
    postUniversalShareAccelerator:
      description: The payload to create the universal share accelerator.
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              description: The resource type.
              type: string
              enum:
                - universalShareAccelerator
            attributes:
              type: object
              required:
                - diskVolume
                - mode
                - clients
              properties:
                displayName:
