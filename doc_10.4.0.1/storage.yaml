              description: If set to `true`, the cloud storage provider allows objects to be overwritten.
            authenticationApiVersion:
              type: integer
              description: The authentication API version supported by the cloud storage provider.
            supportedAuthTypes:
              type: array
              items:
                $ref: "#/components/schemas/providerAuthenticationDetails"
            supportedProxytypes:
              type: array
              items:
                type: string
            providerRegionDetails:
              $ref: "#/components/schemas/providerRegionDetails"
            supportedProxyAuthenticationTypes:
              type: array
              items:
                type: string
            selectedStorageClass:
              type: string
              description: The default storage class selected for the cloud storage provider.
            storageClassDetails:
              $ref: "#/components/schemas/providerStorageClassDetails"
            selectedStorageTier:
              type: string
              description: The default storage tier selected for the cloud storage provider.
            storageTierDetails:
              $ref: "#/components/schemas/providerStorageTierDetails"
            objectLockSupported:
              type: boolean
              description: If set to `true`, the cloud storage provider supports object lock.
            objectLockDetails:
              $ref: "#/components/schemas/providerObjectLockDetails"
            useCms:
              type: boolean
              default: false
              description: |
                If set to `true`, the cloud storage uses credentials stored in CMS by using provided cmsCredName instead of username and password for access key details.
    providerRegionDetails:
      type: array
      description: The region details for Amazon S3 or for Microsoft Azure API type supported cloud providers.
      items:
        type: object
        required:
          - serviceEndpoint
        properties:
          instanceName:
            type: string
            description: The cloud instance name.
          serviceEndpoint:
            type: string
            description: The cloud service provider endpoint.
          urlAccessStyle:
            type: string
            description: |
              The URL access style for the endpoint.
            enum:
              - PATH_STYLE
              - VIRTUAL_STYLE
          httpPort:
            type: integer
            description: The HTTP port details.
          httpsPort:
            type: integer
            description: The HTTPS port details.
          userCreated:
            type: boolean
            readOnly: true
            description: Only user created instances can be modified.
          s3RegionDetails:
            $ref: "#/components/schemas/providerS3RegionDetails"
    providerS3RegionDetails:
      type: array
      description: The region details for Amazon S3 API type cloud providers.
      items:
        type: object
        required:
          - serviceHost
        properties:
          serviceHost:
            type: string
            description: The cloud service provider host.
          glacierServiceHost:
            type: string
            description: The URL or service endpoint for the Amazon Glacier cloud provider.
          regionName:
            type: string
            description: The region name of the S3 API type supported cloud provider.
          regionId:
            type: string
            description: The region ID of the S3 API type supported cloud provider.
    providerAuthenticationDetails:
      type: object
      description: The supported authentication type by the cloud storage providers.
      properties:
        accessKey:
          $ref: "#/components/schemas/providerAccessKeyDetails"
        credentialBroker:
          $ref: "#/components/schemas/providerCredentialBrokerDetails"
        awsIdentityRole:
          $ref: "#/components/schemas/providerAwsIdentityRoleDetails"
        servicePrincipal:
          $ref: "#/components/schemas/providerServicePrincipalDetails"
        iamRoleAnywhere:
          $ref: "#/components/schemas/providerIamRoleAnywhereDetails"
        v2Identity:
          $ref: "#/components/schemas/providerV2IdentityDetails"
        v3Identity:
          $ref: "#/components/schemas/providerV3IdentityDetails"
        noneIdentity:
          $ref: "#/components/schemas/providerNoneIdentityDetails"
    providerAccessKeyDetails:
      type: array
      description: The access key authentication details for the cloud storage provider.
      items:
        type: string
    providerCredentialBrokerDetails:
      type: array
      description: The credential broker authentication details for the cloud storage provider.
      items:
        type: string
    providerAwsIdentityRoleDetails:
      type: array
      description: The AWS IAM role details for the Amazon and Amazon Gov Cloud.
      items:
        type: string
    providerServicePrincipalDetails:
      type: array
      description: The Azure service principal authentication details for the cloud storage provider.
      items:
        type: string
    providerIamRoleAnywhereDetails:
      type: array
      description: The AWS IAM Role Anywhere authentication details for the cloud storage provider.
      items:
        type: string
    providerV2IdentityDetails:
      type: object
      description: The V2 identity authentication details for the cloud storage provider.
      properties:
        locations:
          type: array
          items:
            $ref: "#/components/schemas/locationDetails"
        tenantDetails:
          type: array
          items:
            type: string
        userAccessDetails:
          type: array
          items:
            type: string
    providerV3IdentityDetails:
      type: object
      description: The V3 identity authentication details for the cloud storage provider.
      properties:
        locations:
          type: array
          items:
            $ref: "#/components/schemas/locationDetails"
        userAccessDetails:
          type: array
          items:
            type: string
        projectDetails:
          type: array
          items:
            type: string
    providerNoneIdentityDetails:
      type: object
      description: The details for the cloud storage provider with the identity type `none`.
      properties:
        locations:
          type: array
          items:
            $ref: "#/components/schemas/locationDetails"
        userAccessDetails:
          type: array
          items:
            type: string
    cloudProviderAliasAttributes:
      type: object
      properties:
        ssl:
          type: boolean
          description: Specifies that the SSL protocol is used for communication with the cloud storage provider.
        sslUsage:
          type: string
          description: |
            Specifies whether SSL should be used for authentication only or authentication and data transfer. Only applicable when `ssl` is true.
          enum:
            - AUTHENTICATION_ONLY
            - DATA_TRANSFER
        checkCertificateRevocation:
          type: boolean
          description: |
            Specifies that the SSL certificate should be checked for revocation. Only applicable when `ssl` is true.
        needTokenRenew:
          type: boolean
          description: |
            If set to `true`, the instance represented by this alias has a token that requires renewal. Used with Recovery Vault.
        httpHeaders:
          type: array
          description: Specifies the list of HTTP headers and their values.
          items:
            type: object
            required:
              - name
              - value
            properties:
              name:
                type: string
              value:
                type: string
              possibleValues:
                type: string
        proxyServer:
          type: boolean
          description: Specifies that a proxy server is used for communication with the cloud storage provider.
        proxyHost:
          type: string
          description: Specifies the IP address or name of the proxy server.
        proxyPort:
          type: integer
          description: Specifies the port number of the proxy server.
          minimum: 1
          maximum: 65535
        proxyType:
          type: string
          description: Specifies the internet protocol used by the proxy server.
          enum:
            - HTTP
            - SOCKS
            - SOCKS4
            - SOCKS5
            - SOCKS4A
        proxyTunneling:
          type: boolean
          description: |
            Specifies that HTTP CONNECT requests are used to open a tunnel for direct communication to the cloud storage provider. Only application when `proxyType` is `HTTP`.
        authenticationType:
          type: string
          description: |
            Specifies the type of authentication to use for the proxy server. Only applicable when `proxyType` is `HTTP`.
          enum:
            - NONE
            - BASIC
            - NTLM
        userName:
          type: string
          description: |
            Specifies the user name to use for proxy server authentication. Only applicable when `authenticationType` is not `NONE`.
        password:
          type: string
          description: |
            Specifies the password to use for proxy server authentication. Only applicable when `authenticationType` is not `NONE`.
          format: password
          writeOnly: true
        isLSU:
          type: boolean
          description: |
            This flag indicates that alias is associated with a MSDP cloud volume configuration.
          readOnly: true
        isSourceKind:
          type: boolean
          description: |
            This flag indicates that alias is associated with a cloud object store account.
          readOnly: true
        isStorageServer:
          type: boolean
          description: |
            This flag indicates that alias is associated with a storage server.
          readOnly: true
    getImportSlps:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/getImportSLPResponse"
        links:
          $ref: ./common.yaml#/components/schemas/paginationLinks
        meta:
          type: object
          properties:
            pagination:
              $ref: ./common.yaml#/components/schemas/paginationAttributes
      required:
