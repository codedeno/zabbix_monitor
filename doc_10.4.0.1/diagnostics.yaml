openapi: 3.0.0
info:
  title: NetBackup Diagnostics API
  version: "11.0"
  description: |
    The NetBackup Diagnostics API provides diagnostic information about the NetBackup Web Management Console.
externalDocs:
  description: Getting Started Guide
  url: http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started/
servers:
  - url: '/netbackup'
    description: NetBackup Master
paths:
  /diagnostics/thread-dump:
    post:
      description: |
        Takes a thread dump and writes it to a file.  Returns the file path to the created thread dump file on the server.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|DIAGNOSTICS|WMC|`\
        Requires Operation: `|OPERATIONS|DUMP|`
      tags:
        - Thread Management
      responses:
        "201":
          description: Successfully created the thread dump log file and returned the path of the created file.
          content:
            text/vnd.netbackup+plain;version=11.0:
              schema:
                type: string
                example: /usr/openv/wmc/webserver/logs/nbwmc-thread-dump-2020-06-29T14:13:00Z.log
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  /diagnostics/heap-dump:
    post:
      description: |
        Takes a heap dump and writes it to a file.  Returns the file path to the created heap dump file on the server.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|DIAGNOSTICS|WMC|`\
        Requires Operation: `|OPERATIONS|DUMP|`
      tags:
        - Memory Management
      responses:
        "201":
          description: Successfully created the heap dump log file and returned the path of the created file.
          content:
            text/vnd.netbackup+plain;version=11.0:
              schema:
                type: string
                example: /usr/openv/wmc/webserver/logs/nbwmc-heap-dump-2020-06-29T14:13:00Z.log
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
    cookieAuth:
      type: apiKey
      in: cookie
      name: Authorization
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - apiKeyAuth: []
  - cookieAuth: []
  - jwtAuth: []
