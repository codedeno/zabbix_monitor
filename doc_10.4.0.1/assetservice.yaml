openapi: 3.0.0
info:
  title: NetBackup Asset Service API
  version: "11.0"
  description: The NetBackup Asset Service API provides access to NetBackup asset information via workload providers.
externalDocs:
  description: Getting Started Guide
  url: http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started/
servers:
  - url: '/netbackup'
    description: NetBackup Master
paths:
  /asset-service/workloads:
    get:
      description: |
        Retrieves the list of workloads supported by the asset service.

        **Access Control**\
        Enforcement Type: `None`
      tags:
        - Workloads
      parameters:
        - name: include
          description: Specifies the related resource type to include in the response.
          in: query
          required: false
          schema:
            type: string
            enum:
              - workloadDetails
        - $ref: "#/components/parameters/metaData"
      responses:
        "200":
          description: Retrieved the list of workloads.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/getWorkloadsResponse"
        "400":
          description: Invalid include parameter.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
  "/asset-service/workloads/{workload}":
    get:
      description: |
        Retrieves the workload details of a specified workload.

        **Access Control**\
        Enforcement Type: `None`
      tags:
        - Workloads
      parameters:
        - name: workload
          description: Specifies the workload type.
          in: path
          required: true
          schema:
            type: string
        - name: include
          description: Specifies the related resource type to include in the response.
          in: query
          required: false
          schema:
            type: string
            enum:
              - workloadDetails
        - $ref: "#/components/parameters/metaData"
      responses:
        "200":
          description: Retrieved the workload details.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/getWorkloadResponse"
        "400":
          description: Invalid include parameter.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: Specified workload cannot be found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
  "/asset-service/workloads/{workload}/assets":
    get:
      description: |
        Retrieves the list of assets from the specified workload based on specified filters.

        For a complete JSON schema definition of the supported assets for this specified workload, please refer to `data.attributes.schema` in the response of the following API:

        `GET /asset-service/workloads/{workload}/schemas?filter=schemaName eq 'asset'`

        **Access Control**\
        Enforcement Type: [Object-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-object-level-enforcement)

        Namespace: (Reference the `data.meta.accessControlId` metadata response attribute for specific object-level namespaces)\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Assets
      parameters:
        - name: workload
          description: |
            Specifies the workload type. For a list of supported workloads, please refer to `data[].id` in the response of the following API:

            `GET /asset-service/workloads`
          in: path
          required: true
          schema:
            type: string
        - name: filter
          description: |
            Specifies filters according to OData standards.

            The `x-netbackup.filterable` boolean value for each field in the JSON schema definition determines whether that field is supported for filtering.
          in: query
          required: false
          schema:
            type: string
        - name: fields[asset]
          description: |
            Specifies the asset fields only to be returned in the response.
            The value of this parameter must be a comma-separated list that refers to the name(s) of the fields only to be included in the response. If this parameter is not present, then all fields will be returned.
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/metaData"
        - name: page[offset]
          description: Specifies the asset record number offset.
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: page[limit]
          description: Specifies the number of asset records to display on one page.
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: page[disable]
          description: |
            Specifies that pagination should be disabled entirely. All results will be returned together.
            This param is mutually exclusive of any other page params.
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: sort
          description: |
            Specifies one or more fields by which to sort the response data.

            The value of this parameter must be a comma-separated list of sort fields in the order they are to be sorted.
            The sort order for each sort field is ascending unless it is prefixed with a minus (`-`) to specify descending order.

            The `x-netbackup.sortable` value for each field in the JSON schema definition determines if that field is supported for sorting and the supported sorting order.
          in: query
          required: false
          schema:
            type: string
        - name: Cache-Control
          description: |
            Specifies a directive to modify the caching behavior of the request.
            * `no-cache` - Fetch assets without reusing previously cached data. Newly created assets, deleted assets, and RBAC changes are reflected in the response.
          in: header
          required: false
          schema:
            type: string
            enum:
              - no-cache
      responses:
        "200":
          description: Retrieved the assets based on the applied filters.
          headers:
            X-NetBackup-Warning:
              $ref: "#/components/headers/X-NetBackup-Warning"
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/getAssetsResponse"
        "400":
          description: Invalid filter criteria.
          headers:
            X-NetBackup-Warning:
              $ref: "#/components/headers/X-NetBackup-Warning"
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: Specified workload could not be found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
  "/asset-service/workloads/{workload}/assets/{assetId}":
    get:
      description: |
        Retrieves the details of the specified asset.

        For a complete JSON schema definition of the supported assets for this specified workload, please refer to `data.attributes.schema` in the response of the following API:

        `GET /asset-service/workloads/{workload}/schemas?filter=schemaName eq 'asset-by-id' and schemaType eq 'NAMED_QUERY_RESPONSE'`

        **Access Control**\
        Enforcement Type: [Object-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-object-level-enforcement)

        Namespace: (Reference the `data.meta.accessControlId` metadata response attribute for specific object-level namespaces) \
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Assets
      parameters:
        - name: workload
          description: |
            Specifies the workload type. For a list of supported workloads, please refer to `data[].id` in the response of the following API:

            `GET /asset-service/workloads`
          in: path
          required: true
          schema:
            type: string
        - name: assetId
          description: Specifies the identifier of an asset of a particular workload.
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/metaData"
      responses:
        "200":
          description: Successfully retrieved the the details of the asset.
          headers:
            X-NetBackup-Warning:
              $ref: "#/components/headers/X-NetBackup-Warning"
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/getAssetResponse"
        "400":
          description: Invalid asset ID.
          headers:
            X-NetBackup-Warning:
              $ref: "#/components/headers/X-NetBackup-Warning"
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "403":
          description: Forbidden. An attempt to alter system-defined data was denied.
          headers:
            X-NetBackup-Warning:
              $ref: "#/components/headers/X-NetBackup-Warning"
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "404":
          description: Specified workload could not be found or no asset was found for the specified asset identifier.
          headers:
            X-NetBackup-Warning:
              $ref: "#/components/headers/X-NetBackup-Warning"
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
  "/asset-service/workloads/{workload}/assets/{assetId}/{relationshipName}":
    get:
      description: |
        Retrieves the list of related assets of a specified asset ID.

        For a complete JSON schema definition of the supported assets for this specified workload, please refer to `data.attributes.schema` in the response of the following API:

        `GET /asset-service/workloads/{workload}/schemas?filter=schemaName eq 'asset'`

        **Access Control**\
        Enforcement Type: [Object-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-object-level-enforcement)

        Namespace: (Reference the `data.meta.accessControlId` metadata response attribute for specific object-level namespaces)\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Assets
      parameters:
        - name: workload
          description: |
            Specifies the workload type. For a list of supported workloads, please refer to `data[].id` in the response of the following API:

            `GET /asset-service/workloads`
          in: path
          required: true
          schema:
            type: string
        - name: assetId
          description: Specifies the identifier of an asset of a particular workload.
          in: path
          required: true
          schema:
            type: string
        - name: relationshipName
          description: Specifies the name of the asset's relationship to its related assets.
          in: path
          required: true
          schema:
            type: string
        - name: fields[asset]
          description: |
            Specifies the related asset fields only to be returned in the response.
            The value of this parameter must be a comma-separated list that refers to the name(s) of the fields only to be included in the response. If this parameter is not present, then all fields will be returned.
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/metaData"
        - name: page[offset]
          description: Specifies the asset record number offset.
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: page[limit]
          description: Specifies the number of asset records to display on one page.
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: page[disable]
          description: |
            Specifies that pagination should be disabled entirely. All results will be returned together.
            This param is mutually exclusive of any other page params.
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: Cache-Control
          description: |
            Specifies a directive to modify the caching behavior of the request.
            * `no-cache` - Fetch related assets without reusing previously cached data. Newly created assets, deleted assets, and RBAC changes are reflected in the response.
          in: header
          required: false
          schema:
            type: string
            enum:
              - no-cache
      responses:
        "200":
          description: Retrieved the assets based on the applied filters.
          headers:
            X-NetBackup-Warning:
              $ref: "#/components/headers/X-NetBackup-Warning"
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/getAssetsResponse"
        "400":
          description: Invalid filter criteria.
          headers:
            X-NetBackup-Warning:
              $ref: "#/components/headers/X-NetBackup-Warning"
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: Either specified workload could not be found, no asset was found for the specified asset identifier or relationship name could not be found for the specified asset.
          headers:
            X-NetBackup-Warning:
              $ref: "#/components/headers/X-NetBackup-Warning"
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
  /asset-service/queries:
    post:
      description: |
        Execute a named query by one or more workloads.

        The result set of this named query execution is a short-lived resource and will expire after 30 minutes of inactivity. If the asset service is under heavy load, the result set could expire earlier.

        **Access Control**\
        Enforcement Type: [Object-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-object-level-enforcement)

        Namespace: For object level access controls please refer to `data.attributes.schema.x-netbackup.accessControls` in the response of the following API:

        `GET /asset-service/workloads/{workload}/schemas?filter=schemaName eq {queryName} and schemaType eq 'NAMED_QUERY_REQUEST'`
      tags:
        - Queries
      parameters:
        - name: x-netbackup-initial-owner-role
          in: header
          description: Specifies the role Ids intended to define the initial object access.
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/postNamedQueryRequest"
        description: |
          The request body of the named query that includes the query name, workloads, and workload/query specific parameters. If the workloads field is empty, the query will be executed by all supported workloads.

          For the JSON schema definition of the parameters object of the request body for a specified workload, please refer to `data.attributes.schema` in the response of the following API:

          `GET /asset-service/workloads/{workload}/schemas?filter=schemaName eq {queryName} and schemaType eq 'NAMED_QUERY_REQUEST'`
      responses:
        "201":
          description: Successfully executed the named query.
          headers:
            X-NetBackup-Warning:
              $ref: "#/components/headers/X-NetBackup-Warning"
            Location:
              schema:
                type: string
              description: URL of the response resource
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/postNamedQueryResponse"
        "400":
          description: Invalid request parameters.
          headers:
            X-NetBackup-Warning:
              $ref: "#/components/headers/X-NetBackup-Warning"
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
  "/asset-service/queries/{queryId}":
    get:
      description: |
        Retrieves the result set of a specific named query execution, which was performed via the following API:

        `POST /asset-service/queries`

        For a complete JSON schema definition of the results of a specified named query for a specified workload, please refer to `data.attributes.schema` in the response of the following API:

        `GET /asset-service/workloads/{workload}/schemas?filter=schemaName eq {queryName} and schemaType eq 'NAMED_QUERY_RESPONSE'`

        **Access Control**\
        Enforcement Type: [Object-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-object-level-enforcement)

        Namespace: For object level access controls please refer to `data.attributes.schema.x-netbackup.accessControls` in the response of the following API:

        `GET /asset-service/workloads/{workload}/schemas?filter=schemaName eq {queryName} and schemaType eq 'NAMED_QUERY_REQUEST'`
      tags:
        - Queries
      parameters:
        - name: queryId
          description: |
            The global unique identifier for a named query result set. This identifier can be found in `id` of the response of the following API:

            `POST /asset-service/queries`
          in: path
          required: true
          schema:
            type: string
        - name: page[offset]
          description: Specifies the named query result set record number offset.
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: page[limit]
          description: Specifies the number of named query result set records to display on one page.
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: page[disable]
          description: |
            Specifies that pagination should be disabled entirely. All results will be returned together.
            This param is mutually exclusive of any other page params.
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: Cache-Control
          description: |
            Specifies a directive to modify the caching behavior of the request.
            * `no-cache` - Fetch query results without reusing previously cached data. Newly created assets, deleted assets, and RBAC changes are reflected in the response.
          in: header
          required: false
          schema:
            type: string
            enum:
              - no-cache
      responses:
        "200":
          description: |
            Successfully retrieved the result set of the named query execution. If the named query was executed on multiple workloads, a failure to retrieve results from any of the specified workloads will result in a GET failure.
          headers:
            X-NetBackup-Warning:
              $ref: "#/components/headers/X-NetBackup-Warning"
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/getNamedQueryResponse"
        "400":
          description: Invalid query parameters.
          headers:
            X-NetBackup-Warning:
              $ref: "#/components/headers/X-NetBackup-Warning"
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: No query result set was found for the specified query identifier or the query result set has expired.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
  "/asset-service/workloads/{workload}/schemas":
    get:
      description: |
        Retrieves the list of available schemas based on specified filters. If no filters are specified, all available schemas are listed.

        **Access Control**\
        Enforcement Type: `None`
      tags:
        - Schemas
      parameters:
        - name: workload
          description: |
            Specifies the workload type. For a list of supported workloads, please refer to `data[].id` in the response of the following API:

            `GET /asset-service/workloads`
          in: path
          required: true
          schema:
            type: string
        - name: filter
          description: |
            Filter criteria syntax is based on OData standards. Filtering is supported on the following attributes:
            |Name|Supported Operators|Description|Schema|
            |---|---|---|---|
            |schemaName|eq ne gt ge lt le and or not () contains endswith startswith tolower toupper|The schema name. For example, 'assets'. |string|
            |schemaType|eq ne gt ge lt le and or not () contains endswith startswith tolower toupper|The schema type. For example, 'NAMED_QUERY_RESPONSE'. |string|
          in: query
          required: false
          schema:
            type: string
        - name: fields[schemas]
          description: |
            Specifies the schema fields only to be returned in the response.
            The value of this parameter must be a comma-separated list that refers to the name(s) of the fields only to be included in the response. If this parameter is not present, then all fields will be returned.
            Possible values are schemaName and schemaType.
          in: query
          required: false
          schema:
            type: string
        - name: page[offset]
          description: Specifies the schema record number offset.
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: page[limit]
          description: Specifies the number of schema records to display on one page.
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: |
            Successfully retrieved the list of available schemas.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/getSchemasResponse"
        "400":
          description: The given URL was malformed.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: Specified workload could not be found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
  "/asset-service/workloads/{workload}/schemas/{schemaId}":
    get:
      description: |
        Retrieves the specified JSON schema definition for the specified workload.

        **Access Control**\
        Enforcement Type: `None`
      tags:
        - Schemas
      parameters:
        - name: workload
          description: |
            Specifies the workload type. For a list of supported workloads, please refer to `data[].id` in the response of the following API:

            `GET /asset-service/workloads`
          in: path
          required: true
          schema:
            type: string
        - name: schemaId
          description: |
            Specifies the schema to retrieve. For a list of supported schema names for the specified workload, please refer to `data[].id` in the response of the following API:

            `GET /asset-service/workloads/{workload}/schemas?fields[schemas]=schemaName`
          in: path
          required: true
          schema:
            type: string
        - name: fields[schemas]
          description: |
            Specifies the schema fields only to be returned in the response.
            The value of this parameter must be a comma-separated list that refers to the name(s) of the fields only to be included in the response. If this parameter is not present, then all fields will be returned.
            Possible values are schemaName and schemaType.
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: |
            Successfully returned the requested schema.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/getSchemaResponse"
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: Specified workload or specified schema could not be found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
    cookieAuth:
      type: apiKey
      in: cookie
      name: Authorization
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  headers:
    X-NetBackup-Warning:
      schema:
        type: string
      description: |
        Migration warning message string with quotes.
        Example:
        "The migration process is in progress. The provided data might be inconsistent and incomplete."
  schemas:
    getWorkloadsResponse:
      type: object
      required:
        - data
        - links
      properties:
        links:
          $ref: ./common.yaml#/components/schemas/paginationLinks
        meta:
          type: object
          properties:
            pagination:
              $ref: ./common.yaml#/components/schemas/paginationAttributes
        data:
          type: array
          items:
            $ref: "#/components/schemas/workloadNameDetails"
        included:
          type: array
          items:
            $ref: "#/components/schemas/workloadDetailsData"
    getWorkloadResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/workloadNameDetails"
        included:
          type: array
          items:
            $ref: "#/components/schemas/workloadDetailsData"
    workloadNameDetails:
      type: object
      required:
        - links
        - type
        - id
        - relationships
      properties:
        links:
          type: object
          properties:
            self:
              $ref: ./common.yaml#/components/schemas/resourceSelfLink
        type:
          type: string
          enum:
            - workload
          description: Specifies the resource type. Must be set to 'workload'.
        id:
          type: string
          description: The name of the workload.
          example: exampleworkload
        relationships:
          type: object
          required:
            - workloadDetails
          properties:
            workloadDetails:
              $ref: "#/components/schemas/workloadDetails"
        meta:
          type: object
          properties:
            accessControlId:
              type: string
              description: Access control namespace of the object.
    workloadDetails:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - type
            - id
          properties:
            type:
              type: string
              enum:
                - workloadDetails
              description: Specifies the resource type. Must be set to 'workloadDetails'.
            id:
              type: string
              description: The name of the workload.
              example: exampleworkload
