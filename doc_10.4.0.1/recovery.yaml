        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "405":
          $ref: ./common.yaml#/components/responses/errorNotAllowed
  "/recovery/workloads/vmware/scenarios/instant-recovery-vms/{instantRecoveryId}/deactivate":
    post:
      description: |
        Deactivates the VMware virtual machine instant recovery operation. Removes the virtual machine from the ESX
        host. If no other virtual machine uses the NetBackup NFS datastore, this option removes that datastore and
        releases its resources on the NetBackup media server. This option is for removing the virtual machine after you
        have finished copying its files and do not intend to keep the machine.

        Note: If the virtual machine has been migrated to a production datastore using vMotion, this API is the same as
        the `complete` API.

        Note: If vMotion is still in progress for this virtual machine, you should cancel the vMotion job before you use
        this API.

        **Access Control**\
        Enforcement Type: [Object-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-object-level-enforcement)\
        Namespace: (Reference the `data.attributes.commonAssetAttributes.accessControlId` attribute in the asset-service response, for the object-level namespace)\
        Requires Operation: `|OPERATIONS|ASSETS|VMWARE|VM|INSTANT_RECOVERY|`
      tags:
        - VMware Workloads
      security:
        - rbacSecurity: []
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema: {}
      parameters:
        - name: instantRecoveryId
          in: path
          description: This is the virtual machine's numeric identifier from the `GET` instant-recovery-vms API response.
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deactivation completed.
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: The specified instant recovery ID was not found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "405":
          $ref: ./common.yaml#/components/responses/errorNotAllowed
  "/recovery/workloads/vmware/scenarios/instant-recovery-vms/{instantRecoveryId}/complete":
    post:
      description: |
        Completes the VM instant recovery job after the data is migrated. When vMotion migration of the virtual machine
        finishes, this option completes the virtual machine instant recovery job. It also removes the NetBackup NFS
        datastore if no other virtual machine uses it. When the datastore is removed, its resources are released on the
        media server.

        **Access Control**\
        Enforcement Type: [Object-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-object-level-enforcement)\
        Namespace: (Reference the `data.attributes.commonAssetAttributes.accessControlId` attribute in the asset-service response, for the object-level namespace)\
