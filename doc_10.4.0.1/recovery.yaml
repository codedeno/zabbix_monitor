            |targetServer|eq, ne, contains, startswith, endswith|The target server that will have access to the instant access mount.|string|
            |databaseName|eq, ne, contains, startswith, endswith|Name of database which the instant access mount created from.|string|
            |instanceName|eq, ne, contains, startswith, endswith|Name of instance which the instant access mount created from.|string|
            |liveMountCloneOf|eq, ne, contains, startswith, endswith|Name of database or PDB which the instant access mount created from.|string|
            |mountId|eq, ne, contains, startswith, endswith|mount id of the instant access livemount.|string|
