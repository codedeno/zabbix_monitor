openapi: 3.0.0
info:
  title: NetBackup Recovery API
  version: "11.0"
  description: |
    The NetBackup Recovery API provides the ability to perform a recovery from previous backups.
externalDocs:
  description: Getting Started Guide
  url: http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started/
servers:
  - url: '/netbackup'
    description: NetBackup Master
paths:
  /recovery/workloads/mssql/scenarios/database-complete-recovery/recover:
    post:
      description: |
        Restores a completely recovered Microsoft SQL Server database to a requested recovery point.

        **Access Control**\
          To initiate a recovery, the principal must have VIEW and RECOVER permissions on the asset.

        Enforcement Type: [Object-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-object-level-enforcement)\
        Namespace: (Reference the `data.attributes.commonAssetAttributes.accessControlId` attribute in the asset service response, for the object-level namespace)\
        Requires Operation: `|OPERATIONS|VIEW|`\
        Requires Operation: `|OPERATIONS|MSSQL|RECOVER|`

        A restore to an alternate location requires:\
        Requires Operation: `|OPERATIONS|MSSQL|ALT_RECOVER|`

        Overwriting the original asset requires:\
        Requires Operation: `|OPERATIONS|MSSQL|OVERWRITE_RECOVER|`\
        A restore from an instant access database requires:\
        Requires Operation: `|OPERATIONS|MSSQL|INSTANT_ACCESS_RECOVER|`

        A restore using credentialId requires:\
        Requires Operation: `|OPERATIONS|VIEW|`\
        Requires Operation: `|OPERATIONS|MANAGE|CREDENTIALS|ASSIGNABLE|`
      tags:
        - Microsoft SQL Server Workloads
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: ./Recovery_MSSql_Database.yaml#/components/schemas/mssqlCompleteRecoveryRequest
        description: The request body for the recovery of the Microsoft SQL Server database.
        required: true
      responses:
        "201":
          description: Database recovery started.
          headers:
            Location:
              description: Contains the links to the created recovery jobs.
              schema:
                type: string
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/recoveryResponse"
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: Not found. The specified client or backup image was not found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "405":
          $ref: ./common.yaml#/components/responses/errorNotAllowed
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "500":
          description: Internal server error. The recovery job failed to start.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "503":
          description: The server is busy. The recovery job failed to start.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
  /recovery/workloads/mssql/scenarios/database-specific-rec-point/recover:
    post:
      description: |
        Restore a Microsoft SQL Server database with the given set of recovery points.

        **Access Control**\
          To initiate a recovery, the principal must have VIEW and RECOVER permissions on the asset.

