  /recovery/workloads/physical/scenarios/granular-files-folders/recover:
    post:
      description: |
        Recovers individual files and folders from a physical system.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|ASSETS|FILESYSTEM-CLIENT`\
        Requires Operation: `|OPERATIONS|ASSETS|FILESYSTEM-CLIENT|RESTORE_DESTINATION|`\
        Requires Operation: `|OPERATIONS|ASSETS|FILESYSTEM-CLIENT|RESTORE|`

        A restore of files and folders from malware-affected images requires the following permission:\
        Requires Operation: `|OPERATIONS|ASSETS|FILESYSTEM-CLIENT|RESTORE_MALWARE_INFECTED|`

        Note that this operation will allow a user to restore images to **ANY** NetBackup client.
      tags:
        - Physical Workloads
      requestBody:
        content:
          multipart/vnd.netbackup+form-data;version=11.0:
            schema:
              type: object
              required:
                - recoveryRequest
                - selectionsFile
              properties:
                recoveryRequest:
                  $ref: ./Recovery_Physical_Granular_Files_Folders.yaml#/components/schemas/physicalGranularFilesFoldersRecoveryRequest
                selectionsFile:
                  description: |
                    A file containing a JSON array of the files to be restored with their path and backup time in ISO
                    8601 format.

                    Example:
                    ```
                    [
                      {
                        "path": "/C/Users/john/Desktop/report1.doc",
                        "backupTime": "2020-10-23T00:31:00.000Z"
                      },
                      {
                        "path": "/C/Users/john/Desktop/Office365_64bit.exe",
                        "backupTime": "2020-10-23T00:31:00.000Z"
                      }
                    ]
                    ```
                  type: string
                  format: binary
                renameFile:
                  description: |
                    A file containing a JSON array of the file to restore to a different location with the original and
                    destination paths.

                    Example:
                    ```
                    [
                      {
                        "from": "/C/Users/john/Desktop/Office365_64bit.exe",
                        "to": "/C/Users/john/Downloads/Office365_64bit.exe"
                      }
                    ]
                    ```
                  type: string
                  format: binary
        description: A request for a physical files/folders recovery.
        required: true
      responses:
        "201":
          description: The recovery job started successfully.
          headers:
            Location:
              description: Contains the link to the created recovery job.
              schema:
                type: string
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/recoveryResponse"
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "404":
          description: Not found. The specified backup image was not found.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "405":
          $ref: ./common.yaml#/components/responses/errorNotAllowed
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "500":
          description: Internal server error. Failed to start recovery.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "503":
          description: The server is busy. Failed to start recovery.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
