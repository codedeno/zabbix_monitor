  /recovery/workloads/vmware/scenarios/instant-recovery-vms:
    post:
      description: |
        Activates the instant recovery of a VMware virtual machine.

        **Access Control**\
        Server
        Enforcement Type: [Object-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-object-level-enforcement)\
        Namespace: (Reference the `data.meta.accessControlId` metadata response attribute for the specified vcenter_identifier or esx_identifier or restore_esx_identifier namespace in the API response. GET /config/servers/vmservers?meta=accessControlId)\
        Requires Operation: `|OPERATIONS|ASSETS|VMWARE|RESTORE_DESTINATION|`

        Asset
        Enforcement Type: [Object-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-object-level-enforcement)\
        Namespace: (Reference the `data.attributes.commonAssetAttributes.accessControlId` attribute in the asset-service response, for the object-level namespace)\

        Overwriting the original asset requires both operations:\
        Requires Operation: `|OPERATIONS|ASSETS|VMWARE|VM|RECOVER|`\
        Requires Operation: `|OPERATIONS|ASSETS|VMWARE|VM|INSTANT_RECOVERY|`

        A restore from malware-affected images requires the following permission:\
        Requires Operation: `|OPERATIONS|ASSETS|VMWARE|VM|RESTORE_MALWARE_INFECTED|`
      tags:
        - VMware Workloads
      security:
        - rbacSecurity: []
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: ./Recovery_VMware_VM_IR.yaml#/components/schemas/vmwareVMInstantRecoveryRequest
        description: The request body has the options required to activate a VMware virtual machine instant recovery.
        required: true
      responses:
        "201":
          description: The instant recovery job started successfully.
          headers:
            Location:
              description: Contains the link to the created instant recovery job.
              schema:
                type: string
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/recoveryResponse"
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "405":
          $ref: ./common.yaml#/components/responses/errorNotAllowed
    get:
      description: |
        Retrieves the list of all the ongoing VMware virtual machine instant recovery operations.

        **Access Control**\
        Enforcement Type: [Object-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-object-level-enforcement)\
        Namespace: (Reference the `data.attributes.commonAssetAttributes.accessControlId` attribute in the asset-service response, for the object-level namespace)\
        Requires Operation: `|OPERATIONS|ASSETS|VMWARE|VM|INSTANT_RECOVERY|`
      tags:
        - VMware Workloads
      security:
        - rbacSecurity: []
      responses:
        "200":
          description: Retrieved the list of all the ongoing VMware virtual machine instant recovery operations.
          headers:
            Location:
              description: Contains the link to the created instant recovery job.
              schema:
