        Requires Operation: `|OPERATIONS|ASSETS|STANDARD|INSTANT_ACCESS_RECOVER|`
      tags:
        - Standard Workloads
      parameters:
        - name: filter
          description: |
            Filter criteria syntax is based on OData standards. Filtering is supported on the following attributes:
            |Name|Supported Operators|Description|Schema|
            |---|---|---|---|
            |displayName|eq, ne, contains, startswith, endswith|The name of the instant accesss mount.|string|
            |status|eq, ne, contains, startswith, endswith|status of instant access mount (ACTIVE/INACTIVE/EXPIRED/INPROGRESS)|string|
            |state|eq, ne, contains, startswith, endswith|state of instant access mount (CREATED/EXPORTED)|string|
            |created|eq, ne, gt, ge, lt, le|Instant access mount creation time in ISO 8601 format|date-time|
            |protocol|eq, ne, contains, startswith, endswith|instant access mount export protocl (NFS/SMB)|string|
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Successfully retrieved the list of instant access mounts.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./Recovery_Instant_Access_UnstructuredData.yaml#/components/schemas/instantAccessUnstructuredDataMountResponseArray
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          description: Internal server error. Failed to get the list of instant access mounts.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
