components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
    cookieAuth:
      type: apiKey
      in: cookie
      name: Authorization
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    recoveryResponse:
      description: The recovery response.
      type: object
      required:
        - data
        - relationships
      properties:
        data:
          description: Contains the recovery response data.
          type: object
          required:
            - type
            - id
            - attributes
          properties:
            type:
              description: The response type.
              type: string
              default: recoveryResponse
            id:
              description: The response identifier.
              type: integer
              format: int64
            attributes:
              description: Contains the recovery response attributes.
              type: object
              required:
                - msg
              properties:
                msg:
                  description: The response message.
                  type: string
        relationships:
          description: Contains the resources related to the recovery operation, such as `recoveryJob`.
          type: object
          required:
            - recoveryJob
          properties:
            recoveryJob:
              description: Represents the job created by this recovery operation.
              type: object
              required:
                - links
                - data
              properties:
                links:
                  description: Contains the links to get the job details.
                  type: object
                  required:
                    - self
                    - related
                  properties:
                    self:
                      description: Gets the details about this recovery job.
                      type: string
                    related:
                      description: Gets a list of recent jobs.
                      type: string
                data:
                  type: object
                  description: Contains the recovery job data.
                  required:
                    - type
                    - id
                  properties:
                    type:
                      description: The resource type. Set to `job`.
                      type: string
                    id:
                      description: The job identifier.
                      type: integer
                      format: int64
      example:
        data:
          type: recoveryResponse
          id: 0
          attributes:
            msg: Recovery job started successfully
        relationships:
          recoveryJob:
            links:
              related: /admin/jobs
              self: /admin/jobs/0
            data:
              type: job
              id: 0
    kubernetesPreRecoveryCheckResponse:
      description: The pre-recovery-check response schema for Kubernetes.
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/kubernetesRecoveryValidationItem"
      example:
        data:
          - type: kubernetesRecoveryValidationItem
            id: 3
            attributes:
              name: Kubernetes cluster Validation
              result: Passed
              description: cluster validation - Passed
          - type: kubernetesRecoveryValidationItem
            id: 9
            attributes:
              name: namespace name Validation
              result: Passed
              description: Namespace name validation - Passed
    kubernetesRecoveryValidationItem:
      type: object
      description: Describes the recovery validation item.
      properties:
        type:
          type: string
          description: The type of the recovery validation.
          enum:
            - kubernetesRecoveryValidationItem
        id:
          type: string
          description: The ID of the recovery validation.
        attributes:
          type: object
          description: Describes the validation item.
          properties:
            name:
              type: string
              description: Name of the validation item.
            result:
              enum:
                - PASSED
                - FAILED
                - WARNING
              type: string
              description: Result of the validation item.
            description:
              type: string
              description: Description of the validation item.
          required:
            - name
            - result
      required:
        - type
        - id
        - attributes
    dynamicNASRecoveryResponse:
      description: The recovery response.
      type: object
      required:
        - data
      properties:
        data:
          description: Contains the recovery response data.
          type: array
          items:
            type: object
            required:
              - type
              - id
              - attributes
              - relationships
            properties:
