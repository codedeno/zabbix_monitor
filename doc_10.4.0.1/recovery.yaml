    kubernetesNamespaceRecoveryRequest:
      description: The recovery request schema for Kubernetes namespace recovery.
      type: object
      required:
        - data
      properties:
        data:
          description: Contains the recovery request data.
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              description: The resource type.
              type: string
              enum:
                - recoveryRequest
            attributes:
              description: The attributes of the recovery request.
              type: object
              required:
                - recoveryPoint
                - recoveryObject
              properties:
                recoveryPoint:
                  type: object
                  description: Selects the recovery point based on the specified options.
                  properties:
                    backupId:
                      type: string
                      description: |
                        The backup image identifier to use for this recovery.
                    client:
                      type: string
                      description: |
                        The client identifier that was used at the time of backup. Required, if `backupId` is not specified. Cannot be used with `backupId`. If a `filter` is not specified along with `client`, the recovery is performed using the most recent backup image.
                    filter:
                      type: string
                      description: |
                        Selects the backup images for recovery based on the specified `filter`. Cannot be used along with `backupId`. If more than one backup image matches the filter, NetBackup selects the most recent one. All the filters are based on the OData standard and filtering on the following attributes is supported.
                        <table border="1px">
                          <tr>
                            <th>Name</th>
                            <th>Supported Operators</th>
                            <th>Description</th>
                            <th>Schema</th>
                          </tr>
                          <tr>
                            <td>backupTime</td>
                            <td>ge le</td>
                            <td>The backup timestamp in <a href="http://xml2rfc.ietf.org/public/rfc/html/rfc3339.html#anchor14">ISO 8601 format</a></td>
                            <td>date-time</td>
                          </tr>
                        </table>
                        The `filter` can be used to specify a time interval, such as `backupTime ge '2016-11-20T23:20:50Z' and backupTime le '2016-12-20T23:20:50Z'`. If the `filter` only specifies the start of the time interval, such as `backupTime ge '2016-11-20T23:20:50Z'`, then the end of the interval is assumed to be the current time. If the `filter` only specifies the end of the time interval, such as `backupTime le '2016-11-20T23:20:50Z'`, then the start of the interval is assumed to be 6 months prior to that. If the `filter` is not specified, the end of the time interval is assumed to be the current time and the start of the interval is assumed to be 6 months prior to that.
                    copyNumber:
                      type: integer
                      default: 0
                      description: |
                        The copyNumber to use for the recovery.
                recoveryObject:
                  type: object
                  description: The namespace to recover.
                  required:
                    - destinationCluster
                  properties:
                    destinationCluster:
                      type: string
                      description: The cluster ID to use for the recovery.
                    destinationNamespace:
                      type: string
                      description: |
                        The destination namespace of the restore.
                    includedResources:
                      type: array
                      description: |
                        Resources to include in the restore, formatted as resource.group, such as storageclasses.storage.k8s.io.
                      items:
                        type: string
                        description: |
                          The resource kind which has to be included during restore.
                    excludedResources:
                      type: array
                      description: |
                        Resources to exclude from the restore, formatted as resource.group, such as storageclasses.storage.k8s.io.
                      items:
                        type: string
                        description: |
                          The resource kind which has to be skipped from restore.
                    includedPersistentVolumeClaims:
                      type: array
                      description: |
                        Persistent volume claims to include in the restore.
                      items:
                        type: object
                        required:
                          - name
                          - pvRestoreOnly
                        properties:
                          name:
                            type: string
                            description: |
                              Name of the persistent volume claim.
                          targetStorageClass:
                            type: string
                            description: |
                              Storage class name that will be used for persistent volume claim restore.
                          size:
                            type: integer
                            format: int64
                            description: |
                              Size of the persistent volume claim.
                          pvRestoreOnly:
                            type: boolean
                            description: |
                              If the value is set, the restore will only perform the Persistent Volume Restore and its corresponding namespaces Persistent volume claim will not be restored.
                recoveryOptions:
                  type: object
                  description: Describes the recovery options to use for this recovery.
                  properties:
                    recoveryHost:
                      type: string
                      description: |
                        Indicates recovery host in the restore. Currently, only the primary server is supported.
                    continueIfNamespaceExists:
                      type: boolean
                      default: false
                      description: |
                        Indicates if the restore operation should continue if the namespace to be restored already exists at the destination cluster with the same name.
                    recoveryFailureStrategy:
                      type: object
                      description: |
                        Describes the recovery failure strategy.
                      properties:
                        type:
                          default: FAIL_FAST
                          enum:
                            - FAIL_FAST
                            - PROCEED_AHEAD
                            - RETRY
                          type: string
                          description: |
                            Indicates the strategy name to be used in a failure during recovery.
                        retryCount:
                          default: 3
                          type: integer
                          description: |
                            Indicates the total number of restores to initiate if the failure strategy is set to the Retry option.
                          minimum: 2
                          maximum: 5
      example:
        data:
          type: recoveryRequest
          attributes:
            recoveryPoint:
              client: example-namespace
              filter: backupTime ge 2019-11-20T23:20:50Z and backupTime le 2020-9-20T23:20:50Z
              copyNumber: 0
            recoveryObject:
              destinationCluster: cluster_id
              destinationNamespace: example-namespace
              includedResources:
                - CustomResourceDefinition.apiextensions.k8s.io
              excludedResources:
                - VolumeSnapshot.snapshot.storage.k8s.io
                - Pod
              includedPersistentVolumeClaims: []
            recoveryOptions:
              recoveryHost: recovery-proxy.example.com
              continueIfNamespaceExists: false
              recoveryFailureStrategy:
                type: Retry
                retryCount: 2
    kubernetesPreRecoveryCheckRequest:
