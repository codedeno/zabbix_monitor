                            - PROCEED_AHEAD
                            - RETRY
                          type: string
                          description: |
                            Indicates the strategy name to be used in a failure during recovery.
                        retryCount:
                          default: 3
                          type: integer
                          description: |
                            Indicates the total number of restores to initiate if the failure strategy is set to the Retry option.
                          minimum: 2
                          maximum: 5
      example:
        data:
          type: preRecoveryCheckRequest
          attributes:
            recoveryPoint:
              backupId: example-backup_id
              copyNumber: 0
            recoveryObject:
              destinationCluster: cluster_id
              destinationNamespace: example-namespace
              includedResources:
                - CustomResourceDefinition.apiextensions.k8s.io
              excludedResources:
                - VolumeSnapshot.snapshot.storage.k8s.io
                - Pod
              includedPersistentVolumeClaims: []
            recoveryOptions:
              recoveryHost: recovery-proxy.example.com
              continueIfNamespaceExists: false
              recoveryFailureStrategy:
                type: Retry
                retryCount: 2
    cloudRecoverRequest:
      description: The image information schema for image sharing.
      type: object
      required:
        - data
      properties:
        data:
          description: The recovering image information for image sharing.
          type: object
          required:
            - type
            - attributes
          properties:
            type:
              description: The request type for cloudRecover.
              type: string
              enum:
                - recoverEc2Request
                - recoverEc2VMDKRequest
                - recoverEc2ToVmwareRequest
                - recoverAzureVHDRequest
                - recoverAzureVHDToVmwareRequest
            attributes:
              description: The image attributes.
              type: object
              required:
                - client
                - policy
                - backupID
              properties:
                host:
                  description: The name of the storage server that owns the shared bucket.
                  type: string
                lsuName:
                  description: The Logical Storage Unit (LSU) name of the DISK VOLUME (storage server+LSU/disk) that owns the shared bucket.
                  type: string
                client:
                  type: string
                  description: The client name.
                policy:
                  type: string
                  description: The policy name.
                backupID:
                  type: string
                  description: The backup ID.
                recoveryObject:
                  type: object
                  required:
                    - vmDisplayName
                    - vmEnvironment
                  properties:
                    vmDisplayName:
                      type: string
                      description: The display name of the virtual machine. Must not contain more than 80 characters.
                    vmEnvironment:
                      type: object
                      description: Describes the VMware environment where the virtual machine is to be recovered.
                      required:
                        - esxiServer
                        - vCenter
                        - dataCenter
                        - vmFolder
                        - resourcePoolOrVapp
                        - netWork
                        - cpu
                        - memory
                        - vmxDatastore
                      properties:
                        esxiServer:
                          type: string
                          description: The ESXi server name.
                        vCenter:
                          type: string
                          description: The name of the vCenter hosting the virtual machine.
                        dataCenter:
                          type: string
                          description: The datacenter path. Must begin with a forward slash '/'.
                        vmFolder:
                          type: string
                          description: The VM folder path. Must begin with a forward slash '/'.
                        resourcePoolOrVapp:
                          type: string
                          description: The name of the resource pool or vApp that needs to be assigned to the VM.
                        netWork:
                          type: string
                          description: Network name of the virtual machine to be restored.
                        cpu:
                          type: integer
                          description: cpu numbers of the virtual machine to be restored.
                        memory:
                          type: string
                          description: memory size of the virtual machine to be restored.
                        vmxDatastore:
                          type: string
                          description: The name of the datastore to restore the VMX file to.
                recoveryOptions:
                  type: object
                  description: Describes the recovery options to be used for the recovery.
                  required:
                    - recoveryHost
                    - mediaServerName
                  properties:
                    recoveryHost:
                      type: string
                      description: |
                        The server that is to be used as the VM recovery host.
                    mediaServerName:
                      type: string
                      description: |
                        The media server that is to be used to perform this recovery.
                    stu:
                      type: string
                      description: |
                        The storage unit name that is to be used to store data.
                    overwriteExistingVm:
                      type: boolean
                      default: false
                      description: |
                        If `true`, overwrites the VM and its associated resources, if they already exist with the same name. If `false`, does not overwrite the VM and its associated resources, if they already exist with the same name. If not specified, does not overwrite the VM and its associated resources, if they already exist with the same name.
                    powerOnAfterRecovery:
                      type: boolean
                      default: false
                      description: |
                        If `true`, the VM is powered on after the recovery. If `false`, the VM remains powered off after the recovery. If not specified, the VM remains powered off after the recovery.
