        - rbacSecurity: []
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema: {}
      parameters:
        - name: instantRecoveryId
          in: path
          description: This is the virtual machine's numeric identifier from the `GET` instant-recovery-vms API response.
