  /recovery/workloads/cloud/paas/instant-access-images:
    post:
      description: |
        Creates an instant access image from the specified cloud paas recovery point. The create operation need take 1-2 minutes to complete. The API will return once the create job is launced. It will not wait for the creation job to complete. A create instant access mount job will be displayed in activity monitor. Users can monitor the job status from activity monitor. This API will return the instant access image ID. The API consumer can use this instant access image ID to query the status of instant access image by the 'GET /recovery/workloads/cloud/paas/instant-access-images/{imageId}' API. When the status of instant access image changed to 'ACTIVE', the create operation is complete and the instant access image is ready to mount on workload server.

        **Access Control**\
        Enforcement Type: [Object-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-object-level-enforcement)\
        Namespace: `|ASSETS|CLOUD|HOST|<HOST-ID>|`\
        Instant access for cloud paas requires the following permissions:\
        Requires Operation: `|OPERATIONS|VIEW|`\
        Requires Operation: `|OPERATIONS|ASSETS|CLOUD|RESTORE_ORIGINAL|` or `|OPERATIONS|ASSETS|CLOUD|RESTORE_ALTERNATE|`
      tags:
        - Cloud Workloads
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: ./Recovery_Instant_Access_CloudPaaS.yaml#/components/schemas/instantAccessCloudImagePostRequest
        required: true
      responses:
        "201":
          description: Successfully created the instant access image.
          headers:
            Location:
              description: A link to the new instant access image.
              schema:
                type: string
                format: url
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./Recovery_Instant_Access_CloudPaaS.yaml#/components/schemas/instantAccessCloudImagePostResponse
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "500":
          description: Internal server error. Failed to create the instant access image.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
        "503":
          description: |
            Unable to create instant access image. The maximum number of instant access images that can be configured has been reached.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: ./common.yaml#/components/schemas/errorResponse
