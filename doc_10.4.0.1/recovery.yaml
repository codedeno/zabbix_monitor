    get:
      description: |
        Gets the list of mounts based on specified filters. If no filters are specified, information for all mounts is
        retrieved.

        **Access Control**
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
