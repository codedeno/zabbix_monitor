openapi: 3.0.0
info:
  title: NetBackup Eventlog API
  version: "11.0"
  description: |
    The NetBackup Event Log APIs provide access to the events operations.
    Refer to the NetBackup Web UI Administrator's Guide for more details about the events, including Action and Severity values.
    |Event Type| Notification Type Value|
    |---|---|
    |Policy|`Policy`|
    |Catalog Image Expiration|`Catalog`|
    |Client|`ClientEvent`|
    |Storage Unit|`StorageUnit`|
    |Storage Unit Group|`StorageUnitGroup`|
    |Storage life cycle policy|`SLP`|
    |Storage life cycle policy state change|`SlpVersionActInactEvent`|
    |cDOT Client|`cDOTClientEvent`|
    |Isilon Client|`IsilonClientEvent`|
    |Machine [Master/Media/Cluster]|`Machine`|
    |VPFS [Universal share/Instant access share]|`VPFS`|
    |Drive|`DriveChange`|
    |Library Event - Robot|`Library`|
    |Media|`Media`|
    |Media Group|`MediaGroup`|
    |Media Pool|`MediaPool`|
    |Media Server Elasticity|`MediaServerElasticityEvent`|
    |Retention Event|`RetentionEvent`|
    |VMware Discovery|`TAGSDISCOVERYEVENT`|
    |Autodiscovery and Discover Now|`DiscoveryEvent`|
    |KMS Certificate Expiration|`KMSCredentialStatus`|
    |Message Broker Service Status|`ServiceStatus`|
    |Protection Plan Subscription|`ProtectionPlanSubscription`|
    |Protection Plan|`ProtectionPlan`|
    |WebSocket Server Endpoint |`WSSEndpoint`|
externalDocs:
  description: Getting Started Guide
  url: http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started/
servers:
  - url: '/netbackup'
    description: NetBackup Master
paths:
  /eventlog/notifications:
    get:
      description: |
        Gets the list of notifications based on the specified filters. If no filters are specified, information for 10
        notifications is retrieved, sorted in descending order based on the time the notifications were created.

        To avoid sending a large set of notifications data, the API returns only a subset of data. The default size is 10.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|MANAGE|EVENTLOGS|NOTIFICATIONS|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Notifications
      parameters:
        - name: filter
          description: |
            Filter criteria syntax is based on OData standards. Filtering is supported on the following attributes:
            |Name|Supported Operators|Description|Schema|
            |---|---|---|---|
            |id|eq ne lt gt le ge contains startswith endswith|The notification identifier.|string|
            |priority|eq ne|The notification priority. Possible values: LOW, MEDIUM, HIGH|string|
            |severity|eq ne|The notification severity. Possible values: CRITICAL, ERROR, WARNING, INFO, DEBUG|string|
            |createdDateTime|eq ne lt gt le ge|The UTC timestamp of when the notification was created.|date-time|
            |notificationType|eq ne lt gt le ge contains startswith endswith|The notification type.|string|
            |notificationId|eq ne lt gt le ge contains startswith endswith|The notification ID.|string|
            |producerName|eq ne lt gt le ge contains startswith endswith|The host name of the notification producer.|string|
            |producerId|eq ne lt gt le ge contains startswith endswith|The host ID (UUID) of the notification producer.|string|
            |producerType|eq ne lt gt le ge contains startswith endswith|The host type of the notification producer.|string|
            |producerSubType|eq ne lt gt le ge contains startswith endswith|The notification producer subtype.|string|
            |extendedAttributes/{additionalAttributeName}|eq ne lt gt le ge contains startswith endswith|The dynamic, additional attribute key and value.|string|
          in: query
          required: false
          schema:
            type: string
        - name: page[offset]
          description: The record number offset.
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: page[limit]
          description: The number of records on one page after the offset.
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: sort
          description: Sorts in ascending order on the specified property. Prefix with '-' for descending order.
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Successfully retrieved the list of notifications based on the specified filters.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/getNotificationsResponse"
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
    post:
      description: |
        Creates the specified notifications.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|MANAGE|EVENTLOGS|NOTIFICATIONS|`\
        Requires Operation: `|OPERATIONS|ADD|`
      tags:
        - Notifications
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/postNotificationsRequest"
        description: The JSON object for the notification records.
        required: true
      responses:
        "201":
          description: Successfully created the notifications based on the request.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/postNotificationsResponse"
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  /eventlog/messages:
    get:
      description: |
        Gets the list of message strings that are used to create the messages in the event log. If no filters are
        specified, information for 10 message strings is retrieved, sorted in descending order based on the time
        the message strings were created.

        To avoid sending a large set of data, the API returns only a subset of the data. The default size is 10.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|MANAGE|EVENTLOGS|MESSAGES|`\
        Requires Operation: `|OPERATIONS|VIEW|`
      tags:
        - Messages
      parameters:
        - name: filter
          description: |
            Filter criteria syntax is based on OData standards. Filtering is supported on the following attributes:
            |Name|Supported Operators|Description|Schema|
            |---|---|---|---|
            |id|eq ne lt gt le ge contains startswith endswith|The message string identifier.|string|
            |createdDateTime|eq ne lt gt le ge|The UTC timestamp of when the message string was created.|date-time|
            |lastUpdatedDateTime|eq ne lt gt le ge|The UTC timestamp of when the message string was last updated.|date-time|
            |messageKey|eq ne lt gt le ge contains startswith endswith|The logical name for the message string.|string|
          in: query
          required: false
          schema:
            type: string
        - name: page[offset]
          description: The record number offset.
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: page[limit]
          description: The number of records on one page after the offset.
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: sort
          description: Sorts in ascending order on the specified property. Prefix with '-' for descending order.
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Successfully retrieved the list of message strings based on the specified filters.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/getMessagesResponse"
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "406":
          $ref: ./common.yaml#/components/responses/errorUnacceptable
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
    post:
      description: |
        Creates the specified message strings.
        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|MANAGE|EVENTLOGS|MESSAGES|`\
        Requires Operation: `|OPERATIONS|ADD|`
      tags:
        - Messages
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/postMessageRequest"
        description: The JSON object for the records of the message strings.
        required: true
      responses:
        "201":
          description: Successfully created the message strings based on the request.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/postMessageResponse"
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
  "/eventlog/messages/{messageId}":
    put:
      description: |
        Updates the message string with the specified message ID.

        **Access Control**\
        Enforcement Type: [API-Level](http://sort.veritas.com/public/documents/nbu/10.4/windowsandunix/productguides/html/getting-started#user-content-api-level-enforcement)\
        Namespace: `|MANAGE|EVENTLOGS|MESSAGES|`\
        Requires Operation: `|OPERATIONS|UPDATE|`
      tags:
        - Messages
      parameters:
        - name: messageId
          in: path
          required: true
          description: The message ID of the message string.
          schema:
            type: string
      requestBody:
        content:
          application/vnd.netbackup+json;version=11.0:
            schema:
              $ref: "#/components/schemas/putMessageRequest"
        description: The JSON object for the record of the message string.
        required: true
      responses:
        "200":
          description: Successfully updated the message string based on the request.
          content:
            application/vnd.netbackup+json;version=11.0:
              schema:
                $ref: "#/components/schemas/putMessageResponse"
        "400":
          $ref: ./common.yaml#/components/responses/errorBadRequest
        "401":
          $ref: ./common.yaml#/components/responses/errorUnauthorized
        "415":
          $ref: ./common.yaml#/components/responses/errorUnsupportedMediaType
        "500":
          $ref: ./common.yaml#/components/responses/errorInternalServerError
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
    cookieAuth:
      type: apiKey
      in: cookie
      name: Authorization
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    getNotificationsResponse:
      type: object
      required:
        - links
        - data
        - meta
      properties:
        links:
          type: object
          properties:
            self:
              type: object
              properties:
                href:
                  type: string
            next:
              type: object
              properties:
                href:
                  type: string
            prev:
              type: object
              properties:
                href:
                  type: string
            first:
              type: object
              properties:
                href:
                  type: string
            last:
              type: object
              properties:
                href:
                  type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/getNotificationDetailsResponse"
        meta:
          type: object
          properties:
            pagination:
              type: object
              properties:
                prev:
                  type: integer
                next:
                  type: integer
                first:
                  type: integer
                last:
                  type: integer
                count:
                  type: integer
                offset:
                  type: integer
                limit:
                  type: integer
    getNotificationDetailsResponse:
      type: object
      required:
        - links
        - type
        - id
      description: The data that is specific to a notification.
      properties:
        links:
          type: object
          properties:
            self:
              type: object
              properties:
                href:
                  type: string
        type:
          type: string
          enum:
            - notifications
        id:
          type: string
        attributes:
          $ref: "#/components/schemas/getNotificationAttributes"
    postNotificationsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/postNotificationsDetailsResponse"
    postNotificationsDetailsResponse:
      type: object
      description: The data that is specific to a notification.
      properties:
        links:
          type: object
          properties:
            self:
              type: object
              properties:
                href:
                  type: string
        type:
          type: string
          enum:
            - notificationResponse
        id:
          type: string
        attributes:
          $ref: "#/components/schemas/postNotificationResponseAttributes"
    postNotificationResponseAttributes:
      type: object
      required:
        - version
        - createdDateTime
        - notificationType
        - producerName
        - producerId
        - producerType
      properties:
        version:
          type: string
          description: The notification version.
        createdDateTime:
          type: string
          format: date-time
          description: The ISO 8601 formatted time. The timestamp of when the notification was created.
        notificationType:
          type: string
          description: The notification type.
        producerName:
          type: string
          description: The host name of the notification producer.
        producerId:
          type: string
          description: The host ID (UUID) of the notification producer.
        producerType:
          type: string
          description: The host type of the notification producer.
    getNotificationAttributes:
      type: object
      required:
        - version
        - createdDateTime
        - notificationType
        - producerName
        - producerId
        - producerType
      properties:
        version:
          type: string
          description: The notification version.
        priority:
          type: string
          default: LOW
          description: The notification priority.
          enum:
            - LOW
            - MEDIUM
            - HIGH
        severity:
          type: string
          default: INFO
          description: The notification severity.
          enum:
            - CRITICAL
            - ERROR
            - WARNING
            - INFO
            - DEBUG
            - RCA
        createdDateTime:
          type: string
          format: date-time
          description: The ISO 8601 formatted time. The timestamp of when the notification was created.
        notificationType:
          type: string
          description: The notification type.
        notificationId:
          type: string
          description: The notification ID.
        producerName:
          type: string
          description: The host name of the notification producer.
        producerId:
          type: string
          description: The host ID (UUID) of the notification producer.
        producerType:
          type: string
          description: The host type of the notification producer.
        producerSubType:
          type: string
          description: The notification producer subtype.
        displayString:
          type: string
          description: The display string for the notification. This string can contain some or all of the extended attributes of the notification.
        namespace:
          type: string
          description: The Message Key for the notification.
        extendedAttributes:
          type: object
          description: The additional attributes based on the type of notification.
    postNotificationsRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            type: object
            required:
              - type
              - attributes
            description: The data that is specific to a notification.
            properties:
              type:
                type: string
                enum:
                  - notificationRequest
              attributes:
                $ref: "#/components/schemas/postNotificationAttributes"
    postNotificationAttributes:
      type: object
      required:
        - version
        - createdDateTime
        - notificationType
        - producerName
        - producerId
        - producerType
        - extendedAttributes
      properties:
        version:
          type: string
          description: The notification version.
        priority:
          type: string
          default: LOW
          description: The notification priority.
          enum:
            - LOW
            - MEDIUM
            - HIGH
        severity:
          type: string
          default: INFO
          description: The notification severity.
          enum:
            - CRITICAL
            - ERROR
            - WARNING
            - INFO
            - DEBUG
            - RCA
        createdDateTime:
          type: string
          format: date-time
          description: The ISO 8601 formatted time. The timestamp of when the notification was created.
        notificationType:
          type: string
          description: The notification type.
        notificationId:
          type: string
          description: The notification ID.
        producerName:
          type: string
          description: The host name of the notification producer.
        producerId:
          type: string
          description: The host ID (UUID) of the notification producer.
        producerType:
          type: string
          description: The host type of the notification producer.
        producerSubType:
          type: string
          description: The notification producer subtype.
        messageKey:
          type: string
          description: The logical name for the notification display message string.
        extendedAttributes:
          type: object
          description: The additional attributes based on the type of notification.
        rbac:
          type: object
          description: The RBAC information for the notification.
    getMessagesResponse:
      type: object
      properties:
        links:
          type: object
          properties:
            self:
              type: object
              properties:
                href:
                  type: string
            next:
              type: object
              properties:
                href:
                  type: string
            prev:
              type: object
              properties:
                href:
                  type: string
            first:
              type: object
              properties:
                href:
                  type: string
            last:
              type: object
              properties:
                href:
                  type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/getMessageDetailsResponse"
        meta:
          type: object
          properties:
            pagination:
              type: object
              properties:
                prev:
                  type: integer
                next:
                  type: integer
                first:
                  type: integer
                last:
                  type: integer
                count:
                  type: integer
                offset:
                  type: integer
                limit:
                  type: integer
    getMessageDetailsResponse:
      type: object
      description: The data that is specific to a message string.
      properties:
        links:
          type: object
          properties:
            self:
              type: object
              properties:
                href:
                  type: string
        type:
          type: string
          enum:
            - messages
        id:
          type: string
        attributes:
          $ref: "#/components/schemas/getMessageAttributes"
    getMessageAttributes:
      type: object
      properties:
        messageKey:
          type: string
          description: The logical name for the message string.
        createdDateTime:
          type: string
          format: date-time
          description: The ISO 8601 formatted time. The timestamp of when the message format was created.
        lastUpdatedDateTime:
          type: string
          format: date-time
          description: The ISO 8601 formatted time. The timestamp of when the message format was last updated.
        publishEventLogToAlta:
          type: boolean
          description: Indicates if events generated should be published to Alta View as event-logs to be shown on the GUI.
          default: false
        publishRealTimeEventTrigger:
          type: boolean
          description: Indicates if events can be internal triggering events send to ITADC for DataCollection.
          default: false
        isSystemDefined:
          type: boolean
          description: Indicates if the message key is an NBU system defined key or an external key.
          default: false
        messageProperties:
          type: array
          items:
            $ref: "#/components/schemas/getMessagePropertiesDetails"
    getMessagePropertiesDetails:
      type: object
      description: The data that is specific to a message string properties.
      properties:
        id:
          type: integer
          description: The ID of the message string property.
        locale:
          type: string
          enum:
            - en
            - fr
            - ja
            - zh
        displayMessage:
          type: string
          description: The display message string.
    postMessageRequest:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            type: object
            required:
              - type
              - attributes
            description: The data that is specific to a message string.
            properties:
              type:
                type: string
                enum:
                  - messages
              attributes:
                $ref: "#/components/schemas/postMessageAttributes"
    postMessageAttributes:
      type: object
      required:
        - messageKey
        - messageProperties
      properties:
        messageKey:
          type: string
          description: The logical name for the message string. The value cannot start with "eventlog.vrts.nbu.". It is reserved for the internal NetBackup messages.
        publishEventLogToAlta:
          type: boolean
          description: Indicates if events generated should be published to Alta View as event-logs to be shown on the GUI.
